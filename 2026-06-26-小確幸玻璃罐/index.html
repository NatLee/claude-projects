<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小確幸玻璃罐 · Jar of Small Joys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">
</head>
<body>

<canvas class="ambient" id="ambient" aria-hidden="true"></canvas>

<a class="home-link" href="../index.html" aria-label="回到首頁">
  <span class="home-arrow" aria-hidden="true">←</span> 回首頁
</a>

<div class="page">

  <header class="site-head">
    <div class="logo reveal" style="--d:0s" aria-hidden="true">🫙</div>
    <h1 class="reveal" style="--d:.07s">小確幸玻璃罐</h1>
    <p class="tagline reveal" style="--d:.14s">把每天那些「微小但確切的幸福」投進來，看著它一點一點裝滿。</p>
    <p class="today reveal" id="today" style="--d:.2s"></p>
  </header>

  <main class="layout">

    <!-- 左：玻璃罐 -->
    <section class="jar-panel">
      <div class="jar-stage reveal" style="--d:.28s">
        <div class="jar" id="jar" role="button" tabindex="0" aria-label="搖一搖，隨機回味一則小確幸">
          <div class="jar-lid" aria-hidden="true"></div>
          <div class="jar-neck" aria-hidden="true"></div>
          <div class="jar-glass">
            <div class="jar-fill" id="jarFill" aria-hidden="true"></div>
            <div class="jar-shine" aria-hidden="true"></div>
            <div class="slips" id="slips" aria-hidden="true"></div>
            <div class="jar-label" aria-hidden="true">小確幸<br><span>since today</span></div>
          </div>
        </div>
        <div class="spark-layer" id="sparkLayer" aria-hidden="true"></div>
      </div>
      <button class="shake-btn reveal" id="shakeBtn" style="--d:.44s">🤲 搖一搖，回味一則</button>
      <p class="jar-hint reveal" style="--d:.5s">罐子裡收藏了 <b id="jarCount">0</b> 份美好</p>
    </section>

    <!-- 右：投入 + 統計 -->
    <section class="control-panel">

      <div class="card add-card reveal" style="--d:.34s">
        <h2>投一則進去</h2>
        <textarea id="content" maxlength="200" rows="3"
          aria-label="寫下今天的一則小確幸，最多 200 字"
          placeholder="今天有什麼小小的好事？&#10;例如：午後的咖啡剛剛好、收到久違的訊息、路邊的貓願意給摸…"></textarea>
        <div class="mood-row" id="moodRow" role="group" aria-label="選擇當下的心情">
          <span class="mood-hint">心情：</span>
          <!-- 心情按鈕由 JS 生成 -->
        </div>
        <div class="add-actions">
          <span class="counter"><span id="charCount">0</span>/200</span>
          <button class="add-btn" id="addBtn">投進罐子 ✨</button>
        </div>
        <p class="toast" id="toast" role="status" aria-live="polite"></p>
      </div>

      <div class="card stats-card reveal" style="--d:.44s">
        <h2>罐子狀態</h2>
        <div class="stats-grid">
          <div class="stat"><b id="statTotal">0</b><span>累積總數</span></div>
          <div class="stat"><b id="statMonth">0</b><span>本月收集</span></div>
          <div class="stat"><b id="statStreak">0</b><span>連續天數</span></div>
          <div class="stat"><b id="statMood">—</b><span>最常心情</span></div>
        </div>
      </div>

    </section>
  </main>

  <!-- 隨機回味卡 -->
  <div class="featured" id="featured" aria-live="polite" hidden>
    <div class="featured-inner">
      <span class="featured-quote" aria-hidden="true">“</span>
      <p class="featured-text" id="featuredText"></p>
      <p class="featured-meta" id="featuredMeta"></p>
    </div>
  </div>

  <!-- 時間軸 -->
  <section class="timeline-section reveal" style="--d:.54s">
    <div class="timeline-head">
      <h2>罐子裡的回憶</h2>
      <span class="timeline-count" id="timelineCount"></span>
    </div>
    <ul class="timeline" id="timeline"></ul>
    <p class="empty-hint" id="emptyHint" hidden>罐子還空空的，投第一則小確幸進去吧。</p>
  </section>

  <footer class="site-foot">
    「小確幸」一詞源自村上春樹，指生活中微小而確切的幸福。<br>
    每天記下一則，是溫柔對待自己的小練習。
  </footer>

</div>
<script src="static/app.js"></script>
</body>
</html>
