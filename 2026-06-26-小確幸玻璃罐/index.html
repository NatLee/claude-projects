<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小確幸玻璃罐 · Jar of Small Joys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">
</head>
<body>
<div class="page">

  <header class="site-head">
    <div class="logo">🫙</div>
    <h1>小確幸玻璃罐</h1>
    <p class="tagline">把每天那些「微小但確切的幸福」投進來，看著它一點一點裝滿。</p>
    <p class="today" id="today"></p>
  </header>

  <main class="layout">

    <!-- 左：玻璃罐 -->
    <section class="jar-panel">
      <div class="jar" id="jar" title="搖一搖，隨機回味一則">
        <div class="jar-lid"></div>
        <div class="jar-neck"></div>
        <div class="jar-glass">
          <div class="jar-shine"></div>
          <div class="slips" id="slips"></div>
          <div class="jar-label">小確幸<br><span>since today</span></div>
        </div>
      </div>
      <button class="shake-btn" id="shakeBtn">🤲 搖一搖，回味一則</button>
    </section>

    <!-- 右：投入 + 統計 -->
    <section class="control-panel">

      <div class="card add-card">
        <h2>投一則進去</h2>
        <textarea id="content" maxlength="200" rows="3"
          placeholder="今天有什麼小小的好事？&#10;例如：午後的咖啡剛剛好、收到久違的訊息、路邊的貓願意給摸…"></textarea>
        <div class="mood-row" id="moodRow">
          <span class="mood-hint">心情：</span>
          <!-- 心情按鈕由 JS 生成 -->
        </div>
        <div class="add-actions">
          <span class="counter"><span id="charCount">0</span>/200</span>
          <button class="add-btn" id="addBtn">投進罐子 ✨</button>
        </div>
        <p class="toast" id="toast"></p>
      </div>

      <div class="card stats-card">
        <h2>罐子狀態</h2>
        <div class="stats-grid">
          <div class="stat"><b id="statTotal">0</b><span>累積總數</span></div>
          <div class="stat"><b id="statMonth">0</b><span>本月收集</span></div>
          <div class="stat"><b id="statStreak">0</b><span>連續天數</span></div>
          <div class="stat"><b id="statMood">—</b><span>最常心情</span></div>
        </div>
      </div>

    </section>
  </main>

  <!-- 隨機回味卡 -->
  <div class="featured" id="featured" hidden>
    <div class="featured-inner">
      <span class="featured-quote">“</span>
      <p class="featured-text" id="featuredText"></p>
      <p class="featured-meta" id="featuredMeta"></p>
    </div>
  </div>

  <!-- 時間軸 -->
  <section class="timeline-section">
    <div class="timeline-head">
      <h2>罐子裡的回憶</h2>
      <span class="timeline-count" id="timelineCount"></span>
    </div>
    <ul class="timeline" id="timeline"></ul>
    <p class="empty-hint" id="emptyHint" hidden>罐子還空空的，投第一則小確幸進去吧。</p>
  </section>

  <footer class="site-foot">
    「小確幸」一詞源自村上春樹，指生活中微小而確切的幸福。<br>
    每天記下一則，是溫柔對待自己的小練習。
  </footer>

</div>
<script src="static/app.js"></script>
</body>
</html>
