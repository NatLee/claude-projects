<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真的假的？· 冷知識真偽鑑定所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">
</head>
<body>
  <div class="paper">
    <!-- 招牌 -->
    <header class="signboard">
      <div class="seal-logo">鑑</div>
      <div class="title-block">
        <h1>真偽鑑定所</h1>
        <p class="subtitle">網路上流傳的冷知識，究竟是真材實料，還是以假亂真的謠言？<br>由你來蓋下這一印。</p>
      </div>
    </header>

    <!-- 統計條 -->
    <section class="stats-strip" id="statsStrip">
      <div class="stat"><span class="stat-num" id="statStreak">0</span><span class="stat-label">🔥 目前連勝</span></div>
      <div class="stat"><span class="stat-num" id="statSeen">0<i>/0</i></span><span class="stat-label">已鑑定</span></div>
      <div class="stat"><span class="stat-num" id="statAcc">—</span><span class="stat-label">答對率</span></div>
      <div class="stat"><span class="stat-num" id="statBest">0</span><span class="stat-label">最佳連勝</span></div>
    </section>

    <!-- 鑑定卡 -->
    <main class="card" id="card">
      <div class="card-watermark">鑑</div>
      <div class="card-head">
        <span class="case-no" id="caseNo">第 001 號案件</span>
        <span class="category-tag" id="categoryTag">動物</span>
      </div>

      <p class="claim" id="claim">正在調閱卷宗……</p>

      <!-- 朱印（揭曉時蓋上） -->
      <div class="stamp" id="stamp" aria-hidden="true"><span id="stampChar">真</span></div>

      <!-- 判斷按鈕 -->
      <div class="verdict-buttons" id="verdictButtons">
        <button class="vbtn vbtn-true" id="btnTrue">
          <span class="vbtn-char">真</span><span class="vbtn-text">屬實</span>
        </button>
        <button class="vbtn vbtn-false" id="btnFalse">
          <span class="vbtn-char">假</span><span class="vbtn-text">謠言</span>
        </button>
      </div>

      <!-- 揭曉區 -->
      <div class="reveal" id="reveal" hidden>
        <div class="reveal-banner" id="revealBanner">鑑定正確</div>
        <p class="explanation" id="explanation"></p>
        <p class="source">查證來源：<a id="sourceLink" href="#" target="_blank" rel="noopener"></a></p>
        <button class="next-btn" id="btnNext">下一件 &rarr;</button>
      </div>
    </main>

    <!-- 鑑定檔案（統計面板） -->
    <section class="dossier" id="dossier">
      <button class="dossier-toggle" id="dossierToggle">📁 我的鑑定檔案</button>
      <div class="dossier-body" id="dossierBody" hidden>
        <p class="insight" id="insight">先鑑定幾件，這裡會分析你最容易被哪一類冷知識騙倒。</p>
        <div class="cat-bars" id="catBars"></div>
        <button class="reset-btn" id="btnReset">清空紀錄，重新鑑定</button>
      </div>
    </section>

    <footer class="foot">
      <span>每日小專案 · 2026-07-07</span>
      <span>18 則冷知識皆經查證 · 真偽各半</span>
    </footer>
  </div>

  <script src="static/app.js"></script>
</body>
</html>
