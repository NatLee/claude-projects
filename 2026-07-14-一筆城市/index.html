<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一筆城市 · 畫一條線，住進一座城</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙️</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
<a class="back" href="../index.html" aria-label="回首頁">← 回首頁</a>

<main class="page">
  <header class="masthead in in-1">
    <p class="eyebrow">創意・娛樂 · 2026-07-14</p>
    <h1>一筆城市</h1>
    <p class="tagline">畫一條線，住進一座城。</p>
  </header>

  <section class="stage in in-2" aria-label="城市畫布">
    <div class="frame">
      <canvas id="city" tabindex="0" role="img" aria-label="空白的畫布，等待你畫下一條天際線"></canvas>
      <div class="hint" id="hint" aria-hidden="true">
        <svg viewBox="0 0 120 34" aria-hidden="true"><path d="M4 26 C 22 26, 26 8, 40 12 S 60 30, 74 18 S 100 6, 116 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="3 6"/></svg>
        <p>按住，從左到右畫一條線</p>
        <p class="hint-sub">往下探到底，會出現海港</p>
      </div>
    </div>
  </section>

  <section class="controls in in-3" aria-label="城市控制">
    <div class="seg" role="group" aria-label="時刻">
      <button type="button" data-sky="0.15" aria-pressed="false">黃昏</button>
      <button type="button" data-sky="0.5"  aria-pressed="true">夜</button>
      <button type="button" data-sky="0.85" aria-pressed="false">黎明</button>
    </div>
    <div class="seg" role="group" aria-label="天氣">
      <button type="button" data-weather="clear" aria-pressed="true">晴</button>
      <button type="button" data-weather="rain"  aria-pressed="false">雨</button>
    </div>
    <div class="actions">
      <button type="button" id="dice"     class="ghost" aria-label="擲骰子，隨機生成一座城市">🎲 骰子城市</button>
      <button type="button" id="redraw"   class="ghost" aria-label="清空畫布重新畫">↺ 重畫</button>
      <button type="button" id="postcard" class="solid" aria-label="把這座城市存成明信片圖片">寄出明信片</button>
    </div>
  </section>

  <section class="statsbar in in-4" aria-label="城市資訊">
    <label class="namefield">
      <span>為城市命名</span>
      <input id="cityname" type="text" maxlength="10" placeholder="無名" autocomplete="off">
    </label>
    <p class="stats" id="stats">畫下第一筆，城市就會醒來。</p>
  </section>

  <footer class="foot in in-4">
    <p>每一棟樓都是你手的抖動。點一棟樓，替他們把燈全點亮；鍵盤 ←→ 選樓、Enter 點燈。</p>
  </footer>
</main>

<div id="live" class="visually-hidden" aria-live="polite"></div>
<script src="app.js" defer></script>
</body>
</html>
