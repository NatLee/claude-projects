<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生物發光 · 攪動這片海</title>
<meta name="description" content="用手指攪動一片黑色的海，發光的浮游生物會在你的筆跡裡亮成藍色，再慢慢熄滅——就像馬祖的藍眼淚、馬爾地夫的星海。掀一道浪、讓整片海閃一下，玩一場屬於海洋的光。">
<style>
  :root{
    --bg:#020913; --ink:#dff3ff; --soft:#89b6d0; --dim:#5b849c;
    --cyan:#7ffcff; --blue:#37b6ff;
    --mono:"SFMono-Regular",ui-monospace,"Menlo","Consolas",monospace;
    --shadow:0 24px 60px -30px rgba(0,0,0,.9);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    color:var(--ink);line-height:1.6;overflow-x:hidden;
    background:radial-gradient(1200px 700px at 50% -12%,#083049 0%,rgba(8,48,73,0) 55%),
      radial-gradient(900px 600px at 88% 112%,#04141f 0%,rgba(4,20,31,0) 60%),var(--bg);
    background-attachment:fixed}
  body>*{position:relative;z-index:1}
  [data-anim]{opacity:0;transform:translateY(15px);animation:rise .8s cubic-bezier(.2,.75,.25,1) forwards;animation-delay:calc(var(--i,0)*100ms)}
  @keyframes rise{to{opacity:1;transform:none}}
  .home-link{position:fixed;top:16px;left:16px;z-index:30;font-size:.86rem;color:var(--soft);
    text-decoration:none;background:rgba(6,24,36,.7);border:1px solid #12384d;padding:6px 12px;
    border-radius:999px;backdrop-filter:blur(6px);transition:transform .2s,color .2s}
  .home-link:hover{transform:translateX(-3px);color:var(--cyan)}
  .home-link:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .head{max-width:760px;margin:0 auto;padding:70px 22px 4px;text-align:center}
  .eyebrow{margin:0 0 12px;letter-spacing:.34em;font-size:.66rem;font-weight:700;color:var(--cyan);
    font-family:var(--mono);text-indent:.34em}
  h1{margin:0;font-size:clamp(2.4rem,7.5vw,4rem);line-height:1.03;letter-spacing:.04em;
    font-family:"Songti TC","Noto Serif TC",Georgia,serif;font-weight:800;
    background:linear-gradient(180deg,#fff,#a9f6ff 74%,var(--blue) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 2px 40px rgba(80,220,255,.16)}
  .head .sub{margin:14px auto 0;max-width:32em;color:var(--soft);font-size:1.02rem}
  .wrap{max-width:820px;margin:0 auto;padding:18px 16px 40px}

  .seawrap{position:relative;width:100%;height:min(64vh,560px);border-radius:20px;overflow:hidden;
    border:1px solid #123a50;box-shadow:var(--shadow);
    background:radial-gradient(120% 90% at 50% 0%,#06263a 0%,#031320 55%,#010a12 100%);cursor:crosshair}
  #sea{display:block;width:100%;height:100%;touch-action:none}
  .hint{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;
    color:rgba(200,235,255,.7);font-size:1rem;pointer-events:none;transition:opacity .6s;letter-spacing:.02em}
  .hint.gone{opacity:0}
  .hint .big{font-size:1.15rem;display:block;margin-bottom:4px}

  .controls{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:16px auto 0;max-width:640px}
  .btn{font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;color:var(--ink);
    background:rgba(12,42,60,.8);border:1px solid #1a4a63;padding:10px 18px;border-radius:999px;
    transition:transform .16s,background .2s,box-shadow .2s,border-color .2s}
  .btn:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--cyan)}
  .btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .btn.on{border-color:var(--cyan);color:var(--cyan)}
  .count{max-width:640px;margin:12px auto 0;text-align:center;font-size:.82rem;color:var(--dim)}
  .count b{color:var(--soft);font-family:var(--mono)}
  .note{max-width:640px;margin:18px auto 0;padding:14px 18px;border-radius:14px;
    background:linear-gradient(180deg,rgba(8,38,56,.6),rgba(4,20,31,.6));border:1px solid #123a50;
    font-size:.9rem;color:var(--soft)}
  .note b{color:var(--ink)}
  .foot{max-width:640px;margin:26px auto 24px;padding:0 18px;text-align:center}
  .foot p{margin:0;font-size:.76rem;color:var(--dim)}
  .live{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  @media (max-width:560px){.head{padding-top:60px}.seawrap{height:min(58vh,460px)}}
  @media (prefers-reduced-motion:reduce){[data-anim]{animation:none;opacity:1;transform:none}}
</style>
</head>
<body>
<a class="home-link" href="../index.html">← 回首頁</a>

<header class="head">
  <p class="eyebrow" data-anim style="--i:0">BIOLUMINESCENCE</p>
  <h1 data-anim style="--i:1">生物發光</h1>
  <p class="sub" data-anim style="--i:2">用手指攪動這片黑色的海，<br>發光的浮游生物會在你的筆跡裡亮起來。</p>
</header>

<main class="wrap">
  <section class="seawrap" data-anim style="--i:3">
    <canvas id="sea" role="img" aria-label="可互動的發光海面，滑過會點亮藍色浮游生物"></canvas>
    <div class="hint" id="hint"><span class="big">✦ 攪動海水 ✦</span>用滑鼠或手指劃過，看它亮起來</div>
  </section>

  <section class="controls" data-anim style="--i:4">
    <button class="btn" id="waveBtn" type="button">🌊 掀起一道浪</button>
    <button class="btn" id="flashBtn" type="button">✨ 整片閃一下</button>
    <button class="btn" id="hueBtn" type="button">🎨 換個顏色</button>
  </section>
  <p class="count" data-anim style="--i:5">你已經點亮了 <b id="litCount">0</b> 點光。</p>

  <section class="note" data-anim style="--i:6">
    <b>這是真的。</b> 海裡的發光多半來自渦鞭毛藻——被水流攪動時，體內的<b>螢光素</b>遇上酵素與氧氣，就閃出幾乎不發熱的冷光，當作嚇退天敵的「防盜警報」。台灣<b>馬祖的藍眼淚</b>、馬爾地夫的「星海」都是這樣來的；而在深海，<b>約四分之三</b>的動物都會自己發光。
  </section>
</main>

<div class="live" id="live" aria-live="polite"></div>

<footer class="foot">
  <p>資料來源：Martini &amp; Haddock, Scientific Reports（2017）、馬祖藍眼淚觀測</p>
</footer>

<script>
(function(){
  'use strict';
  var LS='glow.';
  var canvas=document.getElementById('sea'), ctx=canvas.getContext('2d');
  var hint=document.getElementById('hint'), litCountEl=document.getElementById('litCount'), live=document.getElementById('live');
  var reduceMQ=window.matchMedia('(prefers-reduced-motion: reduce)'); var REDUCE=reduceMQ.matches;

  var W=0,H=0,DPR=1, N=0, P=null;
  var HUES=[[188,'藍'],[200,'湛藍'],[152,'湖綠'],[168,'夢幻']];
  var hueIdx=0;
  try{ var hs=localStorage.getItem(LS+'hue'); if(hs!==null) hueIdx=Math.max(0,Math.min(HUES.length-1,+hs)); }catch(e){}
  var lit=0; try{ lit=+(localStorage.getItem(LS+'lit')||0)||0; }catch(e){}
  litCountEl.textContent=lit.toLocaleString();

  function layout(){
    var r=canvas.getBoundingClientRect(); W=r.width; H=r.height;
    DPR=Math.min(window.devicePixelRatio||1,2);
    canvas.width=Math.round(W*DPR); canvas.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    N=Math.round(Math.min(1600, Math.max(600, W*H/620)));
    P=new Float32Array(N*4); // x,y,charge,jit
    for(var i=0;i<N;i++){ P[i*4]=Math.random()*W; P[i*4+1]=Math.random()*H; P[i*4+2]=0; P[i*4+3]=Math.random(); }
  }

  var ptr={x:0,y:0,px:0,py:0,active:false,speed:0,moved:false};
  function setPtr(e){
    var r=canvas.getBoundingClientRect();
    var cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    var cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    ptr.x=cx; ptr.y=cy; ptr.active=true; ptr.moved=true; firstTouch();
  }
  var firstDone=false;
  function firstTouch(){ if(!firstDone){ firstDone=true; hint.classList.add('gone'); } }
  canvas.addEventListener('pointermove', setPtr);
  canvas.addEventListener('pointerdown', function(e){ setPtr(e); });
  canvas.addEventListener('pointerleave', function(){ ptr.active=false; });

  var waves=[]; var flash=0;
  document.getElementById('waveBtn').addEventListener('click', function(){ waves.push({x:-20,v:(W+60)/70}); firstTouch(); live.textContent='一道浪掃過海面。'; });
  document.getElementById('flashBtn').addEventListener('click', function(){ flash=1; firstTouch(); live.textContent='整片海閃了一下。'; });
  var hueBtn=document.getElementById('hueBtn');
  hueBtn.addEventListener('click', function(){ hueIdx=(hueIdx+1)%HUES.length; try{localStorage.setItem(LS+'hue',String(hueIdx));}catch(e){}; live.textContent='顏色換成'+HUES[hueIdx][1]+'。'; });

  var litAccum=0;
  function saveLit(){ try{ localStorage.setItem(LS+'lit', String(lit)); }catch(e){} }

  var last=0, rafId=null, running=false, ambientT=0;
  function frame(ts){
    if(!running) return;
    var dt=Math.min(0.05,(ts-last)/1000||0); last=ts;
    // 指標速度
    var sp=Math.hypot(ptr.x-ptr.px, ptr.y-ptr.py); ptr.px=ptr.x; ptr.py=ptr.y;
    if(!ptr.moved) sp=0; ptr.moved=false;
    var R=52, R2=R*R;
    var newlyLit=0;
    // 更新波
    for(var w=waves.length-1;w>=0;w--){ waves[w].x+=waves[w].v* (dt*60); if(waves[w].x>W+40) waves.splice(w,1); }
    ambientT+=dt;
    for(var i=0;i<N;i++){
      var bx=i*4, x=P[bx], y=P[bx+1], g=P[bx+2];
      // 指標攪動
      if(ptr.active){ var dx=x-ptr.x, dy=y-ptr.y, d2=dx*dx+dy*dy;
        if(d2<R2){ var add=(1-Math.sqrt(d2)/R)*Math.min(1,sp/18)*0.9; if(add>g){ if(g<0.05&&add>0.2)newlyLit++; g=Math.min(1,g+add);} }
      }
      // 波
      for(var w2=0;w2<waves.length;w2++){ if(Math.abs(x-waves[w2].x)<14){ if(g<0.05)newlyLit++; g=Math.min(1,Math.max(g,0.85)); } }
      // 整片閃
      if(flash>0){ if(g<0.05)newlyLit++; g=Math.min(1,Math.max(g, flash*0.9*(0.6+0.4*P[bx+3]))); }
      // 環境微光（非降低動態時）
      if(!REDUCE && g<0.02 && Math.random()<0.00025){ g=0.5+0.5*Math.random(); }
      g*=0.93; if(g<0.001)g=0;
      P[bx+2]=g;
    }
    if(flash>0){ flash-=dt*1.3; if(flash<0)flash=0; }
    if(newlyLit){ lit+=newlyLit; litAccum+=newlyLit; litCountEl.textContent=lit.toLocaleString();
      if(litAccum>40){ litAccum=0; saveLit(); } }

    // 繪製
    ctx.clearRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    var hue=HUES[hueIdx][0];
    for(var j=0;j<N;j++){ var b=j*4, g2=P[b+2]; if(g2<0.02) continue;
      var rad=2+g2*11, gx=P[b], gy=P[b+1];
      var hh=hue+(P[b+3]-0.5)*22;
      var grad=ctx.createRadialGradient(gx,gy,0,gx,gy,rad);
      grad.addColorStop(0,'hsla('+hh+',100%,'+(70+g2*20)+'%,'+(g2*0.95)+')');
      grad.addColorStop(0.5,'hsla('+hh+',100%,60%,'+(g2*0.4)+')');
      grad.addColorStop(1,'hsla('+hh+',100%,50%,0)');
      ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(gx,gy,rad,0,6.2832); ctx.fill();
      // 核心亮點
      if(g2>0.5){ ctx.fillStyle='hsla('+hh+',100%,92%,'+((g2-0.5)*0.9)+')'; ctx.beginPath(); ctx.arc(gx,gy,1.3,0,6.2832); ctx.fill(); }
    }
    ctx.globalCompositeOperation='source-over';
    rafId=requestAnimationFrame(frame);
  }
  function start(){ if(!running){ running=true; last=performance.now(); rafId=requestAnimationFrame(frame); } }
  function stop(){ running=false; if(rafId)cancelAnimationFrame(rafId); rafId=null; saveLit(); }

  window.addEventListener('resize', function(){ layout(); });
  document.addEventListener('visibilitychange', function(){ if(document.hidden) stop(); else start(); });
  if('IntersectionObserver' in window){
    new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting)start(); else stop(); }); },{threshold:0.02}).observe(canvas);
  }
  if(reduceMQ.addEventListener) reduceMQ.addEventListener('change', function(){ REDUCE=reduceMQ.matches; });
  window.addEventListener('beforeunload', saveLit);

  layout(); start();
})();
</script>
</body>
</html>
