<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一筆到底 · 七橋問題與一筆畫</title>
<script>document.documentElement.classList.add("js");</script>
<style>
  :root{
    --bg:#0a0b16; --bg2:#0f1026; --panel:rgba(18,20,42,.72); --panel2:#161936;
    --line:rgba(160,150,220,.16); --line-soft:rgba(160,150,220,.09);
    --ink:#f1eefb; --dim:#a9a4cf; --faint:#6f6a97;
    --fun:#ba9df1;         /* 創意・娛樂 紫 */
    --fun-d:#8f6be0;
    --gold:#f0c674;
    --odd:#ff8f6b;         /* 奇點 暖橘 */
    --even:#7bd6a2;        /* 偶點 綠 */
    --pink:#ff86c8;
    --shadow:0 22px 48px rgba(0,0,0,.5);
    --e-out:cubic-bezier(.22,1,.36,1);
    --e-pop:cubic-bezier(.2,1.5,.4,1);
    --serif:"Noto Serif TC","Songti TC","PMingLiU",serif;
    --sans:"Noto Sans TC","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(1000px 560px at 82% -6%, rgba(186,157,241,.14), transparent 60%),
      radial-gradient(860px 600px at 6% 8%, rgba(255,134,200,.08), transparent 60%),
      var(--bg);
    color:var(--ink); font-family:var(--sans);
    min-height:100vh; line-height:1.6; overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body::before{ /* 方格質感 */
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.6;
    background-image:radial-gradient(rgba(241,238,251,.045) 1px, transparent 1.6px);
    background-size:34px 34px;
    -webkit-mask-image:linear-gradient(180deg, rgba(0,0,0,.75), transparent 74%);
            mask-image:linear-gradient(180deg, rgba(0,0,0,.75), transparent 74%);
  }
  a{color:inherit}
  :focus-visible{outline:2px solid var(--gold); outline-offset:3px; border-radius:8px}
  .sr-only{position:absolute;width:1px;height:1px;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}

  .home{
    position:fixed; top:15px; left:16px; z-index:30;
    font-size:13px; color:var(--dim); text-decoration:none;
    background:rgba(14,16,38,.72); border:1px solid var(--line);
    padding:7px 14px; border-radius:999px; backdrop-filter:blur(8px);
    transition:color .2s, border-color .2s, transform .2s;
  }
  .home:hover{color:var(--ink); border-color:var(--fun); transform:translateX(-2px)}

  .wrap{position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:0 22px 72px}

  /* 進場 */
  .rise{transition:opacity .7s ease var(--rd,0s), transform .7s var(--e-out) var(--rd,0s)}
  body.preload .rise{opacity:0; transform:translateY(16px)}

  header{text-align:center; padding:74px 0 20px}
  .kicker{
    display:inline-flex; align-items:center; gap:10px;
    font-family:var(--serif); font-size:11.5px; color:var(--fun);
    letter-spacing:.34em; text-indent:.34em;
    border:1px solid rgba(186,157,241,.34); border-radius:999px; padding:6px 15px 6px 19px;
  }
  h1{
    font-family:var(--serif); font-weight:700; margin-top:18px;
    font-size:clamp(30px,6vw,52px); letter-spacing:.14em; text-indent:.14em;
    background:linear-gradient(180deg,#fff 10%,#cbb8f4 96%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sub{color:var(--dim); font-size:15px; margin-top:12px; letter-spacing:.02em}

  /* 版面 */
  .stage{display:grid; grid-template-columns:1.15fr .85fr; gap:22px; margin-top:26px; align-items:start}
  @media (max-width:760px){ .stage{grid-template-columns:1fr} }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:20px;
    box-shadow:var(--shadow); backdrop-filter:blur(10px);
  }
  .boardcard{padding:16px 16px 14px; position:relative; overflow:hidden}
  .board-head{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:2px 4px 12px}
  .lv-name{font-family:var(--serif); font-weight:700; font-size:18px; letter-spacing:.04em}
  .lv-name .tag{
    font-family:var(--sans); font-weight:500; font-size:11px; color:var(--fun);
    border:1px solid rgba(186,157,241,.4); border-radius:999px; padding:2px 9px; margin-left:8px; vertical-align:2px;
  }
  .solvebadge{font-size:12px; padding:4px 11px; border-radius:999px; border:1px solid var(--line); color:var(--dim); white-space:nowrap}
  .solvebadge.ok{color:var(--even); border-color:rgba(123,214,162,.45); background:rgba(123,214,162,.08)}
  .solvebadge.no{color:var(--odd); border-color:rgba(255,143,107,.45); background:rgba(255,143,107,.08)}

  .board{position:relative; width:100%; aspect-ratio:1/1; border-radius:14px;
    background:radial-gradient(120% 120% at 50% 8%, rgba(30,26,60,.6), rgba(10,11,24,.4));
    border:1px solid var(--line-soft); touch-action:none}
  svg.net{width:100%; height:100%; display:block; overflow:visible}

  .edge-base{stroke:rgba(180,172,224,.24); stroke-width:2.6; fill:none; stroke-linecap:round}
  .edge-ink{stroke:url(#inkgrad); stroke-width:5; fill:none; stroke-linecap:round;
    filter:drop-shadow(0 0 5px rgba(186,157,241,.55))}
  .aim{stroke:rgba(240,198,116,.6); stroke-width:2.4; stroke-dasharray:2 5; fill:none; stroke-linecap:round; pointer-events:none; opacity:0}

  .node{cursor:pointer}
  .node .halo{fill:transparent; transition:fill .2s}
  .node .disc{fill:#1a1c3a; stroke:rgba(200,192,240,.5); stroke-width:2.2; transition:transform .18s var(--e-pop), fill .2s, stroke .2s}
  .node .num{fill:var(--dim); font:600 8.5px var(--sans); text-anchor:middle; dominant-baseline:central; pointer-events:none; user-select:none}
  .node:hover .disc{stroke:var(--fun)}
  .node.cur .disc{fill:#2a2352; stroke:var(--gold); stroke-width:3}
  .node.cur .halo{fill:rgba(240,198,116,.12)}
  .node.start .disc{stroke:var(--gold)}
  .node.start .halo{fill:rgba(240,198,116,.14); animation:pulse 1.8s ease-in-out infinite}
  .node.next .disc{stroke:var(--fun)}
  .node.next .halo{fill:rgba(186,157,241,.16); animation:pulse 1.6s ease-in-out infinite}
  .node.odd .disc{stroke:var(--odd)}
  .node.reveal-odd .disc{fill:#3a1f19; stroke:var(--odd); stroke-width:3}
  .node.reveal-odd .halo{fill:rgba(255,143,107,.18)}
  .node.shake{animation:shake .32s}
  .node .lbl{fill:var(--faint); font:500 5.4px var(--sans); text-anchor:middle; pointer-events:none}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}

  .board.win{animation:winglow 1.1s var(--e-out)}
  @keyframes winglow{0%{box-shadow:0 0 0 0 rgba(186,157,241,0)}40%{box-shadow:0 0 0 6px rgba(186,157,241,.28)}100%{box-shadow:0 0 0 0 rgba(186,157,241,0)}}
  .spark{position:absolute; left:50%; top:50%; font-size:15px; pointer-events:none; will-change:transform,opacity;
    transform:translate(-50%,-50%); animation:spark .95s var(--e-out) forwards}
  @keyframes spark{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
    18%{opacity:1}
    100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1) rotate(var(--rot))}}

  .status{margin-top:12px; min-height:24px; text-align:center; font-size:14px; color:var(--dim); letter-spacing:.02em}
  .status b{color:var(--ink)}
  .status.win{color:var(--fun); font-weight:600}
  .status.dead{color:var(--odd)}

  .controls{display:flex; gap:9px; justify-content:center; margin-top:12px; flex-wrap:wrap}
  .btn{font-family:inherit; font-size:13.5px; color:var(--ink); cursor:pointer;
    background:linear-gradient(180deg,#241f47,#191634); border:1px solid var(--line);
    padding:9px 16px; border-radius:11px; transition:transform .15s var(--e-pop), border-color .2s, background .2s}
  .btn:hover{border-color:var(--fun); transform:translateY(-1px)}
  .btn:active{transform:translateY(0) scale(.97)}
  .btn.ghost{background:transparent; color:var(--dim)}
  .btn.primary{background:linear-gradient(180deg,#a985ee,var(--fun-d)); border:none; color:#140f28; font-weight:700}
  .btn:disabled{opacity:.4; cursor:default; transform:none}

  /* 右欄 */
  .side{display:flex; flex-direction:column; gap:16px}
  .panel{padding:16px 17px}
  .panel h3{font-family:var(--serif); font-size:14.5px; font-weight:700; letter-spacing:.05em; margin-bottom:4px; display:flex; align-items:center; gap:8px}
  .panel h3 .dot{width:8px; height:8px; border-radius:50%; background:var(--fun); box-shadow:0 0 8px var(--fun)}
  .panel .lead{font-size:12.5px; color:var(--faint); margin-bottom:12px; line-height:1.55}

  .degs{display:flex; flex-direction:column; gap:7px}
  .degrow{display:flex; align-items:center; gap:10px; font-size:13px}
  .degrow .pip{width:22px; height:22px; border-radius:50%; display:grid; place-items:center; font-size:11px; font-weight:700;
    background:#1a1c3a; border:1.5px solid var(--line); flex:none}
  .degrow.odd .pip{border-color:var(--odd); color:var(--odd); box-shadow:0 0 0 3px rgba(255,143,107,.1)}
  .degrow.even .pip{border-color:var(--even); color:var(--even)}
  .degrow .nm{color:var(--dim); flex:1}
  .degrow .dg{font-variant-numeric:tabular-nums; color:var(--ink); font-weight:600}
  .degrow .parity{font-size:11px; margin-left:6px}
  .degrow.odd .parity{color:var(--odd)}
  .degrow.even .parity{color:var(--even)}

  .verdict{margin-top:13px; padding:12px 13px; border-radius:12px; font-size:13px; line-height:1.6;
    background:rgba(255,255,255,.03); border:1px solid var(--line)}
  .verdict .big{font-family:var(--serif); font-weight:700; font-size:14.5px; letter-spacing:.03em}
  .verdict.ok{border-color:rgba(123,214,162,.35)} .verdict.ok .big{color:var(--even)}
  .verdict.no{border-color:rgba(255,143,107,.35)} .verdict.no .big{color:var(--odd)}
  .oddcount{font-variant-numeric:tabular-nums}

  .konig-tools{display:none; margin-top:12px; gap:8px; flex-direction:column}
  .konig-tools.show{display:flex}
  .kmini{font-size:12px; color:var(--faint); line-height:1.55}

  /* 關卡列 */
  .levels{display:flex; flex-wrap:wrap; gap:8px; margin-top:4px}
  .lvchip{position:relative; font-size:12.5px; color:var(--dim); cursor:pointer;
    background:rgba(255,255,255,.03); border:1px solid var(--line); padding:7px 12px; border-radius:10px;
    transition:border-color .2s, color .2s, transform .15s var(--e-pop)}
  .lvchip:hover{border-color:var(--fun); color:var(--ink); transform:translateY(-1px)}
  .lvchip.active{border-color:var(--fun); color:var(--ink); background:rgba(186,157,241,.12)}
  .lvchip.done::after{content:"✓"; color:var(--even); font-weight:700; margin-left:6px}
  .prog{display:flex; align-items:baseline; gap:8px; margin-top:12px; font-size:12.5px; color:var(--faint)}
  .prog .n{font-family:var(--serif); font-size:19px; font-weight:700; color:var(--fun); font-variant-numeric:tabular-nums; display:inline-block}
  .prog .n.bump{animation:bump .4s var(--e-pop)}
  @keyframes bump{0%{transform:scale(1)}45%{transform:scale(1.4)}100%{transform:scale(1)}}

  .allclear{display:none; margin-top:10px; padding:11px 13px; border-radius:12px; text-align:center; font-size:13px;
    background:linear-gradient(180deg,rgba(186,157,241,.16),rgba(255,134,200,.08)); border:1px solid rgba(186,157,241,.4); color:var(--ink)}
  .allclear.show{display:block; animation:pop .5s var(--e-pop)}
  @keyframes pop{0%{opacity:0;transform:scale(.9)}100%{opacity:1;transform:scale(1)}}

  .how{font-size:12.5px; color:var(--faint); line-height:1.7}
  .how kbd{font-family:var(--sans); font-size:11px; background:#20233f; border:1px solid var(--line); border-radius:5px; padding:1px 6px; color:var(--dim)}

  footer{margin-top:40px; text-align:center; color:var(--faint); font-size:12px; letter-spacing:.02em}

  @media (prefers-reduced-motion: reduce){
    .rise{transition:none!important} body.preload .rise{opacity:1;transform:none}
    .node .disc{transition:fill .15s, stroke .15s}
    .node.start .halo, .node.next .halo{animation:none; opacity:.8}
    .board.win{animation:none}
    .spark{display:none}
    .prog .n.bump, .allclear.show{animation:none}
    .btn,.lvchip{transition:border-color .2s, color .2s}
  }
</style>
</head>
<body class="preload">
<a class="home" href="../index.html" aria-label="回到首頁">← 回首頁</a>

<div class="wrap">
  <header>
    <span class="kicker rise">一 筆 畫</span>
    <h1 class="rise" style="--rd:.06s">一筆到底</h1>
    <p class="sub rise" style="--rd:.12s">每條線只能走一次，中途不提筆——你能一筆畫完嗎？</p>
  </header>

  <div class="stage">
    <!-- 棋盤 -->
    <section class="card boardcard rise" style="--rd:.18s" aria-label="一筆畫遊戲區">
      <div class="board-head">
        <div class="lv-name"><span id="lvName">三角形</span><span class="tag" id="lvTag">第 1 關</span></div>
        <div class="solvebadge" id="solveBadge">—</div>
      </div>
      <div class="board" id="board">
        <svg class="net" id="net" viewBox="0 0 100 100" role="img" aria-label="待畫的圖形">
          <defs>
            <linearGradient id="inkgrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#c9aef7"/>
              <stop offset="1" stop-color="#ff86c8"/>
            </linearGradient>
          </defs>
          <g id="gEdgeBase"></g>
          <path id="aim" class="aim"></path>
          <g id="gEdgeInk"></g>
          <g id="gNodes"></g>
        </svg>
      </div>
      <p class="status" id="status" aria-live="polite">點一個亮起的點開始。</p>
      <div class="controls">
        <button class="btn" id="btnUndo" disabled>↶ 撤回一步</button>
        <button class="btn ghost" id="btnReset">重來這關</button>
      </div>
    </section>

    <!-- 右欄 -->
    <div class="side">
      <section class="card panel rise" style="--rd:.24s">
        <h3><span class="dot"></span>奇點偵測器</h3>
        <p class="lead">Euler 1736 年的發現：一張圖能不能一筆畫，只要數「連著奇數條線的點」（奇點）有幾個就知道了。</p>
        <div class="degs" id="degs"></div>
        <div class="verdict" id="verdict"></div>
        <div class="konig-tools" id="konigTools">
          <button class="btn" id="btnReveal">為什麼走不完？</button>
          <button class="btn primary" id="btnPostwar" style="display:none">拆成戰後的 5 座橋 →</button>
          <button class="btn ghost" id="btnPrewar" style="display:none">← 復原成 1736 年的 7 座橋</button>
          <p class="kmini" id="kmini"></p>
        </div>
      </section>

      <section class="card panel rise" style="--rd:.30s">
        <h3><span class="dot"></span>關卡</h3>
        <div class="levels" id="levels"></div>
        <div class="prog">已破 <span class="n" id="progN">0</span> / <span id="progT">5</span> 關</div>
        <div class="allclear" id="allClear">🎉 五關全破！你已經是一筆畫大師。</div>
      </section>

      <section class="card panel rise" style="--rd:.36s">
        <h3><span class="dot"></span>怎麼玩</h3>
        <p class="how">
          點一個發亮的點起步，再點相鄰的點，線就會被墨水填滿；把每條線都走一次就過關。<br>
          鍵盤：按數字 <kbd>1</kbd>–<kbd>9</kbd> 走到那個點、<kbd>Z</kbd> 撤回、<kbd>R</kbd> 重來。
        </p>
      </section>
    </div>
  </div>

  <footer class="rise" style="--rd:.42s">資料來源：Euler 1736《Solutio problematis…》、Wikipedia</footer>
</div>

<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);
  const SVGNS = "http://www.w3.org/2000/svg";
  const RM = window.matchMedia("(prefers-reduced-motion: reduce)");
  let reduce = RM.matches;
  RM.addEventListener("change", e => { reduce = e.matches; });

  // ── localStorage（前綴 stroke.） ──
  const SKEY = "stroke.solved";
  const store = {
    get(){ try{ return JSON.parse(localStorage.getItem(SKEY)) || []; }catch(e){ return []; } },
    add(id){ const s=this.get(); if(!s.includes(id)){ s.push(id); try{ localStorage.setItem(SKEY, JSON.stringify(s)); }catch(e){} } }
  };

  // ── 關卡資料（座標為 viewBox 0..100） ──
  const LEVELS = [
    { id:"tri", name:"三角形",
      nodes:{ a:[50,16], b:[16,80], c:[84,80] },
      edges:[["a","b"],["b","c"],["c","a"]] },
    { id:"diag", name:"斜線方框",
      nodes:{ a:[22,22], b:[78,22], c:[78,78], d:[22,78] },
      edges:[["a","b"],["b","c"],["c","d"],["d","a"],["a","c"]] },
    { id:"star", name:"五芒星",
      nodes:{ v0:[50,12], v1:[13,42], v2:[28,84], v3:[72,84], v4:[87,42] },
      edges:[["v0","v2"],["v2","v4"],["v4","v1"],["v1","v3"],["v3","v0"]] },
    { id:"envelope", name:"信封",
      nodes:{ bl:[20,80], br:[80,80], tl:[20,44], tr:[80,44], ap:[50,14] },
      edges:[["bl","br"],["bl","tl"],["br","tr"],["tl","tr"],["tl","ap"],["tr","ap"],["bl","tr"],["br","tl"]] },
    { id:"konig", name:"柯尼斯堡七橋", konig:true,
      nodes:{ N:[34,15], A:[34,52], S:[34,89], B:[80,52] },
      labels:{ N:"北岸", A:"克奈普霍夫島", S:"南岸", B:"東島" },
      edges:[["A","N"],["A","N"],["A","S"],["A","S"],["A","B"],["B","N"],["B","S"]],
      postEdges:[["A","N"],["A","S"],["A","B"],["B","N"],["B","S"]] }
  ];
  const TOTAL = LEVELS.length;

  // ── 狀態 ──
  let L, ids, edges, edgeEls, cur, trail, used, usedStack, kmode; // kmode: "pre" | "post"
  let idx = 0;

  const gBase = $("#gEdgeBase"), gInk = $("#gEdgeInk"), gNodes = $("#gNodes");
  const aimEl = $("#aim");

  function coord(id){ return L.nodes[id]; }

  // 依模式取得目前的邊集合
  function curEdges(){ return (L.konig && kmode==="post") ? L.postEdges : L.edges; }

  // 平行邊的分組資訊 → 給每條邊一個彎曲量，讓重複的橋分開
  function buildEdges(){
    const raw = curEdges();
    const groups = {};
    raw.forEach(([u,v])=>{ const k=[u,v].sort().join("~"); groups[k]=(groups[k]||0)+1; });
    const seen = {};
    return raw.map(([u,v],i)=>{
      const key=[u,v].sort().join("~");
      const n=groups[key]; const r=(seen[key]=(seen[key]||0)); seen[key]++;
      const off = n>1 ? (r-(n-1)/2)*15 : 0;
      return { i, u, v, off, used:false };
    });
  }

  function pathD(u,v,off){
    const [x1,y1]=coord(u), [x2,y2]=coord(v);
    if(!off) return `M${x1} ${y1} L${x2} ${y2}`;
    const mx=(x1+x2)/2, my=(y1+y2)/2, dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1;
    const nx=-dy/len, ny=dx/len;
    return `M${x1} ${y1} Q${mx+nx*off} ${my+ny*off} ${x2} ${y2}`;
  }

  function degrees(list){
    const d={}; ids.forEach(id=>d[id]=0);
    list.forEach(e=>{ d[e.u]++; d[e.v]++; });
    return d;
  }
  function oddList(d){ return ids.filter(id=> d[id]%2===1); }

  // 合法起點：2 奇點→只能從奇點；0 奇點→任一點；其他(不可能)→仍允許任一點嘗試
  function validStarts(d){
    const odd=oddList(d);
    if(odd.length===2) return odd.slice();
    return ids.filter(id=> d[id]>0);
  }
  // 從 cur 出發、還沒走過、能到的相鄰點
  function nextNodes(){
    const s=new Set();
    edges.forEach(e=>{ if(e.used) return; if(e.u===cur) s.add(e.v); else if(e.v===cur) s.add(e.u); });
    return s;
  }
  function findEdge(a,b){
    return edges.find(e=> !e.used && ((e.u===a&&e.v===b)||(e.u===b&&e.v===a)));
  }

  // ── 建關 ──
  function loadLevel(i){
    idx=i; L=LEVELS[i]; ids=Object.keys(L.nodes);
    kmode="pre";
    renderAll();
  }
  function renderAll(){
    edges=buildEdges();
    cur=null; trail=[]; used=0; usedStack=[];
    edgeEls={};
    gBase.textContent=""; gInk.textContent=""; gNodes.textContent="";

    // 邊
    edges.forEach(e=>{
      const d=pathD(e.u,e.v,e.off);
      const base=document.createElementNS(SVGNS,"path");
      base.setAttribute("d",d); base.setAttribute("class","edge-base");
      gBase.appendChild(base);
      const ink=document.createElementNS(SVGNS,"path");
      ink.setAttribute("d",d); ink.setAttribute("class","edge-ink");
      gInk.appendChild(ink);
      const len=ink.getTotalLength();
      ink.style.strokeDasharray=len; ink.style.strokeDashoffset=len;
      ink.style.transition = reduce ? "none" : "stroke-dashoffset .5s var(--e-out)";
      edgeEls[e.i]={base,ink,len};
    });

    // 節點
    const numMap={}; ids.forEach((id,n)=>numMap[id]=n+1);
    ids.forEach(id=>{
      const [x,y]=coord(id);
      const g=document.createElementNS(SVGNS,"g");
      g.setAttribute("class","node"); g.setAttribute("tabindex","0");
      g.setAttribute("role","button"); g.dataset.id=id;
      const halo=document.createElementNS(SVGNS,"circle");
      halo.setAttribute("cx",x); halo.setAttribute("cy",y); halo.setAttribute("r",9); halo.setAttribute("class","halo");
      const disc=document.createElementNS(SVGNS,"circle");
      disc.setAttribute("cx",x); disc.setAttribute("cy",y); disc.setAttribute("r",5.2); disc.setAttribute("class","disc");
      const num=document.createElementNS(SVGNS,"text");
      num.setAttribute("x",x); num.setAttribute("y",y); num.setAttribute("class","num"); num.textContent=numMap[id];
      g.append(halo,disc,num);
      if(L.labels && L.labels[id]){
        const t=document.createElementNS(SVGNS,"text");
        const below = y>50; t.setAttribute("x",x); t.setAttribute("y", below? y+11 : y-9);
        t.setAttribute("class","lbl"); t.textContent=L.labels[id];
        g.appendChild(t);
      }
      g.addEventListener("click",()=>activate(id));
      g.addEventListener("keydown",ev=>{ if(ev.key==="Enter"||ev.key===" "){ ev.preventDefault(); activate(id);} });
      gNodes.appendChild(g);
      edgeEls["node_"+id]=g;
    });

    updateHeader();
    updateDetector();
    refreshNodeStates();
    setStatus(defaultHint());
    $("#btnUndo").disabled=true;
    $("#board").classList.remove("win");
    aimEl.style.opacity=0;
  }

  function nodeEl(id){ return edgeEls["node_"+id]; }

  function updateHeader(){
    $("#lvName").textContent = L.name;
    $("#lvTag").textContent = (L.konig && kmode==="post") ? "戰後的橋" : "第 "+(idx+1)+" 關";
    const d=degrees(edges), odd=oddList(d);
    const badge=$("#solveBadge");
    if(odd.length===0||odd.length===2){ badge.textContent="可一筆畫"; badge.className="solvebadge ok"; }
    else { badge.textContent="不可能"; badge.className="solvebadge no"; }
    // Königsberg 專屬工具
    const kt=$("#konigTools");
    if(L.konig){ kt.classList.add("show");
      $("#btnReveal").style.display = kmode==="pre" ? "" : "none";
      $("#btnPostwar").style.display = "none";
      $("#btnPrewar").style.display = kmode==="post" ? "" : "none";
      $("#kmini").textContent = kmode==="pre"
        ? "四塊陸地：兩座島與南北兩岸，之間架著 7 座橋。"
        : "二戰炸毀 2 座、又有 2 座改建為公路——如今剩 5 座，恰好只有兩個奇點。";
    } else { kt.classList.remove("show"); }
  }

  function updateDetector(){
    const d=degrees(edges), odd=oddList(d);
    const box=$("#degs"); box.textContent="";
    const numMap={}; ids.forEach((id,n)=>numMap[id]=n+1);
    ids.forEach(id=>{
      const isOdd = d[id]%2===1;
      const row=document.createElement("div");
      row.className="degrow "+(isOdd?"odd":"even");
      const nm = (L.labels && L.labels[id]) ? L.labels[id] : ("點 "+numMap[id]);
      row.innerHTML = `<span class="pip">${numMap[id]}</span>`+
        `<span class="nm">${nm}</span>`+
        `<span class="dg">${d[id]} 條</span>`+
        `<span class="parity">${isOdd?"奇":"偶"}</span>`;
      box.appendChild(row);
    });
    const v=$("#verdict");
    if(odd.length===0){
      v.className="verdict ok";
      v.innerHTML=`<span class="big">0 個奇點 → 回得了家</span><br>全部都是偶點，<b>任一點</b>都能起步，而且最後會回到出發點（尤拉迴路）。`;
    } else if(odd.length===2){
      v.className="verdict ok";
      v.innerHTML=`<span class="big">2 個奇點 → 可以，但有條件</span><br>必須從<b>其中一個奇點</b>起步、在<b>另一個奇點</b>收筆（尤拉路徑）。發亮的點就是起點。`;
    } else {
      v.className="verdict no";
      v.innerHTML=`<span class="big"><span class="oddcount">${odd.length}</span> 個奇點 → 不可能</span><br>一筆畫最多只容許 0 或 2 個奇點。四塊陸地全是奇點，怎麼走都會缺一座橋——這正是 Euler 的證明。`;
    }
  }

  function refreshNodeStates(){
    const d=degrees(edges);
    const starts=new Set(validStarts(d));
    const nexts = cur!==null ? nextNodes() : new Set();
    const odd = new Set(oddList(d));
    ids.forEach(id=>{
      const g=nodeEl(id); if(!g) return;
      g.classList.remove("cur","start","next","odd");
      if(cur===null){
        if(starts.has(id)) g.classList.add("start");
      } else {
        if(id===cur) g.classList.add("cur");
        else if(nexts.has(id)) g.classList.add("next");
      }
      // 死路時，若還沒開始，用奇點提示
      const label=(L.labels&&L.labels[id])?L.labels[id]:("點 "+(ids.indexOf(id)+1));
      g.setAttribute("aria-label", label+"，連著 "+d[id]+" 條線"+(odd.has(id)?"（奇點）":""));
    });
  }

  function defaultHint(){
    const d=degrees(edges), odd=oddList(d);
    if(odd.length===2) return "從<b>發亮的奇點</b>起步。";
    if(odd.length===0) return "全是偶點，<b>任一點</b>都能開始。";
    return "先試試看——再看看偵測器怎麼說。";
  }
  function setStatus(html, cls){
    const s=$("#status"); s.innerHTML=html; s.className="status"+(cls?(" "+cls):"");
  }

  // ── 互動 ──
  function activate(id){
    if(used===edges.length && edges.length>0) return; // 已完成
    if(cur===null){
      // 選起點（允許任意有邊的點）
      const d=degrees(edges);
      if(d[id]===0) return;
      cur=id; trail=[id];
      refreshNodeStates();
      setStatus("從 <b>"+labelOf(id)+"</b> 出發，接著點相鄰的點。");
      return;
    }
    if(id===cur){ return; }
    const e=findEdge(cur,id);
    if(!e){ bump(id); return; }
    // 走這條邊
    e.used=true; used++;
    usedStack.push(e.i);
    inkEdge(e.i);
    trail.push(id); cur=id;
    $("#btnUndo").disabled=false;
    if(used===edges.length){ win(); return; }
    refreshNodeStates();
    const rem=edges.length-used;
    if(nextNodes().size===0){
      setStatus("走不下去了，還剩 <b>"+rem+"</b> 條沒畫。<b>撤回</b>或<b>重來</b>換個起點。","dead");
    } else {
      setStatus("還剩 <b>"+rem+"</b> 條線。", null);
    }
  }
  function labelOf(id){ return (L.labels&&L.labels[id])?L.labels[id]:("點 "+(ids.indexOf(id)+1)); }

  function inkEdge(i){
    const el=edgeEls[i]; if(!el) return;
    if(reduce){ el.ink.style.transition="none"; }
    el.ink.style.strokeDashoffset = 0;
  }
  function unink(i){
    const el=edgeEls[i]; if(!el) return;
    el.ink.style.strokeDashoffset = el.len;
  }

  function bump(id){
    const g=nodeEl(id); if(!g) return;
    g.classList.add("shake");
    setTimeout(()=>g.classList.remove("shake"),340);
    setStatus("那兩點之間沒有還沒走過的線。","dead");
  }

  function undo(){
    if(used===0 || usedStack.length===0) return;
    // 依實際走訪順序還原最後一條邊（正確處理平行邊，如七橋的雙橋）
    const ei=usedStack.pop();
    const e=edges[ei];
    e.used=false; used--; unink(ei);
    trail.pop(); cur=trail[trail.length-1];
    if(used===0){ cur=null; trail=[]; $("#btnUndo").disabled=true; setStatus(defaultHint()); }
    else setStatus("還剩 <b>"+(edges.length-used)+"</b> 條線。");
    $("#board").classList.remove("win");
    refreshNodeStates();
  }

  function win(){
    refreshNodeStates();
    ids.forEach(id=>nodeEl(id).classList.remove("cur","next","start"));
    setStatus("✦ 一筆到底！每條線剛好走了一次。","win");
    $("#board").classList.add("win");
    const solveId = L.konig ? "konig" : L.id;
    const before = store.get().length;
    store.add(solveId);
    if(store.get().length!==before){ sparkle(); bumpProg(); }
    else sparkle();
    markLevels();
    checkAllClear();
  }

  function sparkle(){
    if(reduce) return;
    const board=$("#board");
    const chars=["✦","✧","★","✶","˚"];
    for(let n=0;n<16;n++){
      const s=document.createElement("span");
      s.className="spark"; s.textContent=chars[n%chars.length];
      const ang=Math.random()*Math.PI*2, dist=40+Math.random()*90;
      s.style.setProperty("--dx",(Math.cos(ang)*dist).toFixed(1)+"px");
      s.style.setProperty("--dy",(Math.sin(ang)*dist).toFixed(1)+"px");
      s.style.setProperty("--rot",(Math.random()*180-90).toFixed(0)+"deg");
      s.style.color = ["#c9aef7","#ff86c8","#f0c674"][n%3];
      board.appendChild(s);
      setTimeout(()=>s.remove(),1000);
    }
  }

  // ── Königsberg 專屬 ──
  function reveal(){
    const d=degrees(edges), odd=oddList(d);
    ids.forEach(id=>{
      const g=nodeEl(id);
      if(odd.includes(id)) g.classList.add("reveal-odd");
    });
    setStatus("四塊陸地<b>全是奇點</b>——這就是走不完的原因。","dead");
    $("#btnReveal").style.display="none";
    $("#btnPostwar").style.display="";
  }
  function toPostwar(){
    kmode="post";
    ids.forEach(id=>nodeEl(id).classList.remove("reveal-odd"));
    renderAll();
    setStatus("剩 5 座橋，只有兩個奇點了——現在你走得完。從發亮的島起步。");
  }
  function toPrewar(){
    kmode="pre";
    renderAll();
  }

  // ── 關卡列 / 進度 ──
  function buildLevelChips(){
    const wrap=$("#levels"); wrap.textContent="";
    LEVELS.forEach((lv,i)=>{
      const b=document.createElement("button");
      b.className="lvchip"; b.textContent=(i+1)+"　"+lv.name; b.dataset.i=i;
      b.addEventListener("click",()=>loadLevel(i));
      wrap.appendChild(b);
    });
    markLevels();
  }
  function markLevels(){
    const solved=store.get();
    document.querySelectorAll(".lvchip").forEach(c=>{
      const i=+c.dataset.i;
      c.classList.toggle("active", i===idx);
      c.classList.toggle("done", solved.includes(LEVELS[i].id));
    });
    $("#progN").textContent=solved.filter(s=>LEVELS.some(l=>l.id===s)).length;
  }
  function bumpProg(){
    const n=$("#progN"); n.classList.remove("bump"); void n.offsetWidth; n.classList.add("bump");
  }
  function checkAllClear(){
    const solved=store.get();
    const all=LEVELS.every(l=>solved.includes(l.id));
    $("#allClear").classList.toggle("show", all);
  }

  // ── 瞄準線（滑鼠追蹤，純視覺輔助） ──
  const net=$("#net");
  function svgPt(evt){
    try{ const p=net.createSVGPoint(); p.x=evt.clientX; p.y=evt.clientY;
      const m=net.getScreenCTM(); if(!m) return null; return p.matrixTransform(m.inverse()); }
    catch(e){ return null; }
  }
  net.addEventListener("pointermove",evt=>{
    if(cur===null || used===edges.length){ aimEl.style.opacity=0; return; }
    const p=svgPt(evt); if(!p) return;
    const [x,y]=coord(cur);
    aimEl.setAttribute("d",`M${x} ${y} L${p.x.toFixed(1)} ${p.y.toFixed(1)}`);
    aimEl.style.opacity=1;
  });
  net.addEventListener("pointerleave",()=>{ aimEl.style.opacity=0; });

  // ── 鍵盤 ──
  document.addEventListener("keydown",ev=>{
    if(ev.target.tagName==="INPUT") return;
    if(/^[1-9]$/.test(ev.key)){
      const n=+ev.key-1; if(n<ids.length){ activate(ids[n]); }
    } else if(ev.key==="z"||ev.key==="Z"||ev.key==="Backspace"){
      ev.preventDefault(); undo();
    } else if(ev.key==="r"||ev.key==="R"){ renderAll(); }
  });

  // ── 按鈕 ──
  $("#btnUndo").addEventListener("click",undo);
  $("#btnReset").addEventListener("click",()=>{ if(L.konig&&kmode==="post"){ renderAll(); } else renderAll(); });
  $("#btnReveal").addEventListener("click",reveal);
  $("#btnPostwar").addEventListener("click",toPostwar);
  $("#btnPrewar").addEventListener("click",toPrewar);

  // ── 啟動 ──
  buildLevelChips();
  loadLevel(0);
  markLevels();
  checkAllClear();
  requestAnimationFrame(()=>document.body.classList.remove("preload"));
})();
</script>
</body>
</html>
