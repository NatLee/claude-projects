<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日小專案 · 星圖索引</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="aurora" aria-hidden="true">
  <div class="blob" style="left:0%;  top:2%;    --nc: var(--c-trivia); animation-delay:-10s"></div>
  <div class="blob" style="right:0%; top:-4%;   --nc: var(--c-fun);    animation-delay:-38s"></div>
  <div class="blob" style="left:8%;  bottom:6%; --nc: var(--c-sci);    animation-delay:-60s"></div>
  <div class="blob" style="right:4%; bottom:0%; --nc: var(--c-learn);  animation-delay:-26s"></div>
</div>
<div id="grid-bg" aria-hidden="true"></div>

<div class="wrap">
  <header class="site-head">
    <div class="kicker rise" style="--rd:.05s">ONE STAR A DAY</div>
    <h1 class="rise" style="--rd:.12s">每日小專案</h1>
    <p class="lede rise" style="--rd:.18s">每天點亮一顆星——玩具、實驗、小工具。這裡是它們連成的夜空。</p>
    <div class="stats rise" style="--rd:.24s">
      <div class="stat"><b id="sN">0</b><span>顆星星</span></div>
      <div class="stat"><b id="sC">0</b><span>個星座</span></div>
      <div class="stat"><b id="sD">0</b><span>個夜晚</span></div>
    </div>
  </header>

  <section id="skywrap" class="rise" style="--rd:.3s" aria-label="星空圖">
    <canvas id="sky" aria-hidden="true"></canvas>
    <div id="sky-tip" aria-hidden="true"></div>
    <button type="button" id="scanBtn" aria-label="掃描星空：隨機挑一顆星"><span class="lbl">掃描星空</span></button>
    <p class="sky-hint" aria-hidden="true">☄ 一顆星＝一件作品・滑過探索・按「掃描」隨機挑一顆</p>
    <p class="sr-only">上方星空圖為視覺化索引，每顆星代表一件作品；完整清單請見下方卡片牆。</p>
  </section>

  <section id="hero" class="rise" style="--rd:.36s" aria-label="今日之星"></section>

  <section id="activity" class="rise" style="--rd:.42s" aria-label="產量統計">
    <div class="act">
      <div class="act-head">
        <h2>產　量</h2>
        <p class="act-sum" id="actSum"></p>
        <div class="act-seg" role="group" aria-label="聚合方式">
          <button type="button" id="actCal" aria-pressed="true">年月日</button>
          <button type="button" id="actCat" aria-pressed="false">分類</button>
        </div>
      </div>
      <div class="act-body">
        <div class="act-view on" id="actViewCal"></div>
        <div class="act-view" id="actViewCat"></div>
      </div>
    </div>
  </section>

  <div class="bar">
    <div class="search">
      <span class="ico" aria-hidden="true">🔍</span>
      <label class="sr-only" for="q">搜尋作品</label>
      <input id="q" type="search" placeholder="在星空中搜尋：名稱、介紹或類別…" autocomplete="off">
      <kbd aria-hidden="true">/</kbd>
      <button type="button" id="qx" aria-label="清除搜尋">✕</button>
    </div>
    <nav class="chips" id="chips" aria-label="類別篩選"></nav>
    <div class="tools">
      <div class="seg" role="group" aria-label="排列方式">
        <button type="button" id="grpDate" aria-pressed="true"  aria-label="依時間排列（星軌）">星軌</button>
        <button type="button" id="grpCat"  aria-pressed="false" aria-label="依分類排列（星座）">星座</button>
      </div>
      <button type="button" id="rand">🌠 隨機觀星</button>
    </div>
  </div>

  <p class="result" id="result"></p>

  <main id="wall"></main>

  <div class="empty" id="empty">
    <div class="e-ico" aria-hidden="true">🔭</div>
    <p>這片天區找不到星星。<br>換個關鍵字，或看看其他星座。</p>
    <button type="button" id="resetBtn">回到整片星空</button>
  </div>

  <footer>
    每天點亮一顆星，慢慢連成一整片星空。
  </footer>
</div>
<span class="sr-only" id="live" role="status" aria-live="polite"></span>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
