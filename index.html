<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日小專案 · 夜空天文台</title>
<style>
  :root {
    --bg: #04060f;
    --bg-soft: #0a0f22;
    --ink: #eef1ff;
    --dim: #a6aed2;
    --faint: #6d7699;
    --line: rgba(150, 165, 220, .16);
    --gold: #f0c674;
    --c-trivia: #64b5f6;   /* 網路趣聞・冷知識 */
    --c-odd:    #f48fb1;   /* 奇聞軼事（玫瑰粉） */
    --c-sci:    #4dd0e1;   /* 科學趣聞（青碧） */
    --c-learn:  #ffb74d;   /* 學習新知 */
    --c-tool:   #81c784;   /* 生活痛點小工具 */
    --c-fun:    #ba9df1;   /* 創意・娛樂 */
    --serif: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background:
      radial-gradient(120% 90% at 50% -10%, #0c1330 0%, transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::selection { background: rgba(240, 198, 116, .3); }
  .sr-only {
    position: absolute; width: 1px; height: 1px; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap;
  }

  /* ── 天幕：星塵畫布與星雲 ───────────────────────────
     星雲不再對整個視窗做即時模糊濾鏡運算，
     改用「預先柔化」的多段 radial-gradient + 純 transform 動畫。 */
  #dust { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  #nebula {
    position: fixed; inset: -18%; z-index: 0; pointer-events: none;
    opacity: .8; will-change: transform;
  }
  .neb {
    position: absolute; width: 56vmax; height: 56vmax; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%,
      color-mix(in srgb, var(--nc) 34%, transparent) 0%,
      color-mix(in srgb, var(--nc) 22%, transparent) 24%,
      color-mix(in srgb, var(--nc) 9%, transparent) 46%,
      transparent 68%);
    mix-blend-mode: screen; opacity: .16; will-change: transform;
    animation: neb-drift 96s ease-in-out infinite alternate;
  }
  @keyframes neb-drift {
    from { transform: translate3d(-2.5%, -2%, 0) scale(1); }
    to   { transform: translate3d(3%, 3.5%, 0) scale(1.14); }
  }

  .wrap { position: relative; z-index: 2; max-width: 1160px; margin: 0 auto; padding: 0 22px 72px; }

  /* ── 頁首 ─────────────────────────────────────────── */
  header { text-align: center; padding: 38px 0 2px; }
  .scope { display: block; margin: 0 auto 6px; opacity: .9; }
  .scope .glint { animation: glint 3.4s ease-in-out infinite; transform-origin: 106px 7px; }
  @keyframes glint {
    0%, 100% { opacity: .5; transform: scale(.85); }
    50%      { opacity: 1;  transform: scale(1.15); }
  }
  .kicker {
    display: inline-flex; align-items: center; gap: 14px;
    font-size: 12px; letter-spacing: .42em; text-indent: .42em;
    color: var(--gold); font-family: var(--serif); margin-bottom: 12px;
  }
  .kicker::before, .kicker::after {
    content: ""; width: 44px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(240,198,116,.55));
  }
  .kicker::after { background: linear-gradient(270deg, transparent, rgba(240,198,116,.55)); }
  h1 {
    font-family: var(--serif); font-weight: 700;
    font-size: clamp(34px, 6vw, 56px); letter-spacing: .22em; text-indent: .22em;
    text-shadow: 0 0 34px rgba(140, 165, 255, .35);
  }
  .subtitle { margin-top: 12px; color: var(--dim); font-size: 15px; line-height: 1.95; }
  .subtitle .count {
    color: var(--gold); font-weight: 700; font-variant-numeric: tabular-nums;
    text-shadow: 0 0 14px rgba(240, 198, 116, .5);
  }

  /* ── 今日之星：鑲金邊的觀測日誌卡 ───────────────── */
  #hero { max-width: 920px; margin: 28px auto 0; }
  .h-frame {
    position: relative; border-radius: 18px; padding: 22px 26px;
    background:
      radial-gradient(130% 170% at 10% -25%, color-mix(in srgb, var(--cc, var(--gold)) 13%, transparent), transparent 55%),
      linear-gradient(165deg, rgba(20, 27, 54, .9), rgba(8, 12, 28, .93));
    border: 1px solid rgba(240, 198, 116, .34);
    box-shadow:
      inset 0 0 0 1px rgba(240, 198, 116, .08),
      inset 0 0 60px rgba(4, 6, 15, .5),
      0 18px 50px rgba(0, 0, 0, .42);
    transition: border-color .3s, box-shadow .3s, transform .3s;
  }
  .h-frame::before, .h-frame::after {
    content: ""; position: absolute; width: 26px; height: 26px; pointer-events: none;
    border: 1.5px solid rgba(240, 198, 116, .7); transition: border-color .3s;
  }
  .h-frame::before { top: 7px; left: 7px; border-right: 0; border-bottom: 0; border-top-left-radius: 12px; }
  .h-frame::after  { bottom: 7px; right: 7px; border-left: 0; border-top: 0; border-bottom-right-radius: 12px; }
  #hero:hover .h-frame, #hero:focus-within .h-frame, #hero.star-lit .h-frame {
    border-color: rgba(240, 198, 116, .62); transform: translateY(-2px);
    box-shadow:
      inset 0 0 0 1px rgba(240, 198, 116, .12),
      inset 0 0 60px rgba(4, 6, 15, .5),
      0 18px 50px rgba(0, 0, 0, .42),
      0 0 36px rgba(240, 198, 116, .14);
  }
  #hero:hover .h-frame::before, #hero:hover .h-frame::after,
  #hero.star-lit .h-frame::before, #hero.star-lit .h-frame::after { border-color: rgba(240, 198, 116, 1); }
  .h-kicker {
    display: flex; align-items: center; gap: 14px;
    font-family: var(--serif); font-size: 11.5px; letter-spacing: .34em; text-indent: .02em;
    color: var(--gold);
  }
  .h-kicker .h-date { color: var(--dim); letter-spacing: .18em; font-variant-numeric: tabular-nums; }
  .h-kicker::after {
    content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(240, 198, 116, .4), transparent);
  }
  .h-body { display: flex; align-items: center; gap: 24px; margin-top: 18px; }
  .h-emoji {
    flex: none; width: 86px; height: 86px; display: grid; place-items: center;
    font-size: 42px; border-radius: 50%;
    background: radial-gradient(circle at 38% 30%, color-mix(in srgb, var(--cc, var(--gold)) 28%, transparent), rgba(10, 14, 32, .5) 72%);
    border: 1px solid color-mix(in srgb, var(--cc, var(--gold)) 45%, transparent);
    box-shadow: 0 0 28px color-mix(in srgb, var(--cc, var(--gold)) 20%, transparent), inset 0 0 18px rgba(0, 0, 0, .35);
  }
  .h-main { min-width: 0; flex: 1; }
  .h-tag {
    display: inline-block; font-size: 11.5px; padding: 3px 11px; border-radius: 999px;
    color: var(--cc, var(--gold));
    border: 1px solid color-mix(in srgb, var(--cc, var(--gold)) 45%, transparent);
    background: color-mix(in srgb, var(--cc, var(--gold)) 9%, transparent);
    letter-spacing: 1px;
  }
  .h-title {
    font-family: var(--serif); font-weight: 700; margin: 9px 0 6px;
    font-size: clamp(22px, 3.4vw, 30px); letter-spacing: .1em;
    text-shadow: 0 0 22px color-mix(in srgb, var(--cc, var(--gold)) 32%, transparent);
  }
  .h-desc { color: var(--dim); font-size: 14px; line-height: 1.95; max-width: 62ch; }
  .h-cta {
    flex: none; display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 999px; text-decoration: none;
    color: #241c06; font-weight: 700; font-size: 14px; letter-spacing: 2px;
    background: linear-gradient(135deg, #f6d795, var(--gold));
    box-shadow: 0 6px 22px rgba(240, 198, 116, .26);
    transition: transform .25s, box-shadow .25s;
  }
  .h-cta:hover, .h-cta:focus-visible { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(240, 198, 116, .42); }

  /* ── 控制列：模式切換、星座籤與隨機觀星 ─────────── */
  .controls {
    display: flex; flex-wrap: wrap; gap: 12px 18px;
    justify-content: center; align-items: center; margin: 26px 0 4px;
  }
  .mode {
    display: inline-flex; padding: 4px; border-radius: 999px;
    border: 1px solid var(--line); background: rgba(10, 15, 34, .62);
    backdrop-filter: blur(8px);
  }
  .mode button {
    font-family: inherit; font-size: 13.5px; letter-spacing: 2px;
    color: var(--dim); background: none; border: 0; cursor: pointer;
    padding: 7px 18px; border-radius: 999px; transition: color .25s, background .25s, box-shadow .25s;
  }
  .mode button[aria-pressed="true"] {
    color: #241c06; font-weight: 700;
    background: linear-gradient(135deg, #f6d795, var(--gold));
    box-shadow: 0 0 18px rgba(240, 198, 116, .35);
  }
  .mode button:not([aria-pressed="true"]):hover { color: var(--ink); }

  .chips { display: inline-flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .chip {
    font-family: inherit; font-size: 13px; letter-spacing: 1px;
    display: inline-flex; align-items: center; gap: 7px;
    color: var(--dim); background: rgba(10, 15, 34, .55);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 7px 15px; cursor: pointer;
    transition: color .25s, border-color .25s, box-shadow .25s, background .25s;
  }
  .chip .dot { color: var(--cc, var(--gold)); font-size: 11px; transition: text-shadow .25s; }
  .chip .n {
    font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums;
    transition: color .25s;
  }
  .chip:hover { color: var(--ink); border-color: color-mix(in srgb, var(--cc, var(--gold)) 55%, transparent); }
  .chip:hover .n { color: var(--dim); }
  .chip[aria-pressed="true"] {
    color: var(--cc, var(--gold));
    border-color: color-mix(in srgb, var(--cc, var(--gold)) 65%, transparent);
    background: color-mix(in srgb, var(--cc, var(--gold)) 10%, transparent);
    box-shadow: 0 0 16px color-mix(in srgb, var(--cc, var(--gold)) 25%, transparent);
  }
  .chip[aria-pressed="true"] .dot { text-shadow: 0 0 10px var(--cc, var(--gold)); }
  .chip[aria-pressed="true"] .n { color: color-mix(in srgb, var(--cc, var(--gold)) 75%, var(--ink)); }

  .rand {
    font-family: inherit; font-size: 13px; letter-spacing: 1.5px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--gold); background: rgba(40, 32, 12, .38);
    border: 1px solid rgba(240, 198, 116, .45); border-radius: 999px; padding: 7px 17px;
    transition: color .25s, border-color .25s, box-shadow .25s, transform .25s, opacity .25s;
  }
  .rand:hover:not([disabled]) {
    color: #ffe9b8; border-color: rgba(240, 198, 116, .8);
    box-shadow: 0 0 18px rgba(240, 198, 116, .28); transform: translateY(-1px);
  }
  .rand[disabled] { opacity: .55; cursor: default; }

  /* ── 星圖 ─────────────────────────────────────────── */
  #skyWrap { margin-top: 18px; }
  body[data-mode="list"] #skyWrap { display: none; }
  #sky {
    position: relative; height: clamp(460px, 60vh, 620px);
    border: 1px solid var(--line); border-radius: 26px; overflow: hidden;
    background:
      radial-gradient(90% 70% at 50% 8%, rgba(24, 34, 72, .5), transparent 70%),
      linear-gradient(180deg, rgba(12, 18, 42, .55), rgba(4, 7, 16, .7));
    box-shadow: inset 0 0 90px rgba(0, 0, 0, .55), 0 24px 70px rgba(0, 0, 0, .45);
  }
  #sky::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
    box-shadow: inset 0 0 120px 30px rgba(2, 4, 10, .55);
  }
  #lines { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .grat { stroke: var(--gold); opacity: .055; fill: none; stroke-dasharray: 2 5; }
  .cline {
    fill: none; stroke-width: .28; stroke-linecap: round;
    stroke-dasharray: 1.6 2.4; opacity: 0; transition: opacity .6s ease;
  }
  .cline.lit { opacity: .5; }
  /* 未觀測星域：空星座的極淡虛線輪廓與幽靈星，靜候第一顆星 */
  .gline { stroke-dasharray: .9 2.6; opacity: .15; }
  .gline.lit { opacity: .38; }
  .gstar { fill: none; stroke-width: .22; opacity: .28; }
  .const-label.await { opacity: .58; }
  .const-label.await:hover, .const-label.await.on { opacity: .95; }

  /* 隨機觀星的柔光掃束 */
  #sweep {
    position: absolute; top: 0; bottom: 0; left: 0; width: 150px; margin-left: -75px;
    pointer-events: none; opacity: 0; z-index: 8;
    background:
      radial-gradient(50% 40% at 50% 50%, rgba(255, 241, 204, .13), transparent 72%),
      linear-gradient(90deg, transparent, rgba(240, 222, 180, .09) 38%, rgba(255, 244, 214, .2) 50%, rgba(240, 222, 180, .09) 62%, transparent);
    will-change: transform, opacity;
  }

  .const-label {
    position: absolute; transform: translate(-50%, -50%); z-index: 5;
    font-family: var(--serif); font-size: 13.5px; letter-spacing: .24em; text-indent: .24em;
    color: var(--cc); background: none; border: 0; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 12px; opacity: .8; transition: opacity .45s, text-shadow .3s;
    animation: fade-in .8s ease 1s backwards;
  }
  @keyframes fade-in { from { opacity: 0; } }
  .const-label .cnt {
    font-size: 10.5px; letter-spacing: .3em; text-indent: .3em;
    color: var(--faint); font-family: inherit;
  }
  .const-label:hover, .const-label.on { opacity: 1; text-shadow: 0 0 16px var(--cc); }
  .const-label:hover .cnt, .const-label.on .cnt { color: var(--cc); }
  #sky[data-active] .const-label:not(.on) { opacity: .28; }
  .const-label:focus-visible, .chip:focus-visible, .mode button:focus-visible,
  .rand:focus-visible, .h-cta:focus-visible, .c-btn:focus-visible, .c-x:focus-visible,
  .g-card:focus-visible {
    outline: 2px solid var(--gold); outline-offset: 3px; border-radius: 8px;
  }

  .star {
    position: absolute; z-index: 6; width: var(--s); height: var(--s);
    transform: translate(-50%, -50%); border-radius: 50%;
    transition: opacity .5s, filter .5s;
    touch-action: manipulation;
    /* 開場儀式：依日期由舊到新逐顆點亮（--ld 由 JS 配置） */
    animation: star-in .45s ease-out backwards;
    animation-delay: var(--ld, 0s);
  }
  @keyframes star-in {
    from { opacity: 0; transform: translate(-50%, -50%) scale(.2); }
  }
  .star .core {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, var(--cc) 42%, transparent 72%);
    animation: breathe var(--dur, 3.6s) ease-in-out infinite;
    animation-delay: var(--ph, 0s);
    transition: transform .3s ease;
  }
  .star::before {
    content: ""; position: absolute; inset: -130%; border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--cc) 30%, transparent), transparent 68%);
    opacity: .8; transition: opacity .3s, transform .3s;
  }
  .star:hover .core, .star:focus-visible .core, .star.picked .core { transform: scale(1.45); animation-play-state: paused; }
  .star:hover::before, .star:focus-visible::before, .star.picked::before { opacity: 1; transform: scale(1.35); }
  @keyframes breathe {
    0%, 100% { opacity: .72; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.22); }
  }
  .star .name {
    position: absolute; top: calc(100% + 9px); left: 50%; transform: translateX(-50%);
    white-space: nowrap; font-size: 11.5px; letter-spacing: 2px; color: var(--faint);
    opacity: .6; transition: color .3s, opacity .3s; pointer-events: none;
  }
  /* 星名避讓：貼近星座標籤或其他星名時翻到星星上方 */
  .star .name.up { top: auto; bottom: calc(100% + 9px); }
  .star:hover .name, .star:focus-visible .name, .star.picked .name {
    color: var(--cc); opacity: 1; text-shadow: 0 0 12px color-mix(in srgb, var(--cc) 60%, transparent);
  }
  /* 被篩掉的星：淡出、關閉指標事件（JS 同步移出 tab 順序） */
  #sky[data-active] .star:not(.on) { opacity: .14; filter: saturate(.15); pointer-events: none; }
  .star:focus-visible { outline: 1.5px solid var(--gold); outline-offset: 8px; }

  /* 今日之星 */
  .star.today::after {
    content: ""; position: absolute; inset: -80%; border-radius: 50%;
    border: 1px solid rgba(240, 198, 116, .65);
    animation: halo 2.8s ease-out infinite;
  }
  @keyframes halo {
    0%   { transform: scale(.45); opacity: .95; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .star.today .core {
    background: radial-gradient(circle, #fff 0%, #ffe9b8 30%, var(--cc) 55%, transparent 75%);
    box-shadow: 0 0 22px 4px rgba(240, 198, 116, .45);
  }
  /* hero 主打卡與星圖上那顆星的呼應：hover hero 時星也亮起 */
  .star.today.hero-lit .core { transform: scale(1.55); animation-play-state: paused; box-shadow: 0 0 30px 8px rgba(240, 198, 116, .6); }
  .star.today.hero-lit::before { opacity: 1; transform: scale(1.5); }
  .star.today.hero-lit .name { color: var(--gold); opacity: 1; }
  .star.today .badge {
    position: absolute; bottom: calc(100% + 14px); left: 50%; transform: translateX(-50%);
    font-size: 10.5px; letter-spacing: .34em; text-indent: .34em; white-space: nowrap;
    color: var(--gold); font-family: var(--serif);
    text-shadow: 0 0 12px rgba(240, 198, 116, .65); pointer-events: none;
  }

  .sky-hint { text-align: center; color: var(--faint); font-size: 12.5px; letter-spacing: 2px; margin-top: 14px; }

  /* ── 星座導覽帶：六類各一小卡（色點＋名稱＋件數＋定位），點擊即篩選 ── */
  #guide { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
  .g-card {
    font-family: inherit; text-align: left; cursor: pointer;
    display: flex; flex-direction: column; gap: 6px;
    padding: 13px 16px 12px; border-radius: 14px;
    color: var(--dim); background: rgba(8, 12, 28, .52);
    border: 1px solid var(--line);
    transition: border-color .25s, background .25s, box-shadow .25s, transform .25s;
  }
  .g-card:hover { border-color: color-mix(in srgb, var(--cc) 50%, transparent); transform: translateY(-1px); }
  .g-top { display: flex; align-items: center; gap: 9px; width: 100%; }
  .g-dot { flex: none; width: 8px; height: 8px; border-radius: 50%; background: var(--cc); box-shadow: 0 0 9px var(--cc); }
  .g-name { color: var(--ink); font-size: 13.5px; font-weight: 700; letter-spacing: 1px; }
  .g-n {
    margin-left: auto; font-size: 11px; color: var(--faint);
    letter-spacing: 1px; font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .g-note { font-size: 12px; color: var(--faint); line-height: 1.75; }
  .g-card[aria-pressed="true"] {
    border-color: color-mix(in srgb, var(--cc) 65%, transparent);
    background: color-mix(in srgb, var(--cc) 8%, rgba(8, 12, 28, .52));
    box-shadow: 0 0 18px color-mix(in srgb, var(--cc) 18%, transparent);
  }
  .g-card[aria-pressed="true"] .g-name { color: var(--cc); }
  .g-card[aria-pressed="true"] .g-n { color: color-mix(in srgb, var(--cc) 70%, var(--ink)); }
  @media (max-width: 880px) {
    #guide { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── 資訊卡 ───────────────────────────────────────── */
  #card {
    position: fixed; z-index: 40; width: min(330px, 88vw);
    pointer-events: none; opacity: 0; transform: translateY(8px) scale(.97);
    transition: opacity .22s ease, transform .22s ease;
    background: linear-gradient(160deg, rgba(22, 29, 58, .94), rgba(10, 14, 32, .94));
    border: 1px solid color-mix(in srgb, var(--cc, #8892c2) 45%, transparent);
    border-radius: 16px; padding: 16px 18px 14px;
    box-shadow: 0 20px 55px rgba(0, 0, 0, .6),
                0 0 30px color-mix(in srgb, var(--cc, #8892c2) 14%, transparent);
    backdrop-filter: blur(10px);
  }
  #card.show { opacity: 1; transform: translateY(0) scale(1); }
  #card.sheet { left: 14px !important; right: 14px; bottom: 14px; top: auto !important; width: auto; }
  .c-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; }
  .c-date { font-size: 12px; color: var(--faint); letter-spacing: 1.5px; font-variant-numeric: tabular-nums; }
  .c-tag {
    font-size: 11px; padding: 2.5px 10px; border-radius: 999px; white-space: nowrap;
    color: var(--cc, var(--gold));
    border: 1px solid color-mix(in srgb, var(--cc, var(--gold)) 45%, transparent);
    background: color-mix(in srgb, var(--cc, var(--gold)) 10%, transparent);
  }
  #card h3 { font-size: 17.5px; letter-spacing: 1px; line-height: 1.5; }
  #card h3 .emoji { margin-right: 8px; }
  #card p { font-size: 13px; color: var(--dim); line-height: 1.9; margin-top: 6px; }
  .c-go { display: block; margin-top: 10px; font-size: 12px; letter-spacing: 2px; color: var(--cc, var(--gold)); opacity: .85; }

/* ==========================================================================
 * 以下為「夜空天文台」渲染引擎：星座配置、星圖、清單、資訊卡、星塵與流星
 * ========================================================================== */
/* 六大星座：上排三座、下排三座（座標為 #sky 的百分比） */
const CAT_META = {
  "網路趣聞・冷知識": { key: "trivia", color: "var(--c-trivia)", cx: 18, cy: 33, rx: 11, ry: 15, lx: 17, ly: 8 },
  "奇聞軼事":         { key: "odd",    color: "var(--c-odd)",    cx: 50, cy: 31, rx: 11, ry: 14, lx: 50, ly: 8 },
  "生活痛點小工具":   { key: "tool",   color: "var(--c-tool)",   cx: 82, cy: 33, rx: 11, ry: 15, lx: 83, ly: 8 },
  "學習新知":         { key: "learn",  color: "var(--c-learn)",  cx: 18, cy: 72, rx: 11, ry: 13, lx: 17, ly: 95 },
  "科學趣聞":         { key: "sci",    color: "var(--c-sci)",    cx: 50, cy: 74, rx: 11, ry: 12, lx: 50, ly: 95 },
  "創意・娛樂":       { key: "fun",    color: "var(--c-fun)",    cx: 82, cy: 72, rx: 11, ry: 14, lx: 83, ly: 95 },
};
const CAT_NAMES = Object.keys(CAT_META);

/* 動態監聽 reduced-motion（隨系統設定即時啟停動畫，非僅載入時讀一次） */
const mReduced = matchMedia("(prefers-reduced-motion: reduce)");
const reduced = () => mReduced.matches;

const $ = id => document.getElementById(id);
/* HTML 轉義：所有以 innerHTML 內插的資料欄位一律經過這裡 */
const esc = s => String(s).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const liveEl = $("live");
function announce(msg) {
  liveEl.textContent = "";
  setTimeout(() => { liveEl.textContent = msg; }, 40);
}

/* 由字串生成穩定的偽亂數（同一顆星每天開啟都落在同個位置） */
function hashStr(s) {
  let x = 2166136261 >>> 0;
  for (const ch of s) { x ^= ch.codePointAt(0); x = Math.imul(x, 16777619) >>> 0; }
  return x;
}
function seeded(seed) {
  let t = seed >>> 0;
  return function () {
    t = (t + 0x6D2B79F5) >>> 0;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

/* ── 星座配置：黃金角螺旋佈點 + 斥力鬆弛，避免星星互相貼疊 ── */
function layoutStars() {
  const pts = [];
  for (const cat of CAT_NAMES) {
    const m = CAT_META[cat];
    const members = [];
    PROJECTS.forEach((p, gi) => { if (p.category === cat) members.push({ p, gi }); });
    const n = members.length;
    members.forEach(({ p, gi }, i) => {
      const rnd = seeded(hashStr(p.dir));
      const ang = i * 2.399963 + rnd() * 6.283;
      const rad = Math.sqrt((i + 0.55) / n);
      pts.push({
        p, gi, cat,
        x: m.cx + Math.cos(ang) * m.rx * rad + (rnd() - 0.5) * 4,
        y: m.cy + Math.sin(ang) * m.ry * rad + (rnd() - 0.5) * 4,
      });
    });
  }
  /* 鬆弛：在等比空間中把太近的星推開 */
  for (let iter = 0; iter < 60; iter++) {
    let moved = false;
    for (let a = 0; a < pts.length; a++) {
      for (let b = a + 1; b < pts.length; b++) {
        const dx = (pts[a].x - pts[b].x) * 1.8;
        const dy = pts[a].y - pts[b].y;
        const d = Math.hypot(dx, dy) || 0.01;
        const min = 10.5;
        if (d < min) {
          const push = (min - d) / 2;
          const ux = dx / d, uy = dy / d;
          pts[a].x += ux * push / 1.8; pts[a].y += uy * push;
          pts[b].x -= ux * push / 1.8; pts[b].y -= uy * push;
          moved = true;
        }
      }
    }
    if (!moved) break;
  }
  for (const pt of pts) {
    pt.x = Math.min(93, Math.max(7, pt.x));
    pt.y = Math.min(85, Math.max(15, pt.y));
    pt.size = pt.gi === 0 ? 30 : Math.max(13, 24 - pt.gi * 0.55);
  }
  return pts;
}

/* ── 星名避讓：估算星名文字盒，逼近星座標籤帶或彼此重疊時翻到星星上方 ── */
function resolveNameOverlaps(pts) {
  const W = 1000, H = 600, CW = 13.5, NH = 15;
  const box = (pt, up) => {
    const w = pt.p.title.length * CW + 6;
    const x = pt.x / 100 * W, y = pt.y / 100 * H, half = pt.size / 2;
    const top = up ? y - half - 9 - NH : y + half + 9;
    return { l: x - w / 2, r: x + w / 2, t: top, b: top + NH };
  };
  const hit = (A, B) => A.l < B.r && B.l < A.r && A.t < B.b && B.t < A.b;
  /* 貼近底部星座標籤（如「深夜電台」）→ 一律翻上；今日之星上方有徽章，不翻 */
  for (const pt of pts) pt.nameUp = pt.gi !== 0 && pt.y >= 84;
  const ordered = [...pts].sort((a, b) => a.gi - b.gi);
  for (let i = 0; i < ordered.length; i++) {
    for (let j = i + 1; j < ordered.length; j++) {
      const A = ordered[i], B = ordered[j];
      if (hit(box(A, A.nameUp), box(B, B.nameUp)) &&
          B.gi !== 0 && !B.nameUp && B.y > 24 && !hit(box(A, A.nameUp), box(B, true))) {
        B.nameUp = true;
      }
    }
  }
}

const skyEl = document.getElementById("sky");
const clinesEl = document.getElementById("clines");
const sweepEl = document.getElementById("sweep");
const starPts = layoutStars();
resolveNameOverlaps(starPts);

/* ── 今日之星 hero 主打卡（直接取 PROJECTS[0] 渲染） ── */
function renderHero() {
  const p = PROJECTS[0];
  const m = CAT_META[p.category] || { color: "var(--gold)" };
  const hero = $("hero");
  hero.style.setProperty("--cc", m.color);
  hero.innerHTML = `
    <div class="h-frame">
      <p class="h-kicker">觀測日誌 · 今日之星<span class="h-date">${esc(p.date)}</span></p>
      <div class="h-body">
        <span class="h-emoji" aria-hidden="true">${esc(p.emoji)}</span>
        <div class="h-main">
          <span class="h-tag">${esc(p.category)}</span>
          <h2 class="h-title">${esc(p.title)}</h2>
          <p class="h-desc">${esc(p.desc)}</p>
        </div>
        <a class="h-cta" href="./${esc(p.dir)}/index.html">進入作品 <span aria-hidden="true">→</span></a>
      </div>
    </div>`;
  /* hero ⇄ 星圖脈動呼應：hover / 聚焦 hero 時，星圖上的今日之星一起亮起 */
  const link = on => {
    const s = skyEl.querySelector(".star.today");
    if (s) s.classList.toggle("hero-lit", on);
  };
  hero.addEventListener("pointerenter", () => link(true));
  hero.addEventListener("pointerleave", () => link(false));
  hero.addEventListener("focusin", () => link(true));
  hero.addEventListener("focusout", () => link(false));
}

/* ── 星圖渲染 ── */
function renderSky() {
  const N = PROJECTS.length;
  /* 星座名（即篩選鈕） */
  for (const cat of CAT_NAMES) {
    const m = CAT_META[cat];
    const count = PROJECTS.filter(p => p.category === cat).length;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "const-label";
    btn.dataset.cat = cat;
    btn.style.setProperty("--cc", m.color);
    btn.style.left = m.lx + "%";
    btn.style.top = m.ly + "%";
    /* 尚無作品的星座：極淡的「未觀測星域」標籤，靜候第一顆星 */
    if (!count) btn.classList.add("await");
    btn.innerHTML = `<span>${esc(cat)}</span><span class="cnt">${count ? `✦ ${count} 星` : "未觀測"}</span>`;
    btn.setAttribute("aria-pressed", "false");
    btn.addEventListener("click", () => toggleCat(cat));
    skyEl.appendChild(btn);
  }
  /* 每一顆星（開場儀式：依日期由舊到新逐顆點亮，總長約 1.2s） */
  for (const pt of starPts) {
    const m = CAT_META[pt.cat];
    const a = document.createElement("a");
    a.className = "star" + (pt.gi === 0 ? " today" : "");
    a.href = `./${pt.p.dir}/index.html`;
    a.dataset.cat = pt.cat;
    a.dataset.gi = pt.gi;
    a.style.left = pt.x + "%";
    a.style.top = pt.y + "%";
    a.style.setProperty("--s", pt.size.toFixed(1) + "px");
    a.style.setProperty("--cc", m.color);
    a.style.setProperty("--ld", ((N - 1 - pt.gi) * 0.044).toFixed(3) + "s");
    const rnd = seeded(hashStr(pt.p.title));
    a.style.setProperty("--dur", (2.8 + rnd() * 3.2).toFixed(2) + "s");
    a.style.setProperty("--ph", (-rnd() * 4).toFixed(2) + "s");
    a.setAttribute("aria-label", `${pt.p.title}（${pt.p.date}・${pt.p.category}）${pt.p.desc}`);
    a.innerHTML = `<span class="core"></span>` +
                  `<span class="name${pt.nameUp ? " up" : ""}">${esc(pt.p.title)}</span>` +
                  (pt.gi === 0 ? `<span class="badge">今日之星</span>` : "");
    skyEl.appendChild(a);
  }
  /* 星座連線（依時間順序把星連起來） */
  for (const cat of CAT_NAMES) {
    const m = CAT_META[cat];
    const members = starPts.filter(pt => pt.cat === cat).sort((u, v) => v.gi - u.gi);
    const poly = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
    poly.setAttribute("class", "cline " + m.key);
    poly.setAttribute("points", members.map(pt => `${pt.x.toFixed(2)},${(pt.y * 0.62).toFixed(2)}`).join(" "));
    poly.setAttribute("stroke", m.color);
    clinesEl.appendChild(poly);
  }
}

/* ── 清單渲染 ── */
function renderList() {
  const list = document.getElementById("listView");
  list.innerHTML = PROJECTS.map((p, gi) => {
    const m = CAT_META[p.category] || { color: "var(--gold)" };
    return `
    <a class="row" href="./${esc(p.dir)}/index.html" data-cat="${esc(p.category)}" data-gi="${gi}" style="--cc:${m.color}">
      <span class="r-date"><span class="pip">✦</span>${esc(p.date)}</span>
      <span class="r-main">
        <span class="r-title"><span class="emoji">${esc(p.emoji)}</span>${esc(p.title)}${gi === 0 ? '<span class="tbadge">今日之星</span>' : ""}</span>
        <span class="r-desc">${esc(p.desc)}</span>
      </span>
      <span class="r-tag">${esc(p.category)}</span>
    </a>`;
  }).join("");
}

/* ── 星座篩選 ── */
let activeCat = null;
function setFilter(cat) {
  activeCat = cat;
  clearSelection();
  if (cat) skyEl.dataset.active = CAT_META[cat].key;
  else delete skyEl.dataset.active;
  skyEl.querySelectorAll(".star").forEach(s => {
    const on = !cat || s.dataset.cat === cat;
    s.classList.toggle("on", on);
    /* 被篩掉的星：移出 tab 順序並對輔助科技隱藏，避免誤點誤讀 */
    s.tabIndex = on ? 0 : -1;
    s.setAttribute("aria-hidden", String(!on));
  });
  skyEl.querySelectorAll(".const-label").forEach(l => {
    const on = l.dataset.cat === cat;
    l.classList.toggle("on", on);
    l.setAttribute("aria-pressed", String(on));
  });
  document.querySelectorAll("#chips .chip").forEach(c => {
    c.setAttribute("aria-pressed", String((c.dataset.cat || null) === cat || (!cat && !c.dataset.cat)));
  });
  let shown = 0;
  document.querySelectorAll("#listView .row").forEach(r => {
    const hide = cat && r.dataset.cat !== cat;
    r.classList.toggle("hide", hide);
    if (!hide) shown++;
  });
  document.getElementById("empty").style.display =
    (document.body.dataset.mode === "list" && shown === 0) ? "block" : "none";
}
function toggleCat(cat) {
  const next = activeCat === cat ? null : cat;
  setFilter(next);
  announce(next
    ? `已聚焦「${next}」星座，共 ${PROJECTS.filter(p => p.category === next).length} 件作品`
    : "已顯示全部星空");
}

function renderChips() {
  const nav = document.getElementById("chips");
  const all = document.createElement("button");
  all.type = "button";
  all.className = "chip";
  all.innerHTML = `<span class="dot">✦</span>全部星空<span class="n">${PROJECTS.length}</span>`;
  all.setAttribute("aria-pressed", "true");
  all.addEventListener("click", () => { setFilter(null); announce("已顯示全部星空"); });
  nav.appendChild(all);
  for (const cat of CAT_NAMES) {
    const count = PROJECTS.filter(p => p.category === cat).length;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "chip";
    btn.dataset.cat = cat;
    btn.style.setProperty("--cc", CAT_META[cat].color);
    btn.innerHTML = `<span class="dot">✦</span>${esc(cat)}<span class="n">${count}</span>`;
    btn.setAttribute("aria-pressed", "false");
    btn.addEventListener("click", () => toggleCat(cat));
    nav.appendChild(btn);
  }
}

/* ── 星圖 ⇄ 清單 模式切換 ── */
function setMode(mode) {
  document.body.dataset.mode = mode;
  document.getElementById("modeSky").setAttribute("aria-pressed", String(mode === "sky"));
  document.getElementById("modeList").setAttribute("aria-pressed", String(mode === "list"));
  try { localStorage.setItem("observatory-mode", mode); } catch (e) {}
  setFilter(activeCat);
}
document.getElementById("modeSky").addEventListener("click", () => setMode("sky"));
document.getElementById("modeList").addEventListener("click", () => setMode("list"));

/* ── 資訊卡（星曆）與觸控選取 ──
   桌面滑鼠：掠過即讀、點擊即進（行為不變）。
   觸控裝置：第一次點星＝選取並釘選資訊卡（含進入按鈕），再點一次才導航。 */
const cardEl = document.getElementById("card");
let selectedStar = null;

function showCard(starEl, pin = false) {
  const gi = Number(starEl.dataset.gi);
  const p = PROJECTS[gi];
  if (!p) return;
  const m = CAT_META[p.category] || { color: "var(--gold)" };
  cardEl.style.setProperty("--cc", m.color);
  document.getElementById("cDate").textContent = p.date + (gi === 0 ? " · 今日之星" : "");
  document.getElementById("cTag").textContent = p.category;
  document.getElementById("cEmoji").textContent = p.emoji;
  document.getElementById("cTitle").textContent = p.title;
  document.getElementById("cDesc").textContent = p.desc;
  document.getElementById("cGo").setAttribute("href", starEl.getAttribute("href"));
  cardEl.classList.toggle("pinned", pin);
  cardEl.setAttribute("aria-hidden", "false");
  if (innerWidth <= 560) {
    cardEl.classList.add("sheet");
  } else {
    cardEl.classList.remove("sheet");
    const r = starEl.getBoundingClientRect();
    const cw = 336, ch = cardEl.offsetHeight || 170;
    let x = r.right + 20;
    if (x + cw > innerWidth - 10) x = r.left - cw - 20;
    if (x < 10) x = Math.min(innerWidth - cw - 10, Math.max(10, r.left + r.width / 2 - cw / 2));
    let y = r.top + r.height / 2 - ch / 2;
    y = Math.min(innerHeight - ch - 12, Math.max(12, y));
    cardEl.style.left = x + "px";
    cardEl.style.top = y + "px";
  }
  cardEl.classList.add("show");
  if (m.key) skyEl.dataset.glow = m.key; else delete skyEl.dataset.glow;
  /* 反向呼應：讀到今日之星時，hero 卡的金邊也亮起 */
  $("hero").classList.toggle("star-lit", gi === 0);
}
function hideCard() {
  cardEl.classList.remove("show", "pinned");
  cardEl.setAttribute("aria-hidden", "true");
  delete skyEl.dataset.glow;
  $("hero").classList.remove("star-lit");
}
function selectStar(starEl) {
  if (selectedStar) selectedStar.classList.remove("picked");
  selectedStar = starEl;
  starEl.classList.add("picked");
  showCard(starEl, true);
}
function clearSelection() {
  if (selectedStar) selectedStar.classList.remove("picked");
  selectedStar = null;
  hideCard();
}

/* 滑鼠／筆的掠過閱讀（觸控交給點擊流程） */
skyEl.addEventListener("pointerover", e => {
  if (e.pointerType === "touch") return;
  const s = e.target.closest(".star");
  if (!s) return;
  if (selectedStar && s !== selectedStar) { selectedStar.classList.remove("picked"); selectedStar = null; }
  showCard(s, s === selectedStar);
});
skyEl.addEventListener("pointerout", e => {
  if (e.pointerType === "touch") return;
  const s = e.target.closest(".star");
  if (s && !s.contains(e.relatedTarget) && !selectedStar) hideCard();
});
skyEl.addEventListener("focusin", e => {
  const s = e.target.closest(".star");
  if (s) showCard(s, s === selectedStar);
});
skyEl.addEventListener("focusout", e => {
  const s = e.target.closest(".star");
  if (s && !selectedStar) hideCard();
});

/* 觸控雙段式：第一次點＝選取，第二次點＝進入 */
let lastPointerType = "";
skyEl.addEventListener("pointerdown", e => { lastPointerType = e.pointerType; }, true);
skyEl.addEventListener("click", e => {
  const s = e.target.closest(".star");
  const wasTouch = lastPointerType === "touch" && e.detail > 0;
  lastPointerType = "";
  if (!s) return;
  if (wasTouch && selectedStar !== s) {
    e.preventDefault();
    selectStar(s);
  }
});
document.addEventListener("click", e => {
  if (!selectedStar) return;
  if (e.target.closest("#card") || e.target.closest(".star") || e.target.closest("#randomBtn")) return;
  clearSelection();
});
$("cClose").addEventListener("click", clearSelection);
addEventListener("keydown", e => { if (e.key === "Escape") clearSelection(); });
addEventListener("scroll", () => {
  /* 底部固定的釘選小卡（行動裝置）不隨捲動關閉 */
  if (!(cardEl.classList.contains("sheet") && cardEl.classList.contains("pinned"))) hideCard();
}, { passive: true });

/* ── 隨機觀星：柔光掃過星空，隨機停在一顆星 ── */
const randBtn = $("randomBtn");
let lastPick = -1;
randBtn.addEventListener("click", () => {
  if (randBtn.disabled) return;
  const pool = PROJECTS.map((p, gi) => gi).filter(gi => !activeCat || PROJECTS[gi].category === activeCat);
  if (!pool.length) return;
  let gi = pool[Math.floor(Math.random() * pool.length)];
  if (pool.length > 1 && gi === lastPick) gi = pool[(pool.indexOf(gi) + 1) % pool.length];
  lastPick = gi;
  const p = PROJECTS[gi];

  if (document.body.dataset.mode === "list") {
    const row = document.querySelector(`#listView .row[data-gi="${gi}"]`);
    if (!row) return;
    row.scrollIntoView({ behavior: reduced() ? "auto" : "smooth", block: "center" });
    row.classList.remove("flash");
    void row.offsetWidth;
    row.classList.add("flash");
    setTimeout(() => row.classList.remove("flash"), 1900);
    announce(`觀測到：${p.title}`);
    return;
  }

  const star = skyEl.querySelector(`.star[data-gi="${gi}"]`);
  if (!star) return;
  const skyR = skyEl.getBoundingClientRect();
  if (skyR.top < 0 || skyR.bottom > innerHeight) {
    skyEl.scrollIntoView({ behavior: reduced() ? "auto" : "smooth", block: "nearest" });
  }
  const finish = () => {
    randBtn.disabled = false;
    if (document.body.dataset.mode !== "sky") return;
    selectStar(star);
    announce(`觀測到：${p.title}`);
  };
  if (reduced() || !sweepEl.animate) { finish(); return; }
  randBtn.disabled = true;
  const w = skyEl.clientWidth;
  const x1 = w * (parseFloat(star.style.left) / 100);
  const dur = 550 + 600 * (Math.max(x1 + 90, 120) / (w + 90));
  const anim = sweepEl.animate([
    { transform: "translate3d(-90px, 0, 0)", opacity: 0 },
    { transform: `translate3d(${(-90 + (x1 + 90) * 0.2).toFixed(1)}px, 0, 0)`, opacity: 1, offset: 0.2 },
    { transform: `translate3d(${x1.toFixed(1)}px, 0, 0)`, opacity: 0.9, offset: 0.85 },
    { transform: `translate3d(${x1.toFixed(1)}px, 0, 0)`, opacity: 0 },
  ], { duration: dur, easing: "cubic-bezier(.33,.72,.28,1)" });
  anim.onfinish = finish;
  anim.oncancel = () => { randBtn.disabled = false; };
});

/* ── 星塵畫布：視差星塵 + 偶爾划過的流星 ──
   效能：rAF 節流的視差寫入（transform3d、變化夠大才碰 style）、
   分頁隱藏（visibilitychange）與離屏（IntersectionObserver）皆暫停。 */
(function stardust() {
  const cv = document.getElementById("dust");
  const ctx = cv.getContext("2d");
  const nebulaEl = document.getElementById("nebula");
  let dpr = 1, W = 0, H = 0, grains = [];
  let tx = 0, ty = 0, cx = 0, cy = 0;
  let nbx = 1e9, nby = 1e9;              /* 上次寫入星雲的位移 */
  let meteors = [], nextMeteor = performance.now() + 4000;
  let rafId = null, onScreen = true;

  function resize() {
    dpr = Math.min(2, devicePixelRatio || 1);
    W = innerWidth; H = innerHeight;
    cv.width = W * dpr; cv.height = H * dpr;
    cv.style.width = W + "px"; cv.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const n = Math.min(170, Math.floor(W * H / 11000));
    const rnd = seeded(20260711);
    grains = Array.from({ length: n }, () => ({
      x: rnd() * W, y: rnd() * H,
      z: rnd() * 0.8 + 0.2,
      r: rnd() * 1.1 + 0.3,
      base: rnd() * 0.45 + 0.2,
      sp: rnd() * 1.4 + 0.4,
      ph: rnd() * 6.283,
    }));
    if (rafId === null) drawFrame(performance.now());
  }

  function drawFrame(t) {
    ctx.clearRect(0, 0, W, H);
    for (const g of grains) {
      const tw = reduced() ? 0 : Math.sin(t / 1000 * g.sp + g.ph) * 0.22;
      ctx.globalAlpha = Math.max(0, g.base + tw);
      ctx.fillStyle = "#dfe6ff";
      ctx.beginPath();
      ctx.arc(g.x + cx * g.z * 26, g.y + cy * g.z * 18, g.r, 0, 6.283);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function spawnMeteor(now) {
    const rnd = Math.random;
    const ang = 2.5 + rnd() * 0.35;               /* 左下方向劃過 */
    const sp = 420 + rnd() * 260;
    meteors.push({
      x: W * (0.25 + rnd() * 0.7), y: -20 + rnd() * H * 0.25,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
      life: 0, ttl: 1.1 + rnd() * 0.5, len: 110 + rnd() * 110,
    });
    nextMeteor = now + 7000 + rnd() * 9000;
  }

  function drawMeteors(dt) {
    meteors = meteors.filter(mt => (mt.life += dt) < mt.ttl);
    for (const mt of meteors) {
      mt.x += mt.vx * dt; mt.y += mt.vy * dt;
      const fade = Math.sin(Math.PI * mt.life / mt.ttl);
      const nx = mt.vx, ny = mt.vy, nl = Math.hypot(nx, ny);
      const txx = mt.x - nx / nl * mt.len, tyy = mt.y - ny / nl * mt.len;
      const grad = ctx.createLinearGradient(mt.x, mt.y, txx, tyy);
      grad.addColorStop(0, `rgba(240,225,190,${0.85 * fade})`);
      grad.addColorStop(1, "rgba(240,225,190,0)");
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(mt.x, mt.y);
      ctx.lineTo(txx, tyy);
      ctx.stroke();
    }
  }

  let last = performance.now();
  function tick(t) {
    const dt = Math.min(0.05, (t - last) / 1000);
    last = t;
    cx += (tx - cx) * 0.045;
    cy += (ty - cy) * 0.045;
    /* 視差跟隨：只在位移實際改變時才寫入 style */
    const nx = -cx * 18, ny = -cy * 12;
    if (Math.abs(nx - nbx) > 0.1 || Math.abs(ny - nby) > 0.1) {
      nbx = nx; nby = ny;
      nebulaEl.style.transform = `translate3d(${nx.toFixed(1)}px, ${ny.toFixed(1)}px, 0)`;
    }
    drawFrame(t);
    if (t > nextMeteor && meteors.length < 2) spawnMeteor(t);
    drawMeteors(dt);
    rafId = requestAnimationFrame(tick);
  }

  function syncLoop() {
    const run = onScreen && !document.hidden && !reduced();
    if (run && rafId === null) {
      last = performance.now();
      rafId = requestAnimationFrame(tick);
    } else if (!run && rafId !== null) {
      cancelAnimationFrame(rafId);
      rafId = null;
      if (reduced()) { meteors = []; drawFrame(performance.now()); }
    }
  }

  addEventListener("pointermove", e => {
    tx = e.clientX / innerWidth - 0.5;
    ty = e.clientY / innerHeight - 0.5;
  }, { passive: true });
  addEventListener("resize", resize);
  document.addEventListener("visibilitychange", syncLoop);
  if ("IntersectionObserver" in window) {
    new IntersectionObserver(entries => {
      onScreen = entries[0].isIntersecting;
      syncLoop();
    }).observe(cv);
  }
  /* reduced-motion 動態監聽：使用者切換系統設定時即時啟停 */
  if (mReduced.addEventListener) mReduced.addEventListener("change", syncLoop);

  resize();
  syncLoop();
})();

/* ── 啟動 ── */
document.getElementById("count").textContent = PROJECTS.length;
renderSky();
renderHero();
renderList();
renderChips();
setFilter(null);
let savedMode = "sky";
try { savedMode = localStorage.getItem("observatory-mode") || "sky"; } catch (e) {}
setMode(savedMode === "list" ? "list" : "sky");
</script>
</body>
</html>
