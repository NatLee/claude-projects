<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日小專案 · 星圖索引</title>
<style>
  :root {
    --bg: #05070f;
    --ink: #f0f2fb;
    --dim: #a6aec9;
    --faint: #6d7593;
    --line: rgba(150, 165, 220, .14);
    --line-soft: rgba(150, 165, 220, .08);
    --panel: rgba(13, 17, 34, .7);
    --gold: #f0c674;
    --c-trivia: #64b5f6;   /* 網路趣聞・冷知識 */
    --c-odd:    #f48fb1;   /* 奇聞軼事 */
    --c-sci:    #4dd0e1;   /* 科學趣聞 */
    --c-learn:  #ffb74d;   /* 學習新知 */
    --c-tool:   #81c784;   /* 生活痛點小工具 */
    --c-fun:    #ba9df1;   /* 創意・娛樂 */
    --serif: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    --sans: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: rgba(240, 198, 116, .28); }
  .sr-only {
    position: absolute; width: 1px; height: 1px; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap;
  }
  :focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; border-radius: 10px; }

  /* ── 背景：預先柔化的極光團（只做 transform 動畫，不跑濾鏡） ── */
  #aurora { position: fixed; inset: -20%; z-index: 0; pointer-events: none; opacity: .7; }
  .blob {
    position: absolute; width: 62vmax; height: 62vmax; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%,
      color-mix(in srgb, var(--nc) 30%, transparent) 0%,
      color-mix(in srgb, var(--nc) 18%, transparent) 26%,
      color-mix(in srgb, var(--nc) 7%, transparent) 48%,
      transparent 70%);
    mix-blend-mode: screen; opacity: .15;
    animation: drift 84s ease-in-out infinite alternate;
    will-change: transform;
  }
  @keyframes drift {
    from { transform: translate3d(-3%, -2%, 0) scale(1); }
    to   { transform: translate3d(3%, 4%, 0) scale(1.16); }
  }
  #grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .3;
    background-image:
      linear-gradient(rgba(150, 165, 220, .05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(150, 165, 220, .05) 1px, transparent 1px);
    background-size: 64px 64px;
    -webkit-mask-image: radial-gradient(120% 80% at 50% 0%, #000 0%, transparent 72%);
    mask-image: radial-gradient(120% 80% at 50% 0%, #000 0%, transparent 72%);
  }

  .wrap { position: relative; z-index: 2; max-width: 1240px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── 頁首 ─────────────────────────────────────────── */
  .site-head { padding: 52px 0 0; text-align: center; }
  /* 進場：預設可見，JS 在場時才先藏起來淡入（無 JS／動畫被凍結也讀得到內容） */
  .rise { transition: opacity .7s ease var(--rd, 0s), transform .7s cubic-bezier(.2,.8,.3,1) var(--rd, 0s); }
  body.preload .rise { opacity: 0; transform: translateY(14px); }
  .kicker {
    display: inline-flex; align-items: center; gap: 14px;
    font-family: var(--serif); font-size: 11.5px; color: var(--gold);
    letter-spacing: .42em; text-indent: .42em; margin-bottom: 16px;
  }
  .kicker::before, .kicker::after {
    content: ""; width: 42px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(240, 198, 116, .55));
  }
  .kicker::after { background: linear-gradient(270deg, transparent, rgba(240, 198, 116, .55)); }
  h1 {
    font-family: var(--serif); font-weight: 700;
    font-size: clamp(36px, 6.4vw, 60px); letter-spacing: .2em; text-indent: .2em;
    background: linear-gradient(180deg, #ffffff 8%, #b9c4ee 96%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 30px rgba(140, 165, 255, .28));
  }
  .lede { margin-top: 14px; color: var(--dim); font-size: 15px; line-height: 1.9; }

  .stats {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 10px 34px;
    margin-top: 22px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat b {
    font-family: var(--serif); font-size: 30px; font-weight: 700; line-height: 1.15;
    color: var(--gold); font-variant-numeric: tabular-nums;
    text-shadow: 0 0 20px rgba(240, 198, 116, .35);
  }
  .stat span { font-size: 11.5px; color: var(--faint); letter-spacing: .22em; text-indent: .22em; }

  /* ── 星空圖：每顆星＝一件作品 ─────────────────────── */
  /* 注意：skywrap 不設 z-index（不建立堆疊環境），懸浮卡才能疊在 hero 卡之上 */
  #skywrap {
    position: relative;
    width: 100vw; margin: 18px calc(50% - 50vw) 0;
    height: clamp(400px, 58vh, 620px);
  }
  #sky {
    position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: pan-y;
    -webkit-mask-image: linear-gradient(180deg, transparent, #000 8%, #000 90%, transparent);
    mask-image: linear-gradient(180deg, transparent, #000 8%, #000 90%, transparent);
  }
  .sky-hint {
    position: absolute; left: 50%; transform: translateX(-50%); bottom: 10px;
    color: var(--faint); font-size: 11.5px; letter-spacing: .16em; text-indent: .16em;
    white-space: nowrap; pointer-events: none;
  }
  #sky-tip {
    position: absolute; left: 0; top: 0; z-index: 25;
    width: min(276px, 78vw);
    display: flex; gap: 11px; padding: 13px 15px; border-radius: 15px;
    background: var(--panel);
    border: 1px solid color-mix(in srgb, var(--cc, var(--gold)) 42%, transparent);
    box-shadow: 0 14px 40px rgba(0, 0, 0, .5),
                0 0 26px color-mix(in srgb, var(--cc, var(--gold)) 14%, transparent);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    opacity: 0; pointer-events: none;
    transition: opacity .16s ease;
  }
  #sky-tip.on { opacity: 1; }
  #sky-tip.tap { pointer-events: auto; }
  .t-emoji { font-size: 23px; line-height: 1.3; flex: none; }
  .t-main { min-width: 0; }
  .t-main b { display: block; font-size: 14px; line-height: 1.5; }
  .t-meta { display: block; font-size: 10.5px; color: var(--faint); letter-spacing: .06em; margin: 3px 0 5px; }
  .t-desc {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    font-size: 11.5px; color: var(--dim); line-height: 1.7;
  }
  .t-open { display: inline-block; margin-top: 7px; font-size: 11px; color: var(--gold); text-decoration: none; letter-spacing: .1em; }
  a.t-open:hover { color: #ffe9b8; }

  /* 掃描鈕：浮在星空右上，光束橫掃夜空、鎖定一顆隨機星 */
  #scanBtn {
    position: absolute; z-index: 25; top: 16px; right: max(20px, calc(50% - 596px));
    display: inline-flex; align-items: center; gap: 9px;
    font-family: inherit; font-size: 12.5px; letter-spacing: .18em; text-indent: .04em;
    cursor: pointer; color: var(--gold);
    padding: 9px 17px; border-radius: 999px;
    background: rgba(22, 17, 6, .48);
    border: 1px solid rgba(240, 198, 116, .45);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: color .25s, border-color .25s, box-shadow .25s, transform .25s;
  }
  #scanBtn::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%; flex: none;
    background: var(--gold); box-shadow: 0 0 8px var(--gold);
    animation: radar 2.4s ease-out infinite;
  }
  @keyframes radar {
    0%   { box-shadow: 0 0 0 0 rgba(240, 198, 116, .5); }
    70%  { box-shadow: 0 0 0 10px rgba(240, 198, 116, 0); }
    100% { box-shadow: 0 0 0 0 rgba(240, 198, 116, 0); }
  }
  #scanBtn:hover {
    color: #ffe9b8; border-color: rgba(240, 198, 116, .85);
    box-shadow: 0 0 22px rgba(240, 198, 116, .3); transform: translateY(-1px);
  }
  #scanBtn.scanning {
    color: #ffe9b8; border-color: rgba(240, 198, 116, .9);
    box-shadow: 0 0 26px rgba(240, 198, 116, .42);
  }

  /* ── 今晚最亮的星（hero，疊在星空下緣） ───────────── */
  #hero { position: relative; z-index: 5; margin: -56px auto 0; max-width: 980px; }
  .h-card {
    position: relative; display: block; text-decoration: none; color: inherit;
    border-radius: 22px; padding: 26px 30px; overflow: hidden;
    background:
      radial-gradient(120% 150% at 6% -30%, color-mix(in srgb, var(--cc) 16%, transparent), transparent 58%),
      linear-gradient(160deg, rgba(20, 26, 50, .93), rgba(8, 11, 24, .96));
    border: 1px solid color-mix(in srgb, var(--cc) 32%, transparent);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05), 0 22px 60px rgba(0, 0, 0, .45);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: transform .35s cubic-bezier(.2,.8,.3,1), box-shadow .35s, border-color .35s;
  }
  .h-card::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    background: linear-gradient(115deg, transparent 38%, rgba(255, 255, 255, .07) 48%, transparent 58%);
    transform: translateX(-120%); transition: transform .9s ease;
  }
  .h-card:hover, .h-card:focus-visible {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--cc) 62%, transparent);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06), 0 26px 70px rgba(0, 0, 0, .5),
                0 0 44px color-mix(in srgb, var(--cc) 18%, transparent);
  }
  .h-card:hover::after { transform: translateX(120%); }
  .h-kicker {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--serif); font-size: 11.5px; letter-spacing: .32em;
    color: var(--gold);
  }
  .h-kicker .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--gold); flex: none;
    animation: pulse 2.6s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(240, 198, 116, .5); }
    70%  { box-shadow: 0 0 0 9px rgba(240, 198, 116, 0); }
    100% { box-shadow: 0 0 0 0 rgba(240, 198, 116, 0); }
  }
  .h-kicker .h-date { margin-left: auto; color: var(--faint); letter-spacing: .16em; font-variant-numeric: tabular-nums; }
  .h-body { display: flex; align-items: center; gap: 26px; margin-top: 20px; }
  .h-emoji {
    flex: none; width: 92px; height: 92px; display: grid; place-items: center; font-size: 44px;
    border-radius: 26px;
    background: radial-gradient(circle at 36% 28%, color-mix(in srgb, var(--cc) 30%, transparent), rgba(10, 14, 32, .55) 74%);
    border: 1px solid color-mix(in srgb, var(--cc) 42%, transparent);
    box-shadow: 0 0 30px color-mix(in srgb, var(--cc) 20%, transparent), inset 0 0 20px rgba(0, 0, 0, .35);
    transition: transform .35s cubic-bezier(.2,.8,.3,1);
  }
  .h-card:hover .h-emoji { transform: scale(1.06) rotate(-3deg); }
  .h-main { min-width: 0; flex: 1; }
  .h-title {
    font-family: var(--serif); font-size: clamp(23px, 3.3vw, 31px); font-weight: 700;
    letter-spacing: .08em; margin: 8px 0;
    text-shadow: 0 0 26px color-mix(in srgb, var(--cc) 30%, transparent);
  }
  .h-desc { color: var(--dim); font-size: 14px; line-height: 1.95; max-width: 64ch; }
  .h-cta {
    flex: none; display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 999px;
    color: #241c06; font-weight: 700; font-size: 14px; letter-spacing: 2px;
    background: linear-gradient(135deg, #f6d795, var(--gold));
    box-shadow: 0 6px 22px rgba(240, 198, 116, .24);
    transition: transform .3s, box-shadow .3s;
  }
  .h-card:hover .h-cta { transform: translateX(3px); box-shadow: 0 10px 30px rgba(240, 198, 116, .4); }

  /* ── 控制列（吸頂）────────────────────────────────── */
  .bar {
    position: sticky; top: 0; z-index: 30; margin-top: 34px; padding: 12px 0;
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px 14px;
    background: linear-gradient(180deg, var(--bg) 62%, rgba(5, 7, 15, 0));
  }
  .bar::before {
    content: ""; position: absolute; inset: 8px -12px; border-radius: 18px; z-index: -1;
    background: var(--panel); border: 1px solid var(--line);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .search { position: relative; flex: 1 1 240px; min-width: 200px; display: flex; align-items: center; }
  .search .ico { position: absolute; left: 13px; font-size: 13px; opacity: .65; pointer-events: none; }
  #q {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--ink);
    background: rgba(8, 11, 24, .6); border: 1px solid var(--line);
    border-radius: 999px; padding: 10px 44px 10px 36px;
    transition: border-color .25s, box-shadow .25s, background .25s;
  }
  #q::placeholder { color: var(--faint); }
  #q::-webkit-search-cancel-button { display: none; }
  #q:focus {
    outline: none; border-color: rgba(240, 198, 116, .55); background: rgba(10, 14, 30, .8);
    box-shadow: 0 0 0 3px rgba(240, 198, 116, .1);
  }
  .search kbd {
    position: absolute; right: 12px; font-family: var(--sans); font-size: 11px; color: var(--faint);
    border: 1px solid var(--line); border-radius: 6px; padding: 2px 7px; pointer-events: none;
  }
  #qx {
    position: absolute; right: 10px; display: none; cursor: pointer;
    width: 26px; height: 26px; border-radius: 50%; border: 0; background: rgba(150, 165, 220, .14);
    color: var(--dim); font-size: 12px; font-family: inherit;
    transition: color .2s, background .2s;
  }
  #qx:hover { color: var(--ink); background: rgba(150, 165, 220, .26); }
  body.searching .search kbd { display: none; }
  body.searching #qx { display: block; }

  /* min-width:0 －flex item 預設 min-width:auto 會以 max-content 撐寬整列 */
  .chips { display: flex; flex-wrap: wrap; gap: 7px; min-width: 0; }
  .chip {
    font-family: inherit; font-size: 12.5px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    color: var(--dim); background: rgba(10, 14, 30, .55);
    border: 1px solid var(--line); border-radius: 999px; padding: 7px 13px;
    transition: color .25s, border-color .25s, background .25s, box-shadow .25s, transform .2s;
  }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cc, var(--gold)); flex: none; }
  .chip .n { font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums; transition: color .25s; }
  .chip:hover { color: var(--ink); border-color: color-mix(in srgb, var(--cc, var(--gold)) 50%, transparent); transform: translateY(-1px); }
  .chip[aria-pressed="true"] {
    color: var(--cc, var(--gold));
    border-color: color-mix(in srgb, var(--cc, var(--gold)) 62%, transparent);
    background: color-mix(in srgb, var(--cc, var(--gold)) 10%, transparent);
    box-shadow: 0 0 16px color-mix(in srgb, var(--cc, var(--gold)) 20%, transparent);
  }
  .chip[aria-pressed="true"] .dot { box-shadow: 0 0 9px var(--cc, var(--gold)); }
  .chip[aria-pressed="true"] .n { color: color-mix(in srgb, var(--cc, var(--gold)) 70%, var(--ink)); }

  .tools { display: flex; align-items: center; gap: 10px; margin-left: auto; min-width: 0; }
  .seg {
    display: inline-flex; padding: 3px; border-radius: 999px;
    border: 1px solid var(--line); background: rgba(10, 14, 30, .6);
  }
  .seg button {
    font-family: inherit; font-size: 12.5px; cursor: pointer;
    color: var(--dim); background: none; border: 0; padding: 6px 14px; border-radius: 999px;
    transition: color .25s, background .25s;
  }
  .seg button[aria-pressed="true"] {
    color: #241c06; font-weight: 700;
    background: linear-gradient(135deg, #f6d795, var(--gold));
  }
  .seg button:not([aria-pressed="true"]):hover { color: var(--ink); }
  #rand {
    font-family: inherit; font-size: 12.5px; cursor: pointer; white-space: nowrap;
    color: var(--gold); background: rgba(40, 32, 12, .38);
    border: 1px solid rgba(240, 198, 116, .42); border-radius: 999px; padding: 7px 14px;
    transition: color .25s, border-color .25s, box-shadow .25s, transform .25s;
  }
  #rand:hover {
    color: #ffe9b8; border-color: rgba(240, 198, 116, .8);
    box-shadow: 0 0 18px rgba(240, 198, 116, .26); transform: translateY(-1px);
  }

  .result {
    margin: 18px 0 -4px; font-size: 12.5px; color: var(--faint);
    display: flex; align-items: center; gap: 8px; min-height: 18px;
  }
  .result b { color: var(--gold); font-variant-numeric: tabular-nums; font-weight: 700; }

  /* ── 星軌卡片牆 ───────────────────────────────────── */
  #wall { position: relative; margin-top: 22px; padding-left: 30px; }
  #wall::before {
    content: ""; position: absolute; left: 5px; top: 12px; bottom: 30px; width: 1px;
    background: linear-gradient(180deg, transparent,
      rgba(240, 198, 116, .3) 4%, rgba(150, 165, 220, .16) 55%, transparent);
  }
  .group { position: relative; margin-bottom: 40px; }
  .g-head { position: relative; display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
  .g-head::before {
    content: "✦"; position: absolute; left: -31px; top: 50%; transform: translateY(-54%);
    font-size: 14px; line-height: 1; color: var(--cc, var(--gold));
    text-shadow: 0 0 12px color-mix(in srgb, var(--cc, var(--gold)) 80%, transparent);
  }
  .g-title {
    font-family: var(--serif); font-size: 17px; font-weight: 700; letter-spacing: .16em;
    color: var(--cc, var(--ink));
  }
  .g-n { font-size: 11.5px; color: var(--faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .g-rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--line), transparent); }

  .g-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(264px, 1fr)); }

  .card {
    position: relative; display: flex; flex-direction: column; gap: 9px;
    padding: 17px 18px 15px; border-radius: 16px; overflow: hidden;
    text-decoration: none; color: inherit;
    background: linear-gradient(160deg, rgba(19, 24, 46, .72), rgba(9, 12, 26, .72));
    border: 1px solid var(--line);
    transition: transform .3s cubic-bezier(.2,.8,.3,1), border-color .3s, box-shadow .3s, background .3s, opacity .5s ease;
    /* 進場：由 JS 掛上 .in（IntersectionObserver），--d 為序列延遲 */
    opacity: 0; transform: translateY(12px);
  }
  .card.in { opacity: 1; transform: none; transition-delay: var(--d, 0s); }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--cc, var(--gold));
    transform: scaleY(0); transition: transform .3s cubic-bezier(.2,.8,.3,1);
  }
  .card:hover, .card:focus-visible {
    transform: translateY(-4px);
    border-color: color-mix(in srgb, var(--cc, var(--gold)) 52%, transparent);
    background: linear-gradient(160deg,
      color-mix(in srgb, var(--cc) 9%, rgba(19, 24, 46, .8)), rgba(9, 12, 26, .8));
    box-shadow: 0 18px 44px rgba(0, 0, 0, .45),
                0 0 30px color-mix(in srgb, var(--cc, var(--gold)) 14%, transparent);
  }
  .card:hover::before, .card:focus-visible::before { transform: scaleY(1); }
  .c-top { display: flex; align-items: center; gap: 11px; }
  .c-emoji {
    flex: none; width: 42px; height: 42px; display: grid; place-items: center; font-size: 21px;
    border-radius: 13px;
    background: radial-gradient(circle at 36% 30%, color-mix(in srgb, var(--cc) 26%, transparent), rgba(10, 14, 32, .5) 76%);
    border: 1px solid color-mix(in srgb, var(--cc) 34%, transparent);
    transition: transform .3s cubic-bezier(.2,.8,.3,1), box-shadow .3s;
  }
  .card:hover .c-emoji {
    transform: scale(1.08) rotate(-4deg);
    box-shadow: 0 0 20px color-mix(in srgb, var(--cc) 26%, transparent);
  }
  .c-date {
    margin-left: auto; font-size: 11.5px; color: var(--faint);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .c-badge {
    font-size: 10px; letter-spacing: .16em; text-indent: .16em; white-space: nowrap;
    color: var(--gold); border: 1px solid rgba(240, 198, 116, .42);
    background: rgba(240, 198, 116, .08); border-radius: 999px; padding: 2px 8px;
  }
  .c-title { font-size: 16px; font-weight: 700; line-height: 1.5; transition: color .25s; }
  .card:hover .c-title, .card:focus-visible .c-title { color: var(--cc, var(--gold)); }
  .c-desc {
    font-size: 12.8px; color: var(--dim); line-height: 1.8;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .c-foot { display: flex; align-items: center; gap: 8px; margin-top: auto; padding-top: 3px; }
  .c-tag {
    display: inline-block; font-size: 11px; padding: 2.5px 9px; border-radius: 999px; white-space: nowrap;

/* ==========================================================================
 * 索引室渲染引擎：星空圖、搜尋、類別篩選、星軌／星座分組、隨機、進場編排
 * ========================================================================== */
const CAT_META = {
  "網路趣聞・冷知識": { color: "var(--c-trivia)", hex: "#64b5f6" },
  "奇聞軼事":         { color: "var(--c-odd)",    hex: "#f48fb1" },
  "科學趣聞":         { color: "var(--c-sci)",    hex: "#4dd0e1" },
  "學習新知":         { color: "var(--c-learn)",  hex: "#ffb74d" },
  "生活痛點小工具":   { color: "var(--c-tool)",   hex: "#81c784" },
  "創意・娛樂":       { color: "var(--c-fun)",    hex: "#ba9df1" },
};
const CAT_NAMES = Object.keys(CAT_META);
const GOLD_HEX = "#f0c674";
const catColor = c => (CAT_META[c] || {}).color || "var(--gold)";
const catHex   = c => (CAT_META[c] || {}).hex   || GOLD_HEX;

const $ = id => document.getElementById(id);
/* HTML 轉義：所有以 innerHTML 內插的資料欄位一律經過這裡 */
const esc = s => String(s).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const mReduced = matchMedia("(prefers-reduced-motion: reduce)");
const reduced = () => mReduced.matches;

const liveEl = $("live");
function announce(msg) {
  liveEl.textContent = "";
  setTimeout(() => { liveEl.textContent = msg; }, 40);
}

/* 搜尋命中處標上 <mark>（先轉義再插標記） */
function mark(text, q) {
  if (!q) return esc(text);
  const lower = String(text).toLowerCase();
  const needle = q.toLowerCase();
  let out = "", from = 0, i;
  while ((i = lower.indexOf(needle, from)) !== -1) {
    out += esc(text.slice(from, i)) + "<mark>" + esc(text.slice(i, i + needle.length)) + "</mark>";
    from = i + needle.length;
  }
  return out + esc(text.slice(from));
}

const state = { q: "", cat: null, group: "date" };

function matches(p) {
  if (state.cat && p.category !== state.cat) return false;
  if (!state.q) return true;
  const hay = (p.title + " " + p.desc + " " + p.category + " " + p.date).toLowerCase();
  return hay.includes(state.q.toLowerCase());
}

/* 星空連動的安全替身（initSky 啟動後會覆蓋成真實作） */
let updateSky = () => {};
let skyPulse = () => {};

/* ── 今晚最亮的星（永遠是陣列第一筆） ── */
function renderHero() {
  const p = PROJECTS[0];
  if (!p) return;
  const hero = $("hero");
  hero.style.setProperty("--cc", catColor(p.category));
  hero.innerHTML = `
    <a class="h-card" href="./${esc(p.dir)}/index.html">
      <p class="h-kicker"><span class="dot" aria-hidden="true"></span>今晚最亮的星<span class="h-date">${esc(p.date)}</span></p>
      <div class="h-body">
        <span class="h-emoji" aria-hidden="true">${esc(p.emoji)}</span>
        <div class="h-main">
          <span class="c-tag">${esc(p.category)}</span>
          <h2 class="h-title">${esc(p.title)}</h2>
          <p class="h-desc">${esc(p.desc)}</p>
        </div>
        <span class="h-cta">進入作品 <span aria-hidden="true">→</span></span>
      </div>
    </a>`;
}

/* ── 卡片牆：依「星軌（年月）」或「星座（分類）」分組 ── */
function cardHTML(p, gi) {
  const parts = p.date.split("-");
  return `
    <a class="card" href="./${esc(p.dir)}/index.html" data-gi="${gi}" style="--cc:${catColor(p.category)}"
       aria-label="${esc(p.title)}（${esc(p.date)}・${esc(p.category)}）${esc(p.desc)}">
      <span class="c-top">
        <span class="c-emoji" aria-hidden="true">${esc(p.emoji)}</span>
        ${gi === 0 ? '<span class="c-badge">今日之星</span>' : ""}
        <span class="c-date">${esc(parts[1])}／${esc(parts[2])}</span>
      </span>
      <span class="c-title">${mark(p.title, state.q)}</span>
      <span class="c-desc">${mark(p.desc, state.q)}</span>
      <span class="c-foot">
        <span class="c-tag">${esc(p.category)}</span>
        <span class="c-go">✦ 開啟 →</span>
      </span>
    </a>`;
}

function groupsOf(items) {
  const groups = [];
  const byKey = new Map();
  const push = (key, title, color, it) => {
    let g = byKey.get(key);
    if (!g) { g = { key, title, color, items: [] }; byKey.set(key, g); groups.push(g); }
    g.items.push(it);
  };
  if (state.group === "cat") {
    /* 星座模式：固定六類順序，空類別不出現 */
    for (const cat of CAT_NAMES) {
      for (const it of items) if (it.p.category === cat) push(cat, cat, catColor(cat), it);
    }
  } else {
    /* 星軌模式：依陣列順序（新→舊）分月 */
    for (const it of items) {
      const [y, m] = it.p.date.split("-");
      push(y + "-" + m, `${y} 年 ${Number(m)} 月`, "var(--gold)", it);
    }
  }
  return groups;
}

const wallEl = $("wall");
let io = null;

function renderWall() {
  const items = PROJECTS.map((p, gi) => ({ p, gi })).filter(it => matches(it.p));
  document.body.classList.toggle("no-result", items.length === 0);

  const bits = [];
  if (state.cat) bits.push(`星座「${state.cat}」`);
  if (state.q) bits.push(`關鍵字「${state.q}」`);
  $("result").innerHTML = bits.length
    ? `${esc(bits.join(" · "))}　點亮 <b>${items.length}</b> / ${PROJECTS.length} 顆`
    : `依${state.group === "cat" ? "星座" : "星軌"}排列 · 共 <b>${PROJECTS.length}</b> 顆星星`;

  wallEl.innerHTML = groupsOf(items).map(g => `
    <section class="group" style="--cc:${g.color}">
      <header class="g-head">
        <h2 class="g-title">${esc(g.title)}</h2>
        <span class="g-n">${g.items.length} 顆</span>
        <span class="g-rule" aria-hidden="true"></span>
      </header>
      <div class="g-grid">${g.items.map(it => cardHTML(it.p, it.gi)).join("")}</div>
    </section>`).join("");

  revealCards();
  updateSky();
}

/* 進場編排：進入視窗時依序浮現（每批最多疊 8 段延遲，總長 ≤ .4s） */
function revealCards() {
  const cards = wallEl.querySelectorAll(".card");
  if (io) io.disconnect();
  if (reduced() || !("IntersectionObserver" in window)) {
    cards.forEach(c => c.classList.add("in"));
    return;
  }
  io = new IntersectionObserver((entries, obs) => {
    let i = 0;
    for (const e of entries) {
      if (!e.isIntersecting) continue;
      e.target.style.setProperty("--d", (Math.min(i, 8) * 0.045).toFixed(3) + "s");
      e.target.classList.add("in");
      obs.unobserve(e.target);
      i++;
    }
  }, { rootMargin: "90px 0px" });
  cards.forEach(c => io.observe(c));
}

/* ── 類別籌碼 ── */
function renderChips() {
  const nav = $("chips");
  const all = document.createElement("button");
  all.type = "button";
  all.className = "chip";
  all.innerHTML = `<span class="dot"></span>全部<span class="n">${PROJECTS.length}</span>`;
  all.setAttribute("aria-pressed", "true");
  all.addEventListener("click", () => setCat(null));
  nav.appendChild(all);
  for (const cat of CAT_NAMES) {
    const count = PROJECTS.filter(p => p.category === cat).length;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "chip";
    btn.dataset.cat = cat;
    btn.style.setProperty("--cc", catColor(cat));
    btn.innerHTML = `<span class="dot"></span>${esc(cat)}<span class="n">${count}</span>`;
    btn.setAttribute("aria-pressed", "false");
    btn.addEventListener("click", () => setCat(state.cat === cat ? null : cat));
    nav.appendChild(btn);
  }
}
function syncChips() {
  document.querySelectorAll("#chips .chip").forEach(c => {
    c.setAttribute("aria-pressed", String((c.dataset.cat || null) === state.cat));
  });
}
function setCat(cat) {
  state.cat = cat;
  syncChips();
  renderWall();
  announce(cat
    ? `已篩選「${cat}」，共 ${PROJECTS.filter(p => p.category === cat).length} 件`
    : "已顯示全部作品");
}

/* ── 搜尋 ── */
const qEl = $("q");
let qTimer = null;
qEl.addEventListener("input", () => {
  const v = qEl.value.trim();
  document.body.classList.toggle("searching", qEl.value !== "");
  clearTimeout(qTimer);
  qTimer = setTimeout(() => {
    state.q = v;
    renderWall();
    if (v) announce(`搜尋「${v}」，找到 ${PROJECTS.filter(matches).length} 件`);
  }, 120);
});
qEl.addEventListener("keydown", e => {
  if (e.key === "Escape") { e.preventDefault(); clearSearch(); }
});
function clearSearch() {
  qEl.value = "";
  state.q = "";
  document.body.classList.remove("searching");
  renderWall();
  qEl.focus();
}
$("qx").addEventListener("click", clearSearch);
$("resetBtn").addEventListener("click", () => {
  qEl.value = "";
  state.q = "";
  state.cat = null;
  document.body.classList.remove("searching");
  syncChips();
  renderWall();
  announce("已顯示全部作品");
});
/* 「/」聚焦搜尋框 */
addEventListener("keydown", e => {
  if (e.key !== "/" || e.metaKey || e.ctrlKey || e.altKey) return;
  const t = e.target;
  if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
  e.preventDefault();
  qEl.focus();
  qEl.select();
});

/* ── 分組切換 ── */
function setGroup(g) {
  state.group = g;
  $("grpDate").setAttribute("aria-pressed", String(g === "date"));
  $("grpCat").setAttribute("aria-pressed", String(g === "cat"));
  try { localStorage.setItem("index.group", g); } catch (e) {}
  renderWall();
}
$("grpDate").addEventListener("click", () => { setGroup("date"); announce("依星軌（時間）排列"); });
$("grpCat").addEventListener("click", () => { setGroup("cat"); announce("依星座（分類）排列"); });

/* ── 隨機觀星：挑一顆星，天上漣漪、地上捲過去亮起來 ── */
let lastPick = -1;
$("rand").addEventListener("click", () => {
  const pool = PROJECTS.map((p, gi) => gi).filter(gi => matches(PROJECTS[gi]));
  if (!pool.length) return;
  let gi = pool[Math.floor(Math.random() * pool.length)];
  if (pool.length > 1 && gi === lastPick) gi = pool[(pool.indexOf(gi) + 1) % pool.length];
  lastPick = gi;
  skyPulse(gi);
  const card = wallEl.querySelector(`.card[data-gi="${gi}"]`);
  if (!card) return;
  card.classList.add("in");
  card.scrollIntoView({ behavior: reduced() ? "auto" : "smooth", block: "center" });
  card.classList.remove("flash");
  void card.offsetWidth;
  card.classList.add("flash");
  setTimeout(() => card.classList.remove("flash"), 2000);
  announce(`隨機挑中：${PROJECTS[gi].title}`);
});

/* ── 頁首統計數字滾動 ── */
function countUp(el, to) {
  if (reduced()) { el.textContent = to; return; }
  const dur = 900, t0 = performance.now();
  const step = t => {
    const k = Math.min(1, (t - t0) / dur);
    el.textContent = Math.round(to * (1 - Math.pow(1 - k, 3)));
    if (k < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

/* ==========================================================================
 * 星空圖引擎：每顆星＝一件作品，依日期連成星軌
 *   - 佈局：由舊到新蛇行鋪排（boustrophedon）＋雜湊抖動，任何寬度都成立
 *   - 氛圍：漂移星雲、雙層視差星塵與銀河帶、沿星軌巡行的彗星、

 *           準星收束後彈出介紹卡（含開啟連結）
 *   - 互動：滑過發光＋懸浮卡、點擊開啟；觸控先點選看介紹、再點開啟
 *   - 篩選連動：搜尋／類別改變時，不符合的星星與線段一起變暗

  function layoutSky() {

      const y = Math.min(H - 70, by + (h2 - .5) * Math.min(rowH * .62, 52));

  /* 命中測試：18px 內最近的可見星星 */

  function showTip(gi, withLink) {

    if (!s) return;
    tipEl.style.setProperty("--cc", catColor(p.category));
    tipEl.classList.toggle("tap", !!withLink);
    tipEl.innerHTML = `
      <span class="t-emoji">${esc(p.emoji)}</span>
      <span class="t-main">
        <b>${esc(p.title)}</b>
        <span class="t-meta">${esc(p.date)}｜${esc(p.category)}</span>
        <span class="t-desc">${esc(p.desc)}</span>
        ${withLink
          ? `<a class="t-open" href="./${esc(p.dir)}/index.html">開啟作品 →</a>`
          : `<span class="t-open">點擊星星開啟 →</span>`}
      </span>`;
    tipEl.classList.add("on");
    const tw = tipEl.offsetWidth || 260, th = tipEl.offsetHeight || 96;
    let lx = s.x + 18, ly = s.y - th / 2;
    if (lx + tw > W - 10) lx = s.x - tw - 18;
    lx = Math.max(8, lx);
    ly = Math.max(8, Math.min(H - th - 8, ly));
    tipEl.style.transform = `translate(${Math.round(lx)}px, ${Math.round(ly)}px)`;
  }
  function hideTip() {
    tipEl.classList.remove("on");
    tipEl.classList.remove("tap");
    selGi = -1;
  }

  cv.addEventListener("pointermove", e => {
    const rc = cv.getBoundingClientRect();
    const x = e.clientX - rc.left, y = e.clientY - rc.top;
    if (!reduced()) { par.tx = (x / W - .5) * 2; par.ty = (y / H - .5) * 2; }
    if (e.pointerType === "touch" || scan) return;
    const gi = starAt(x, y);
    if (gi !== hoverGi) {
      hoverGi = gi;
      cv.style.cursor = gi < 0 ? "" : "pointer";
      if (gi >= 0) { selGi = -1; showTip(gi, false); }
      else if (selGi < 0) hideTip();
      if (!running) drawSky(performance.now());
    }
  });
  cv.addEventListener("pointerleave", () => {
    hoverGi = -1; par.tx = par.ty = 0; cv.style.cursor = "";
    if (selGi < 0) hideTip();
    if (!running) drawSky(performance.now());
  });
  cv.addEventListener("pointerdown", e => { lastPT = e.pointerType || "mouse"; });
  cv.addEventListener("click", e => {
    if (scan) { scan = null; resetScanBtn(); }   /* 點天空可中止掃描 */
    const rc = cv.getBoundingClientRect();
    const gi = starAt(e.clientX - rc.left, e.clientY - rc.top);
    if (gi < 0) { hideTip(); if (!running) drawSky(performance.now()); return; }
    if (lastPT === "touch") {
      /* 觸控：第一下點選看介紹，第二下（或按懸浮卡連結）開啟 */
      if (selGi === gi) { location.href = `./${PROJECTS[gi].dir}/index.html`; return; }
      selGi = gi; hoverGi = -1;
      showTip(gi, true);
      if (!running) drawSky(performance.now());
    } else {
      location.href = `./${PROJECTS[gi].dir}/index.html`;
    }
  });

  /* 對外：篩選連動與隨機漣漪 */
  updateSky = function () {
    visSet = new Set(PROJECTS.map((p, gi) => matches(p) ? gi : -1).filter(g => g >= 0));
    if (ctx && !running) drawSky(performance.now());
  };
  skyPulse = function (gi) {
    if (reduced() || !ctx) return;
    pulses.push({ gi, t0: performance.now() });
    if (!running) drawSky(performance.now());
  };

  /* 觀察可見性與尺寸 */
  if ("IntersectionObserver" in window) {
    new IntersectionObserver(es => { inView = !!es[0] && es[0].isIntersecting; setRunning(); },
      { rootMargin: "80px 0px" }).observe(cv);
  }
  document.addEventListener("visibilitychange", setRunning);
  mReduced.addEventListener("change", setRunning);
  let rzT = null;
  const onResize = () => {
    clearTimeout(rzT);
    rzT = setTimeout(() => { layoutSky(); drawSky(performance.now()); }, 120);
  };
  if ("ResizeObserver" in window) new ResizeObserver(onResize).observe(skyWrap);
  else addEventListener("resize", onResize);

  layoutSky();
  drawSky(performance.now());
  setRunning();
})();

/* ── 啟動 ── */
/* 進場淡入：只在 JS 在場且未要求減少動態時才先隱藏，確保內容永遠讀得到 */
if (!reduced()) {
  document.body.classList.add("preload");
  requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.remove("preload")));
}
countUp($("sN"), PROJECTS.length);
countUp($("sC"), new Set(PROJECTS.map(p => p.category)).size);
countUp($("sD"), new Set(PROJECTS.map(p => p.date)).size);
renderHero();
renderChips();
let savedGroup = "date";
try { savedGroup = localStorage.getItem("index.group") || "date"; } catch (e) {}
setGroup(savedGroup === "cat" ? "cat" : "date");
mReduced.addEventListener("change", revealCards);
</script>
</body>
