<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日小專案 · 入口</title>
<style>
  :root {
    --bg: #0b0e1a;
    --bg-soft: #11152a;
    --card: #161b33;
    --card-hover: #1c2240;
    --line: #262d4f;
    --text: #e8eaf6;
    --text-dim: #9aa3c7;
    --text-faint: #6b7399;
    --gold: #f0c674;
    --c-trivia: #64b5f6;   /* 網路趣聞・冷知識 */
    --c-tool:   #81c784;   /* 生活痛點小工具 */
    --c-learn:  #ffb74d;   /* 學習新知 */
    --c-fun:    #ba9df1;   /* 創意・娛樂 */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .wrap { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 0 24px 80px; }

  header { text-align: center; padding: 72px 0 40px; }
  .kicker {
    display: inline-block; font-size: 13px; letter-spacing: 6px; color: var(--gold);
    border: 1px solid rgba(240,198,116,.35); border-radius: 999px; padding: 6px 18px 6px 24px;
    margin-bottom: 22px;
  }
  h1 { font-size: clamp(32px, 6vw, 52px); font-weight: 700; letter-spacing: 10px; text-indent: 10px; }
  .subtitle { margin-top: 14px; color: var(--text-dim); font-size: 15px; line-height: 1.9; }
  .subtitle .count { color: var(--gold); font-weight: 700; }

  .filters { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 34px 0 30px; }
  .chip {
    background: var(--bg-soft); border: 1px solid var(--line); color: var(--text-dim);
    border-radius: 999px; padding: 8px 18px; font-size: 14px; cursor: pointer;
    transition: all .2s; font-family: inherit;
  }
  .chip:hover { border-color: var(--text-faint); color: var(--text); }
  .chip.active { background: var(--gold); border-color: var(--gold); color: #1a1508; font-weight: 700; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }

  .card {
    display: flex; flex-direction: column; gap: 10px;
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 22px 22px 18px; text-decoration: none; color: inherit;
    transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent, var(--gold)); opacity: .85;
  }
  .card:hover {
    transform: translateY(-4px); background: var(--card-hover);
    border-color: var(--accent, var(--gold));
    box-shadow: 0 12px 32px rgba(0,0,0,.45);
  }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .date { font-size: 12.5px; color: var(--text-faint); letter-spacing: 1px; font-variant-numeric: tabular-nums; }
  .tag {
    font-size: 11.5px; padding: 3px 10px; border-radius: 999px; white-space: nowrap;
    color: var(--accent, var(--gold)); border: 1px solid color-mix(in srgb, var(--accent, var(--gold)) 45%, transparent);
    background: color-mix(in srgb, var(--accent, var(--gold)) 10%, transparent);
  }
  .card h2 { font-size: 19px; font-weight: 700; letter-spacing: .5px; line-height: 1.4; }
  .card h2 .emoji { margin-right: 8px; }
  .card p { font-size: 13.5px; color: var(--text-dim); line-height: 1.85; flex: 1; }
  .card .go {
    font-size: 12.5px; color: var(--text-faint); margin-top: 4px;
    display: flex; align-items: center; gap: 6px; transition: color .18s;
  }
  .card:hover .go { color: var(--accent, var(--gold)); }
  .card .go::after { content: "→"; transition: transform .18s; }
  .card:hover .go::after { transform: translateX(4px); }

  .empty { text-align: center; color: var(--text-faint); padding: 60px 0; font-size: 15px; display: none; }

  footer {
    margin-top: 70px; text-align: center; color: var(--text-faint);
    font-size: 12.5px; line-height: 2.1; border-top: 1px solid var(--line); padding-top: 30px;
  }
  footer .dot { margin: 0 8px; opacity: .5; }

  @media (max-width: 560px) {
    header { padding: 48px 0 28px; }
    h1 { letter-spacing: 6px; text-indent: 6px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">
  <header>
    <div class="kicker">DAILY PROJECTS</div>
    <h1>每日小專案</h1>
    <p class="subtitle">
      每天早上長出一個全新的互動網頁小驚喜。<br>
      目前收藏 <span class="count" id="count">0</span> 件作品 · 全部離線可用 · 資料只存在你的瀏覽器
    </p>
  </header>

  <nav class="filters" id="filters"></nav>
  <main class="grid" id="grid"></main>
  <div class="empty" id="empty">這個分類還沒有作品，明天早上再來看看吧 🌅</div>

  <footer>
    所有作品皆為純靜態網頁，個人資料一律儲存於瀏覽器 localStorage，不會上傳任何地方。
    <span class="dot">·</span>清除瀏覽資料會一併清除作品內的紀錄。
  </footer>
</div>

<script>
/* ==========================================================================
 * 專案清單（新專案請加在「陣列最上方」，首頁卡片會自動生成）
 * 欄位：date、title、emoji、dir（資料夾名）、category、desc（一句話介紹）
 * category 固定四選一：網路趣聞・冷知識｜生活痛點小工具｜學習新知｜創意・娛樂
 * ========================================================================== */
const PROJECTS = [
  { date: "2026-07-10", title: "末班列車", emoji: "🚃", dir: "2026-07-10-末班列車",
    category: "創意・娛樂", desc: "一場沒有終點的夜行文字冒險：23 個場景、道具解鎖岔路，收集六種結局的車票。" },
  { date: "2026-07-09", title: "光有多慢", emoji: "💫", dir: "2026-07-09-光有多慢",
    category: "學習新知", desc: "親手發射一道光沿太陽系一站站爬，用真實光行時間體會「光其實很慢」。" },
  { date: "2026-07-08", title: "幾點見？", emoji: "🌏", dir: "2026-07-08-幾點見",
    category: "生活痛點小工具", desc: "跨時區會議規劃器：城市日夜畫成光帶，一眼找出大家都清醒的黃金時段。" },
  { date: "2026-07-07", title: "真的假的？", emoji: "🔍", dir: "2026-07-07-真的假的",
    category: "網路趣聞・冷知識", desc: "當冷知識鑑定官：判斷真偽、蓋下朱印翻出正解，看你最容易被哪一類騙。" },
  { date: "2026-07-06", title: "深夜電台", emoji: "📻", dir: "2026-07-06-深夜電台",
    category: "創意・娛樂", desc: "瀏覽器裡的 Lo-Fi 節拍機：6×16 步進序列器，所有聲音由 Web Audio 即時合成。" },
  { date: "2026-07-05", title: "天空調色盤", emoji: "🌇", dir: "2026-07-05-天空調色盤",
    category: "學習新知", desc: "拖著太陽從正午滑向地平線，天空依真實散射物理即時變色，還有火星藍夕陽。" },
  { date: "2026-07-04", title: "咖啡因時鐘", emoji: "☕", dir: "2026-07-04-咖啡因時鐘",
    category: "生活痛點小工具", desc: "記下每一杯咖啡，用半衰期曲線算出就寢時體內還剩多少咖啡因在讓你清醒。" },
  { date: "2026-07-03", title: "冷知識扭蛋機", emoji: "🎰", dir: "2026-07-03-冷知識扭蛋機",
    category: "網路趣聞・冷知識", desc: "轉一顆扭蛋掉出查證過的冷知識，稀有度加權翻牌，集滿 24 張卡片通關。" },
  { date: "2026-07-02", title: "掌上禪庭", emoji: "🪨", dir: "2026-07-02-掌上禪庭",
    category: "創意・娛樂", desc: "桌上一方會呼吸的枯山水：落石生紋、鋪苔耙沙，把你的庭園收藏成帶落款的圖。" },
  { date: "2026-07-01", title: "費米的餐巾紙", emoji: "🧮", dir: "2026-07-01-費米的餐巾紙",
    category: "學習新知", desc: "用「係數 × 10 的次方」估出世界的大小，落在正解 10 倍內就算命中。" },
  { date: "2026-06-30", title: "訂閱體檢所", emoji: "🩺", dir: "2026-06-30-訂閱體檢所",
    category: "生活痛點小工具", desc: "把所有訂閱攤開來體檢：換算成一年總額、揪出殭屍訂閱，數字可能讓你嚇一跳。" },
  { date: "2026-06-29", title: "你的耳朵幾歲？", emoji: "👂", dir: "2026-06-29-你的耳朵幾歲",
    category: "網路趣聞・冷知識", desc: "戴上耳機掃頻測試，找出你聽得見的最高頻率，估算你的「耳朵年齡」。" },
  { date: "2026-06-28", title: "推敲", emoji: "🖌️", dir: "2026-06-28-推敲",
    category: "創意・娛樂", desc: "水墨風的成語 Wordle：每日一則四字成語，六次之內把它推敲出來。" },
  { date: "2026-06-27", title: "本福特定律", emoji: "🔢", dir: "2026-06-27-本福特定律",
    category: "學習新知", desc: "數字的隱形指紋：親手驗證真實數據為什麼偏愛開頭是 1。" },
  { date: "2026-06-26", title: "星空製造所", emoji: "✨", dir: "2026-06-26-星空製造所",
    category: "創意・娛樂", desc: "在動態夜空點擊星星、連成你的專屬星座，附真實星座的查證小知識。" },
  { date: "2026-06-26", title: "小確幸玻璃罐", emoji: "🫙", dir: "2026-06-26-小確幸玻璃罐",
    category: "生活痛點小工具", desc: "把每天的小確幸寫成紙條投進玻璃罐，慢慢裝滿，心情低落時隨機回味一張。" },
  { date: "2026-06-25", title: "此刻的世界", emoji: "🌐", dir: "2026-06-25-此刻的世界",
    category: "網路趣聞・冷知識", desc: "從你打開頁面的那一秒起，即時推算全世界正在發生的事。" },
];

const CATEGORIES = [
  { name: "全部", color: null },
  { name: "網路趣聞・冷知識", color: "var(--c-trivia)" },
  { name: "生活痛點小工具", color: "var(--c-tool)" },
  { name: "學習新知", color: "var(--c-learn)" },
  { name: "創意・娛樂", color: "var(--c-fun)" },
];
const COLOR_MAP = {
  "網路趣聞・冷知識": "var(--c-trivia)",
  "生活痛點小工具": "var(--c-tool)",
  "學習新知": "var(--c-learn)",
  "創意・娛樂": "var(--c-fun)",
};

let activeFilter = "全部";

function render() {
  const grid = document.getElementById("grid");
  const shown = PROJECTS.filter(p => activeFilter === "全部" || p.category === activeFilter);
  grid.innerHTML = shown.map(p => `
    <a class="card" href="./${p.dir}/index.html" style="--accent:${COLOR_MAP[p.category] || "var(--gold)"}">
      <div class="card-top">
        <span class="date">${p.date}</span>
        <span class="tag">${p.category}</span>
      </div>
      <h2><span class="emoji">${p.emoji}</span>${p.title}</h2>
      <p>${p.desc}</p>
      <span class="go">開啟作品</span>
    </a>`).join("");
  document.getElementById("empty").style.display = shown.length ? "none" : "block";
  document.getElementById("count").textContent = PROJECTS.length;
}

function renderFilters() {
  const nav = document.getElementById("filters");
  nav.innerHTML = "";
  CATEGORIES.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "chip" + (activeFilter === c.name ? " active" : "");
    btn.textContent = c.name;
    btn.addEventListener("click", () => { activeFilter = c.name; renderFilters(); render(); });
    nav.appendChild(btn);
  });
}

/* 星空背景：輕量 canvas 閃爍 */
(function starfield() {
  const cv = document.getElementById("stars");
  const ctx = cv.getContext("2d");
  let stars = [];
  function resize() {
    cv.width = innerWidth; cv.height = innerHeight;
    const n = Math.min(140, Math.floor(innerWidth * innerHeight / 12000));
    stars = Array.from({ length: n }, () => ({
      x: Math.random() * cv.width,
      y: Math.random() * cv.height,
      r: Math.random() * 1.1 + .3,
      base: Math.random() * .5 + .25,
      speed: Math.random() * 1.5 + .5,
      phase: Math.random() * Math.PI * 2,
    }));
  }
  function tick(t) {
    ctx.clearRect(0, 0, cv.width, cv.height);
    for (const s of stars) {
      const a = s.base + Math.sin(t / 1000 * s.speed + s.phase) * .2;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = "#dfe6ff";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  addEventListener("resize", resize);
  resize();
  requestAnimationFrame(tick);
})();

renderFilters();
render();
</script>
</body>
</html>
