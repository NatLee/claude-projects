<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fdf6ec">
<title>冷知識扭蛋機 · 每日一顆小驚喜</title>
<style>
  :root{
    --bg1:#fdf6ec; --bg2:#f3e7d8; --ink:#372a21; --muted:#8f7f73;
    --card:#fffdf9; --line:rgba(58,46,40,.10); --line2:rgba(58,46,40,.16);
    --accent:#e8623d; --accent2:#f2a33d;
    --r-common:#7c8a99; --r-rare:#3d84c6; --r-legend:#e0a52a;
    --shadow:0 18px 40px -18px rgba(58,46,40,.45);
    --c-動物:#4a9d6f; --c-太空:#6a5acd; --c-人體:#d9607a;
    --c-歷史:#b5793a; --c-食物:#e0863c; --c-自然:#3aa6a0;
    --ease-out:cubic-bezier(.22,1,.36,1);
    --ease-pop:cubic-bezier(.22,1.4,.4,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC","Hiragino Sans GB",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #fff5e6 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #ffe9d6 0%, transparent 55%),
      linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100vh; line-height:1.7; -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  /* 紙感細點紋理 */
  body::before{content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:radial-gradient(rgba(58,46,40,.05) 1px, transparent 1.5px);
    background-size:26px 26px}
  ::selection{background:#ffd9c2; color:#5a3421}

  .wrap{position:relative; z-index:1; max-width:1120px; margin:0 auto; padding:22px 22px 72px}

  /* ── 背景漂浮扭蛋（純裝飾） ─────────────────────────── */
  .bg-caps{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  .bg-caps i{position:absolute; border-radius:50%; opacity:.16; filter:blur(2px);
    animation:floaty 11s ease-in-out infinite alternate}
  .bg-caps i::before{content:""; position:absolute; inset:50% 0 0 0; background:rgba(255,255,255,.75);
    border-radius:0 0 999px 999px}
  .bg-caps i:nth-child(1){width:74px; height:74px; left:6%;  top:16%; background:#4a9d6f; animation-delay:0s}
  .bg-caps i:nth-child(2){width:52px; height:52px; right:9%; top:24%; background:#6a5acd; animation-delay:-4s}
  .bg-caps i:nth-child(3){width:64px; height:64px; left:12%; bottom:12%; background:#e0863c; animation-delay:-7s}
  .bg-caps i:nth-child(4){width:44px; height:44px; right:14%; bottom:20%; background:#d9607a; animation-delay:-2.5s}
  @keyframes floaty{from{transform:translateY(-14px) rotate(-8deg)} to{transform:translateY(14px) rotate(9deg)}}

  /* ── 進場編排 ───────────────────────────────────────── */
  .reveal{opacity:0; animation:rise .55s var(--ease-out) forwards; animation-delay:var(--d,0s)}
  @keyframes rise{from{opacity:0; transform:translateY(16px)} to{opacity:1; transform:translateY(0)}}

  /* ── 頂欄與回首頁 ──────────────────────────────────── */
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px}
  a.home{display:inline-flex; align-items:center; gap:6px; text-decoration:none;
    color:var(--muted); font-size:.88rem; padding:6px 14px; border-radius:999px;
    border:1px solid var(--line); background:rgba(255,253,249,.7);
    transition:transform .2s var(--ease-out), color .2s, border-color .2s}
  a.home:hover{color:var(--accent); border-color:#ffd0b8; transform:translateX(-3px)}
  .top-note{font-size:.78rem; color:var(--muted); letter-spacing:.06em}

  /* ── 標題區 ─────────────────────────────────────────── */
  header.hero{text-align:center; margin-bottom:24px}
  .badge{display:inline-block; font-size:.8rem; letter-spacing:.14em;
    color:var(--accent); background:#fff0e6; border:1px solid #ffd9c2;
    padding:5px 14px; border-radius:999px; margin-bottom:12px}
  h1{margin:0; font-size:clamp(2rem,4.8vw,3.1rem); letter-spacing:.02em; line-height:1.25}
  h1 .em{color:var(--accent); display:inline-block}
  .subtitle{color:var(--muted); margin-top:8px; font-size:1.04rem}

  /* ── 統計儀表 ───────────────────────────────────────── */
  .dash{background:rgba(255,253,249,.82); border:1px solid var(--line); border-radius:22px;
    padding:18px 22px 20px; margin:0 auto 6px; max-width:860px;
    box-shadow:0 10px 30px -22px rgba(58,46,40,.55); backdrop-filter:blur(4px)}
  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:10px}
  .stat{text-align:center; padding:8px 6px 6px; border-radius:14px;
    transition:transform .22s var(--ease-out)}
  .stat:hover{transform:translateY(-2px)}
  .stat b{display:block; font-size:1.55rem; line-height:1.2; color:var(--ink);
    font-variant-numeric:tabular-nums; letter-spacing:.01em}
  .stat span{font-size:.8rem; color:var(--muted)}
  .stat.legend b{color:var(--r-legend)}
  .progress-row{display:flex; align-items:center; gap:14px; margin-top:12px}
  .progress{flex:1; height:9px; border-radius:999px; background:#ecdfce; overflow:hidden}
  .progress > i{display:block; height:100%; width:100%;
    background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:999px;
    transform:scaleX(0); transform-origin:left center;
    transition:transform .9s var(--ease-out)}
  #bar-note{font-size:.8rem; color:var(--muted); white-space:nowrap}

  /* ── 主舞台：扭蛋機 + 抽卡結果 ─────────────────────── */
  .stage{display:grid; grid-template-columns:360px minmax(0,1fr); gap:36px; align-items:center;
    margin:34px 0 12px}

  .machine-col{display:flex; flex-direction:column; align-items:center; gap:16px}
  .machine{width:100%; max-width:300px; filter:drop-shadow(0 24px 30px rgba(58,46,40,.28)); cursor:pointer}
  .machine .knob{transform-box:fill-box; transform-origin:center; transition:transform .7s cubic-bezier(.34,1.56,.64,1)}
  .machine.turning .knob{transform:rotate(220deg)}
  .machine.shaking{animation:shake .46s ease-in-out infinite}
  @keyframes shake{0%,100%{transform:translate(0,0) rotate(0)}
    20%{transform:translate(-2px,0) rotate(-1.1deg)}
    45%{transform:translate(2px,1px) rotate(1.1deg)}
    70%{transform:translate(-2px,1px) rotate(-.7deg)}
    90%{transform:translate(2px,0) rotate(.7deg)}}
  .machine .caps .c{transform-box:fill-box; transform-origin:center}
  .machine.shaking .caps .c{animation:jig .26s ease-in-out infinite alternate}
  .machine.shaking .caps .c:nth-child(2n){animation-delay:.06s}
  .machine.shaking .caps .c:nth-child(3n){animation-delay:.11s}
  @keyframes jig{from{transform:translateY(0) rotate(0)} to{transform:translateY(-6px) rotate(7deg)}}

  .btn{appearance:none; border:none; cursor:pointer; font-family:inherit; position:relative; overflow:hidden;
    font-size:1.18rem; font-weight:700; color:#fff; letter-spacing:.06em;
    padding:15px 44px; border-radius:16px;
    background:linear-gradient(180deg,#ef7350,var(--accent));
    box-shadow:0 12px 22px -10px rgba(232,98,61,.8), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .15s var(--ease-out), box-shadow .2s ease, opacity .2s}
  .btn::after{content:""; position:absolute; inset:0;
    background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.45) 50%,transparent 60%);
    transform:translateX(-130%); transition:transform .55s ease}
  .btn:hover{transform:translateY(-2px); box-shadow:0 16px 26px -10px rgba(232,98,61,.85), inset 0 1px 0 rgba(255,255,255,.4)}
  .btn:hover::after{transform:translateX(130%)}
  .btn:active{transform:translateY(1px) scale(.985)}
  .btn:disabled{opacity:.55; cursor:default; transform:none}
  .btn .coin{margin-right:8px; display:inline-block}
  .btn:hover .coin{animation:coinflip .55s var(--ease-out)}
  @keyframes coinflip{50%{transform:translateY(-4px) rotate(18deg)}}

  .odds{display:flex; gap:14px; flex-wrap:wrap; justify-content:center;
    font-size:.78rem; color:var(--muted)}
  .odds .odd{display:inline-flex; align-items:center; gap:6px}
  .odds .dot{width:9px; height:9px; border-radius:50%; display:inline-block}

  /* ── 抽卡結果區 ─────────────────────────────────────── */
  .result{position:relative; min-height:300px; display:flex; align-items:center; justify-content:center}
  .placeholder{color:var(--muted); text-align:center; padding:28px 24px; border:2px dashed var(--line2);
    border-radius:22px; width:100%; background:rgba(255,255,255,.4)}
  .placeholder .big{font-size:2.6rem; margin-bottom:6px; display:inline-block; animation:eggbob 3s ease-in-out infinite}
  @keyframes eggbob{0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-7px) rotate(3deg)}}

  /* 扭蛋掉落 → 裂開 儀式 */
  .cap-scene{position:relative; width:100%; min-height:300px;
    display:flex; align-items:center; justify-content:center}
  .cap-shadow{position:absolute; left:50%; top:calc(50% + 66px); width:120px; height:16px;
    transform:translateX(-50%); border-radius:50%;
    background:radial-gradient(ellipse, rgba(58,46,40,.35), transparent 70%);
    opacity:0; animation:shfade .5s ease-out .4s forwards}
  @keyframes shfade{to{opacity:1}}
  .capsule{position:relative; width:132px; height:132px;
    animation:capin 1s var(--ease-out) forwards}
  @keyframes capin{
    0%{transform:translateY(-190px) rotate(-14deg); opacity:0}
    12%{opacity:1}
    46%{transform:translateY(0) rotate(0)}
    58%{transform:translateY(-26px) rotate(3deg)}
    70%{transform:translateY(0) scaleX(1.08) scaleY(.9)}
    78%{transform:scaleX(.97) scaleY(1.03) rotate(-4deg)}
    88%{transform:rotate(4deg)}
    100%{transform:rotate(0)}}
  .capsule .half{position:absolute; left:0; width:100%; height:50%;
    transition:transform .4s cubic-bezier(.5,-.25,.45,1), opacity .4s ease}
  .capsule .half.top{top:0; border-radius:999px 999px 0 0;
    box-shadow:inset -8px 6px 14px rgba(255,255,255,.35), inset 6px -4px 10px rgba(0,0,0,.12)}
  .capsule .half.bot{bottom:0; border-radius:0 0 999px 999px; background:#fff6e8;
    box-shadow:inset -6px -8px 14px rgba(58,46,40,.1), inset 0 3px 0 rgba(58,46,40,.08)}
  .capsule .shine{position:absolute; left:18%; top:10%; width:26%; height:16%;
    background:rgba(255,255,255,.7); border-radius:50%; transform:rotate(-24deg)}
  .capsule.r-common .half.top{background:linear-gradient(160deg,#a3b3c2,var(--r-common))}
  .capsule.r-rare .half.top{background:linear-gradient(160deg,#6fb0e6,var(--r-rare))}
  .capsule.r-legend .half.top{background:linear-gradient(160deg,#ffdd8f,var(--r-legend))}
  .capsule.r-legend::after{content:""; position:absolute; inset:-22px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,214,110,.55), transparent 65%);
    animation:glowpulse 1s ease-in-out infinite; pointer-events:none}
  @keyframes glowpulse{0%,100%{opacity:.5; transform:scale(1)} 50%{opacity:1; transform:scale(1.12)}}
  .capsule .burst{position:absolute; left:50%; top:50%; width:130px; height:130px;
    margin:-65px 0 0 -65px; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle, #fff6dd 0%, rgba(255,225,150,.55) 45%, transparent 70%);
    transform:scale(0); opacity:0}
  .capsule.open .half.top{transform:translate(-16px,-96px) rotate(-30deg); opacity:0}
  .capsule.open .half.bot{transform:translate(14px,64px) rotate(24deg); opacity:0}
  .capsule.open .shine{opacity:0; transition:opacity .2s}
  .capsule.open .burst{animation:burst .45s ease-out forwards}
  @keyframes burst{0%{transform:scale(.2); opacity:1} 100%{transform:scale(2.6); opacity:0}}

  /* 抽卡結果卡片 */
  .card{position:relative; width:100%; background:var(--card);
    border:1px solid var(--line); border-radius:24px; padding:26px 26px 22px;
    box-shadow:var(--shadow); overflow:hidden}
  .card.pop{animation:pop .55s var(--ease-pop)}
  @keyframes pop{0%{transform:scale(.6) translateY(20px); opacity:0}
    60%{transform:scale(1.03)} 100%{transform:scale(1); opacity:1}}
  .card::before{content:""; position:absolute; inset:0; border-radius:24px; padding:2px;
    background:linear-gradient(135deg,var(--edge,transparent),transparent 55%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none}
  .card .toprow,.card .emoji,.card h2,.card p.fact,.card .src{position:relative; z-index:1}
  .card .toprow{display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap}
  .tag{font-size:.78rem; padding:3px 11px; border-radius:999px; font-weight:600; color:#fff}
  .rarity{font-size:.76rem; padding:3px 11px; border-radius:999px; font-weight:700;
    border:1px solid currentColor; background:#fff}
  .newflag{margin-left:auto; font-size:.76rem; font-weight:800; color:var(--accent);
    background:#fff0e6; border:1px solid #ffd0b8; padding:3px 11px; border-radius:999px;
    animation:blink 1.1s ease-in-out infinite}
  @keyframes blink{50%{opacity:.45}}
  .card .emoji{font-size:3.3rem; line-height:1; margin:6px 0 2px}
  .card.pop .emoji{animation:emojiin .7s var(--ease-pop) .1s backwards}
  @keyframes emojiin{0%{transform:scale(.3) rotate(-20deg); opacity:0} 100%{transform:none; opacity:1}}
  .card h2{margin:.1em 0 .35em; font-size:1.5rem}
  .card p.fact{margin:0; font-size:1.06rem; color:#4a3b33}
  .card .src{margin-top:14px; font-size:.8rem; color:var(--muted); border-top:1px dashed var(--line2); padding-top:10px}
  .card .src b{color:#6f5f54; font-weight:600}
  .card.lgnd{box-shadow:0 0 0 1px #f1cd78, var(--shadow), 0 0 34px -6px rgba(224,165,42,.55)}

  /* 傳說金光射線 */
  .rays{position:absolute; left:50%; top:50%; width:180%; aspect-ratio:1; z-index:0;
    margin-left:-90%; transform:translateY(-50%);
    background:repeating-conic-gradient(from 0deg,
      rgba(240,196,90,.22) 0deg 9deg, transparent 9deg 24deg);
    -webkit-mask:radial-gradient(circle, #000 0%, transparent 68%);
    mask:radial-gradient(circle, #000 0%, transparent 68%);
    pointer-events:none}
  .rays::before{content:""; position:absolute; inset:0; border-radius:50%;
    background:inherit; -webkit-mask:inherit; mask:inherit;
    animation:rayspin 16s linear infinite}
  .result.off .rays::before, .hidden-tab .rays::before{animation-play-state:paused}
  @keyframes rayspin{to{transform:rotate(1turn)}}

  .sparkles{position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:1}
  .sparkles i{position:absolute; bottom:30%; width:8px; height:8px; border-radius:50%;
    background:radial-gradient(circle,#ffe9a8,#eab64a); opacity:0; animation:spk 1.1s ease-out forwards}
  @keyframes spk{0%{transform:translateY(10px) scale(.3); opacity:0}
    30%{opacity:1} 100%{transform:translateY(-46px) scale(1); opacity:0}}

  /* 彩紙慶祝 */
  .confetti{position:absolute; inset:0; pointer-events:none; z-index:5}
  .confetti i{position:absolute; left:50%; top:40%; width:9px; height:13px; border-radius:2px; opacity:0;
    animation:fling var(--t,1s) cubic-bezier(.16,.84,.44,1) forwards}
  @keyframes fling{
    0%{transform:translate(-50%,-50%) scale(.5) rotate(0deg); opacity:1}
    100%{transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(var(--rot)); opacity:0}}

  /* ── 圖鑑 ───────────────────────────────────────────── */
  .album{margin-top:52px}
  .album-head{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;
    border-bottom:2px solid var(--line); padding-bottom:10px; margin-bottom:22px}
  .album-head h3{margin:0; font-size:1.35rem}
  .album-head .hint{color:var(--muted); font-size:.86rem}
  .cat-block{margin-bottom:28px}
  .cat-title{display:flex; align-items:center; gap:9px; font-weight:700; margin:0 0 12px; font-size:1.05rem}
  .cat-dot{width:11px; height:11px; border-radius:50%; flex:none}
  .cat-count{font-size:.8rem; color:var(--muted); font-weight:500}
  .cat-bar{flex:1; max-width:110px; height:5px; border-radius:999px; background:#ecdfce; overflow:hidden; margin-left:4px}
  .cat-bar i{display:block; height:100%; background:var(--cbc,#bbb); border-radius:999px;
    transform-origin:left center; transition:transform .7s var(--ease-out)}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(152px,1fr)); gap:13px}
  .slot{position:relative; border-radius:16px; padding:15px 14px; min-height:120px;
    border:1px solid var(--line); background:var(--card);
    transition:transform .2s var(--ease-out), box-shadow .25s ease;
    display:flex; flex-direction:column; gap:5px; font:inherit; color:inherit; text-align:left}
  .slot.got{cursor:pointer}
  .slot.got:hover{transform:translateY(-4px) rotate(-.6deg); box-shadow:0 14px 24px -14px rgba(58,46,40,.6)}
  .slot.got:active{transform:translateY(-1px) scale(.98)}
  .slot .s-emoji{font-size:1.8rem; line-height:1; transition:transform .25s var(--ease-pop)}
  .slot.got:hover .s-emoji{transform:scale(1.18) rotate(6deg)}
  .slot .s-title{font-weight:700; font-size:.98rem}
  .slot .s-rarity{font-size:.72rem; font-weight:700; margin-top:auto}
  .slot .s-count{position:absolute; top:9px; right:11px; font-size:.72rem; color:var(--muted)}
  .slot.locked{background:repeating-linear-gradient(135deg,#f4ece0,#f4ece0 9px,#efe5d6 9px,#efe5d6 18px);
    color:#c9b9a6; align-items:center; justify-content:center; text-align:center}
  .slot.locked .q{font-size:2rem; font-weight:800}
  .slot.locked .s-locktxt{font-size:.78rem}
  .slot.just-got{animation:gotflash .9s var(--ease-pop)}
  @keyframes gotflash{0%{transform:scale(.8); opacity:.3} 55%{transform:scale(1.06)} 100%{transform:scale(1); opacity:1}}

  /* ── Modal ──────────────────────────────────────────── */
  .overlay{position:fixed; inset:0; background:rgba(40,30,25,.5); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; padding:20px; z-index:50}
  .overlay.show{display:flex; animation:fade .2s ease}
  @keyframes fade{from{opacity:0}}
  .modal{max-width:440px; width:100%; position:relative}
  .modal .card{animation:pop .4s var(--ease-pop)}
  .modal-close{position:absolute; top:10px; right:12px; border:none; background:rgba(255,253,249,.85);
    width:34px; height:34px; border-radius:50%; font-size:1.3rem; color:var(--muted); cursor:pointer;
    line-height:1; z-index:6; transition:transform .2s var(--ease-out), color .2s}
  .modal-close:hover{transform:rotate(90deg); color:var(--accent)}

  footer{margin-top:48px; text-align:center; color:var(--muted); font-size:.86rem}
  .linkbtn{background:none; border:none; color:var(--accent); cursor:pointer; font:inherit;
    text-decoration:underline; text-underline-offset:3px; padding:0; transition:opacity .2s}
  .linkbtn:hover{opacity:.75}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 20px; border-radius:12px; font-size:.9rem;
    opacity:0; pointer-events:none; transition:opacity .3s ease, transform .3s var(--ease-out); z-index:60}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* ── 聚焦樣式（鍵盤） ───────────────────────────────── */
  a:focus-visible, button:focus-visible{outline:3px solid rgba(232,98,61,.6); outline-offset:2px}
  .slot:focus-visible{outline:3px solid rgba(232,98,61,.6); outline-offset:2px}

  /* ── 響應式 ─────────────────────────────────────────── */
  @media(max-width:860px){
    .stage{grid-template-columns:1fr; gap:22px}
    .machine{max-width:250px}
  }
  @media(max-width:560px){
    .wrap{padding:16px 14px 60px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .top-note{display:none}
    .progress-row{flex-direction:column; align-items:stretch; gap:6px}
    #bar-note{text-align:right}
    .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  }

  /* ── 減少動態偏好：完整降級 ─────────────────────────── */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration:.001s !important; animation-delay:0s !important;
      animation-iteration-count:1 !important; transition-duration:.001s !important}
  }
  html.rm *, html.rm *::before, html.rm *::after{
    animation-duration:.001s !important; animation-delay:0s !important;
    animation-iteration-count:1 !important; transition-duration:.001s !important}
</style>
</head>
<body>
<div class="bg-caps" aria-hidden="true"><i></i><i></i><i></i><i></i></div>

<div class="wrap">
  <nav class="topbar reveal" style="--d:0s" aria-label="頁面導覽">
    <a class="home" href="../../../index.html">← 回首頁</a>
    <span class="top-note">轉一顆，收一張</span>
  </nav>

  <header class="hero">
    <span class="badge reveal" style="--d:.05s">每日小專案 · 網路趣聞・冷知識</span>

// 稀有度抽出權重：越稀有越難抽到（普通:稀有:傳說 = 6:3:1）
const RARITY_WEIGHT = {"普通":6, "稀有":3, "傳說":1};

/* ------------------------------------------------------------------------
   本機儲存：收藏紀錄存在瀏覽器 localStorage（key 前綴 gacha.）
   結構：{ "卡片id": { first_pulled_at, pull_count }, ... }
------------------------------------------------------------------------ */
const STORE_KEY = "gacha.collection";

function loadCollection(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return {};
    const obj = JSON.parse(raw);
    return (obj && typeof obj === "object" && !Array.isArray(obj)) ? obj : {};
  }catch(err){
    return {};
  }
}

function saveCollection(col){
  localStorage.setItem(STORE_KEY, JSON.stringify(col));
}

// 台灣時區（UTC+8）的 ISO 時間字串，純為記錄抽卡時間用
function nowTW(){
  const d = new Date(Date.now() + 8 * 3600 * 1000);
  return d.toISOString().slice(0, 19) + "+08:00";
}

function computeStats(col){
  const total_cards = CARDS.length;
  const ids = Object.keys(col);
  const unique_collected = ids.length;
  let total_pulls = 0;
  ids.forEach(id => { total_pulls += (col[id].pull_count || 0); });
  const percent = total_cards ? Math.round(unique_collected / total_cards * 100) : 0;
  return {total_cards, unique_collected, total_pulls, percent};
}

// 依稀有度加權隨機抽出一張卡
function weightedPick(){
  const weights = CARDS.map(c => RARITY_WEIGHT[c.rarity] || 1);
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for(let i = 0; i < CARDS.length; i++){
    r -= weights[i];
    if(r < 0) return CARDS[i];
  }
  return CARDS[CARDS.length - 1];
}

// 轉一顆扭蛋：抽出一張卡並記錄進收藏（原 POST /api/pull）
function apiPull(){
  const col = loadCollection();
  const chosen = weightedPick();
  const key = String(chosen.id);
  const is_new = !(key in col);
  if(is_new){
    col[key] = {first_pulled_at: nowTW(), pull_count: 1};
  }else{
    col[key].pull_count = (col[key].pull_count || 0) + 1;
  }
  saveCollection(col);
  return {
    card: Object.assign({}, chosen, {collected:true, pull_count: col[key].pull_count}),
    is_new: is_new,
    stats: computeStats(col)
  };
}

// 整本圖鑑：每張卡片與是否已收集，加上統計（原 GET /api/album）
function apiAlbum(){
  const col = loadCollection();
  const cards = CARDS.map(c => {
    const rec = col[String(c.id)];
    return Object.assign({}, c, {
      collected: !!rec,
      pull_count: rec ? (rec.pull_count || 0) : 0
    });
  });
  return {cards, stats: computeStats(col)};
}

// 清空收藏，重新開始收集（原 POST /api/reset）
function apiReset(){
  localStorage.removeItem(STORE_KEY);
  return {ok:true, stats: computeStats({})};
}

/* ------------------------------------------------------------------------
   介面邏輯
------------------------------------------------------------------------ */
const RARITY = {
  "普通": {cls:"var(--r-common)", label:"普通"},
  "稀有": {cls:"var(--r-rare)",   label:"稀有 ✦"},
  "傳說": {cls:"var(--r-legend)", label:"傳說 ★"}
};
const CATS = ["動物","太空","人體","歷史","食物","自然"];
const catColor = c => getComputedStyle(document.documentElement).getPropertyValue("--c-"+c).trim() || "#999";
const sleep = ms => new Promise(r => setTimeout(r, ms));
const $ = id => document.getElementById(id);

let busy = false;
let firstRender = true;
let lastFocus = null;

/* 減少動態偏好：初始讀取 + 動態監聽 */
const motionMQ = window.matchMedia("(prefers-reduced-motion: reduce)");
let reduceMotion = motionMQ.matches;
function applyMotionPref(){
  document.documentElement.classList.toggle("rm", reduceMotion);
}
if(motionMQ.addEventListener){
  motionMQ.addEventListener("change", e => { reduceMotion = e.matches; applyMotionPref(); });
}else if(motionMQ.addListener){
  motionMQ.addListener(e => { reduceMotion = e.matches; applyMotionPref(); });
}
applyMotionPref();

/* 分頁隱藏時暫停持續型動畫（金光射線等） */
document.addEventListener("visibilitychange", () => {
  document.body.classList.toggle("hidden-tab", document.hidden);
});

/* 結果區離開視野時暫停金光射線 */
if("IntersectionObserver" in window){
  const io = new IntersectionObserver(entries => {
    entries.forEach(en => $("result").classList.toggle("off", !en.isIntersecting));
  }, {threshold: 0});
  io.observe($("result"));
}

function rarityColor(r){
  if(r==="傳說") return "var(--r-legend)";
  if(r==="稀有") return "var(--r-rare)";
  return "var(--r-common)";
}
function rarityClass(r){
  if(r==="傳說") return "r-legend";
  if(r==="稀有") return "r-rare";
  return "r-common";
}

/* 數字滾動（rAF，有限時長；隱藏分頁或減少動態時直接定值） */
const _rolls = new Map();
function rollTo(el, target, render){
  const from = Number(el.dataset.v || 0);
  el.dataset.v = target;
  if(reduceMotion || document.hidden || from === target){
    render(target);
    return;
  }
  if(_rolls.has(el)) cancelAnimationFrame(_rolls.get(el));
  const t0 = performance.now(), dur = 600;
  const step = now => {
    const p = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    render(Math.round(from + (target - from) * e));
    if(p < 1) _rolls.set(el, requestAnimationFrame(step));
    else _rolls.delete(el);
  };
  _rolls.set(el, requestAnimationFrame(step));
}

function cardHTML(card, opts){
  opts = opts || {};
  const rc = rarityColor(card.rarity);
  const cc = catColor(card.category);
  const isL = card.rarity==="傳說";
  const newflag = opts.isNew ? '<span class="newflag">NEW ✦ 新卡片</span>' : '';
  const rays = isL ? '<div class="rays" aria-hidden="true"></div>' : '';
  const sparkles = isL ? '<div class="sparkles" aria-hidden="true">'+Array.from({length:9},(_,i)=>
     `<i style="left:${8+i*10}%; animation-delay:${i*0.09}s"></i>`).join('')+'</div>' : '';
  return `
    <article class="card ${isL?'lgnd':''} ${opts.pop?'pop':''}" style="--edge:${rc}">
      ${rays}${sparkles}
      <div class="toprow">
        <span class="tag" style="background:${cc}">${card.category}</span>
        <span class="rarity" style="color:${rc}">${RARITY[card.rarity].label}</span>
        ${newflag}
      </div>
      <div class="emoji">${card.emoji}</div>
      <h2>${card.title}</h2>
      <p class="fact">${card.fact}</p>
      <div class="src">📎 來源：<b>${card.source}</b></div>
    </article>`;
}

function loadAlbum(newId){
  const data = apiAlbum();
  renderStats(data.stats, data.cards);
  renderAlbum(data.cards, newId);
}

function renderStats(s, cards){
  const elC = $("st-collected"), elP = $("st-percent"), elN = $("st-pulls"), elL = $("st-legend");
  rollTo(elC, s.unique_collected, v => { elC.textContent = v + "/" + s.total_cards; });
  rollTo(elP, s.percent, v => { elP.textContent = v + "%"; });
  rollTo(elN, s.total_pulls, v => { elN.textContent = v; });
  if(cards){
    const lg = cards.filter(c => c.rarity==="傳說");
    const got = lg.filter(c => c.collected).length;
    rollTo(elL, got, v => { elL.textContent = v + "/" + lg.length; });
  }
  $("bar").style.transform = "scaleX(" + (s.percent / 100) + ")";
  const left = s.total_cards - s.unique_collected;
  $("bar-note").textContent = left === 0 ? "🎉 全圖鑑達成！" : "再收集 " + left + " 張就通關";
}

function renderAlbum(cards, newId){
  const body = $("albumBody");
  body.innerHTML = "";
  CATS.forEach((cat, ci) => {
    const group = cards.filter(c => c.category===cat);
    if(!group.length) return;
    const got = group.filter(c=>c.collected).length;
    const block = document.createElement("section");
    block.className = "cat-block" + (firstRender ? " reveal" : "");
    if(firstRender) block.style.setProperty("--d", (0.6 + ci*0.02).toFixed(2) + "s");
    block.innerHTML = `<div class="cat-title">
        <span class="cat-dot" style="background:${catColor(cat)}"></span>${cat}
        <span class="cat-count">${got}/${group.length}</span>
        <span class="cat-bar" aria-hidden="true" style="--cbc:${catColor(cat)}"><i style="transform:scaleX(${(got/group.length).toFixed(3)})"></i></span></div>
      <div class="grid"></div>`;
    const grid = block.querySelector(".grid");
    group.forEach(c => grid.appendChild(slotEl(c)));
    body.appendChild(block);
  });
  firstRender = false;
  if(newId != null){
    const el = body.querySelector('[data-id="' + newId + '"]');
    if(el) el.classList.add("just-got");
  }
}

function slotEl(c){
  if(c.collected){
    const el = document.createElement("button");
    el.type = "button";
    el.className = "slot got";
    el.dataset.id = c.id;
    el.style.borderColor = catColor(c.category);
    el.setAttribute("aria-label", "重新閱讀卡片：" + c.title + "（" + c.rarity + "）");
    el.innerHTML = `
      ${c.pull_count>1 ? `<span class="s-count">×${c.pull_count}</span>`:''}
      <div class="s-emoji" aria-hidden="true">${c.emoji}</div>
      <div class="s-title">${c.title}</div>
      <div class="s-rarity" style="color:${rarityColor(c.rarity)}">${RARITY[c.rarity].label}</div>`;
    el.addEventListener("click", () => openModal(c));
    return el;
  }
  const el = document.createElement("div");
  el.className = "slot locked";
  el.dataset.id = c.id;
  el.innerHTML = `<div class="q" aria-hidden="true">？</div><div class="s-locktxt">尚未收集</div>`;
  return el;
}

function openModal(card){
  lastFocus = document.activeElement;
  $("modalCard").innerHTML = cardHTML(card, {pop:true}) +
    '<button class="modal-close" id="mClose" aria-label="關閉卡片">×</button>';
  $("mClose").addEventListener("click", closeModal);
  $("overlay").classList.add("show");
  $("mClose").focus();
}
function closeModal(){
  $("overlay").classList.remove("show");
  if(lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
  lastFocus = null;
}
$("overlay").addEventListener("click", e => { if(e.target.id==="overlay") closeModal(); });
document.addEventListener("keydown", e => {
  const open = $("overlay").classList.contains("show");
  if(e.key==="Escape" && open) closeModal();
  else if(e.key==="Tab" && open){ e.preventDefault(); const b=$("mClose"); if(b) b.focus(); }
});

function toast(msg){
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* 扭蛋掉落場景 */
function showCapsule(rarity){
  $("result").innerHTML = `
    <div class="cap-scene" aria-hidden="true">
      <div class="cap-shadow"></div>
      <div class="capsule ${rarityClass(rarity)}" id="capsule">
        <i class="half top"></i><i class="half bot"></i><i class="shine"></i><i class="burst"></i>
      </div>
    </div>`;
}

/* 傳說彩紙慶祝（一次性 DOM 粒子，transform/opacity，結束自動移除） */
function burstConfetti(host){
  if(reduceMotion) return;
  const wrap = document.createElement("div");
  wrap.className = "confetti";
  wrap.setAttribute("aria-hidden", "true");
  const colors = ["#f2c14e","#e8623d","#f2a33d","#e0a52a","#6a5acd","#fff3d8"];
  let html = "";
  for(let i = 0; i < 28; i++){
    const a = Math.random() * Math.PI * 2;
    const d = 70 + Math.random() * 140;
    const tx = Math.round(Math.cos(a) * d);
    const ty = Math.round(Math.sin(a) * d - 46);
    const rot = Math.round(Math.random() * 720 - 360);
    const t = (0.7 + Math.random() * 0.5).toFixed(2);
    html += `<i style="--tx:${tx}px; --ty:${ty}px; --rot:${rot}deg; --t:${t}s; background:${colors[i % colors.length]}"></i>`;
  }
  wrap.innerHTML = html;
  host.appendChild(wrap);
  setTimeout(() => wrap.remove(), 1400);
}

async function doPull(){
  if(busy) return;
  busy = true;
  const btn = $("pullBtn");
  btn.disabled = true;

  const data = apiPull();
  const card = data.card;
  const m = $("machine");

  if(!reduceMotion){
    // 儀式：搖機器 → 扭蛋掉落彈跳 → 裂開 → 卡片現身
    m.classList.add("turning","shaking");
    await sleep(520);
    m.classList.remove("turning","shaking");
    showCapsule(card.rarity);
    await sleep(1000);
    const cap = $("capsule");
    if(cap) cap.classList.add("open");
    await sleep(300);
  }

  $("result").innerHTML = cardHTML(card, {isNew:data.is_new, pop:true});
  if(card.rarity==="傳說") burstConfetti($("result"));
  loadAlbum(data.is_new ? card.id : null);

  if(data.is_new && card.rarity==="傳說") toast("✦ 傳說級新卡片！太幸運了！");
  else if(data.is_new) toast("獲得新卡片，已收進圖鑑！");
  else toast("這張已經收集過囉（收藏 +1）");

  busy = false;
  btn.disabled = false;
}

function resetAll(){
  if(!confirm("確定要清空所有收藏、重新開始收集嗎？")) return;
  apiReset();
  $("result").innerHTML = '<div class="placeholder" id="placeholder">'+
    '<div class="big">🥚</div>圖鑑已清空，重新開始收集吧！</div>';
  loadAlbum();
  toast("已清空收藏");
}

$("pullBtn").addEventListener("click", doPull);
$("machine").addEventListener("click", doPull);
$("resetBtn").addEventListener("click", resetAll);
loadAlbum();
</script>
</body>
</html>
