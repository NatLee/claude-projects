<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龐貝：最後一天 · 你的選擇，寫進了灰燼裡</title>
<style>
  :root{
    --bg:#0c0a09; --bg2:#14100c; --ink:#efe6db; --dim:#b7a894; --faint:#7d6f5e;
    --ember:#eb8a3c; --ember2:#f4b064; --ash:#9a8f82; --sage:#8fc79a; --dust:#caa06a;
    --peril:#e0705a; --line:#2a2118; --panel:rgba(28,22,16,.66); --brd:rgba(235,138,60,.16);
    --ease:cubic-bezier(.22,.61,.36,1); --pop:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:radial-gradient(1200px 700px at 50% -14%,#2a1a0e 0%,transparent 58%),radial-gradient(800px 560px at 88% 106%,#1a1109 0%,transparent 55%),var(--bg);
    color:var(--ink); font-family:"Noto Serif TC","Songti TC","Noto Sans TC","PingFang TC","Microsoft JhengHei",serif; line-height:1.75; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden}
  .wrap{max-width:820px; margin:0 auto; padding:24px 20px 72px; position:relative; z-index:1}
  #amb{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  #amb i{position:absolute; top:-12px; width:5px; height:5px; border-radius:50%; background:#b9ac9a; opacity:.16; animation:fall var(--t,11s) linear var(--td,0s) infinite}
  @keyframes fall{to{transform:translateY(104vh) translateX(var(--dx,20px)); opacity:0}}
  .rise{opacity:0; transform:translateY(14px); animation:rise .7s var(--ease) forwards; animation-delay:var(--d,0s)} @keyframes rise{to{opacity:1; transform:none}}
  .home{display:inline-flex; align-items:center; gap:.4em; color:var(--faint); text-decoration:none; font-size:.82rem; letter-spacing:.04em; transition:color .25s,transform .25s; font-family:"Noto Sans TC",sans-serif}
  .home:hover,.home:focus-visible{color:var(--ember); transform:translateX(-3px)} .home:focus-visible{outline:2px solid var(--ember); outline-offset:3px; border-radius:6px}
  header.top{margin:18px 0 8px}
  .kick{font-size:.72rem; letter-spacing:.4em; color:var(--dust); text-transform:uppercase; font-weight:700; font-family:"Noto Sans TC",sans-serif}
  h1{margin:.12em 0; font-size:clamp(2.4rem,8vw,4rem); font-weight:800; letter-spacing:.02em; line-height:1.05; background:linear-gradient(94deg,var(--ember2),#ffe0b0 46%,var(--ember)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .sub{color:var(--dim); font-size:clamp(1rem,2.2vw,1.1rem); max-width:44ch; font-family:"Noto Sans TC",sans-serif}
  .scene{background:var(--panel); border:1px solid var(--brd); border-radius:16px; padding:24px 22px; margin-top:20px; backdrop-filter:blur(7px); box-shadow:0 26px 60px -34px rgba(0,0,0,.9); min-height:210px}
  .scene .story{font-size:1.16rem; line-height:1.95; color:#f0e7dc} .scene .story p{margin:0 0 .7em} .scene .story .lead{color:var(--ember2); font-weight:600}
  .fadein{animation:fadein .6s var(--ease) both} @keyframes fadein{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}
  .choices{display:flex; flex-direction:column; gap:10px; margin-top:20px}
  .choice{appearance:none; text-align:left; font-family:inherit; font-size:1.02rem; color:var(--ink); background:linear-gradient(100deg,rgba(235,138,60,.09),rgba(255,255,255,.02)); border:1px solid var(--brd); border-radius:12px; padding:.85em 1em .85em 2.4em; cursor:pointer; position:relative; line-height:1.5; transition:transform .16s var(--pop),background .22s,border-color .22s}
  .choice::before{content:"›"; position:absolute; left:1em; top:.72em; color:var(--ember); font-size:1.3rem; font-weight:800; transition:transform .22s}
  .choice:hover{background:linear-gradient(100deg,rgba(235,138,60,.2),rgba(235,138,60,.05)); border-color:rgba(235,138,60,.5); transform:translateX(3px)}
  .choice:hover::before{transform:translateX(3px)} .choice:active{transform:translateX(3px) scale(.99)} .choice:focus-visible{outline:2px solid var(--ember); outline-offset:2px}
  .ending .etag{display:inline-block; font-family:"Noto Sans TC",sans-serif; font-size:.72rem; font-weight:800; letter-spacing:.12em; padding:.24em .7em; border-radius:999px; margin-bottom:12px}
  .ending.survive .etag{background:rgba(143,199,154,.16); color:var(--sage); border:1px solid rgba(143,199,154,.4)}
  .ending.perish .etag{background:rgba(224,112,90,.14); color:var(--peril); border:1px solid rgba(224,112,90,.4)}
  .ending h2{font-size:1.7rem; margin:.1em 0 .4em; font-weight:800} .ending.survive h2{color:var(--sage)} .ending.perish h2{color:var(--ember2)}
  .ending .note{margin-top:16px; padding:14px 16px; border-left:3px solid var(--dust); border-radius:0 10px 10px 0; background:rgba(202,160,106,.08); font-family:"Noto Sans TC",sans-serif; font-size:.94rem; color:var(--dim); line-height:1.7}
  .ending .note b{color:var(--dust); font-weight:700}
  .again{margin-top:20px; display:flex; gap:10px; flex-wrap:wrap}
  .btn{appearance:none; font-family:"Noto Sans TC",sans-serif; font-size:.94rem; font-weight:600; color:var(--ink); background:rgba(255,255,255,.05); border:1px solid var(--brd); border-radius:11px; padding:.66em 1.2em; cursor:pointer; transition:transform .16s var(--pop),background .22s,border-color .22s}
  .btn:hover{background:rgba(235,138,60,.16); border-color:rgba(235,138,60,.45)} .btn:active{transform:translateY(1px) scale(.98)} .btn:focus-visible{outline:2px solid var(--ember); outline-offset:2px}
  .btn.primary{background:linear-gradient(160deg,var(--ember),#c96a24); color:#1a0f06; border-color:transparent} .btn.ghost{color:var(--dim)}
  .wallwrap{margin-top:22px; background:var(--panel); border:1px solid var(--brd); border-radius:16px; padding:16px 18px; backdrop-filter:blur(7px)}
  .wallhd{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:12px; font-family:"Noto Sans TC",sans-serif}
  .wallhd .t{font-size:.72rem; letter-spacing:.16em; color:var(--faint); text-transform:uppercase; font-weight:700}
  .wallhd .c{color:var(--dim); font-size:.9rem} .wallhd .c b{color:var(--ember2); font-size:1.05rem; font-variant-numeric:tabular-nums}
  .wall{display:grid; grid-template-columns:repeat(auto-fill,minmax(124px,1fr)); gap:9px}
  .slot{border:1px solid var(--line); border-radius:11px; padding:10px 11px; min-height:58px; display:flex; flex-direction:column; gap:3px; background:rgba(255,255,255,.015); font-family:"Noto Sans TC",sans-serif; transition:border-color .3s,background .3s}
  .slot .si{font-size:1.1rem} .slot .st{font-size:.84rem; font-weight:600; color:var(--ink); line-height:1.3}
  .slot.locked{opacity:.55} .slot.locked .st{color:var(--faint)}
  .slot.got.survive{border-color:rgba(143,199,154,.38); background:rgba(143,199,154,.06)} .slot.got.perish{border-color:rgba(224,112,90,.32); background:rgba(224,112,90,.05)}
  .slot.new{animation:pop .6s var(--pop)} @keyframes pop{0%{transform:scale(.6); opacity:0}70%{transform:scale(1.08)}100%{transform:none}}
  .spark{position:fixed; z-index:40; width:7px; height:7px; border-radius:50%; pointer-events:none; animation:spark .8s var(--ease) forwards} @keyframes spark{to{transform:translate(var(--dx),var(--dy)) scale(.2); opacity:0}}

  /* 一頁式詳解 */
  .detail{margin-top:52px}
  .dsep{display:flex; align-items:center; gap:14px; color:var(--faint); font-size:.78rem; letter-spacing:.2em; text-transform:uppercase; margin-bottom:6px; font-family:"Noto Sans TC",sans-serif}
  .dsep::before,.dsep::after{content:""; height:1px; flex:1; background:linear-gradient(90deg,transparent,var(--line),transparent)}
  .dtitle{font-size:clamp(1.5rem,4.5vw,2.1rem); font-weight:800; margin:.1em 0 .3em; background:linear-gradient(94deg,var(--ember2),var(--dust)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .lede{color:var(--dim); font-size:1.06rem; max-width:56ch; margin:0 0 26px; font-family:"Noto Sans TC",sans-serif}
  .dh{font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); font-weight:700; margin:34px 0 14px; font-family:"Noto Sans TC",sans-serif}
  .numbers{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px}
  .num{background:var(--panel); border:1px solid var(--brd); border-radius:14px; padding:16px}
  .num .n{font-size:2rem; font-weight:800; color:var(--ember2); line-height:1; font-variant-numeric:tabular-nums; font-family:"Noto Sans TC",sans-serif} .num .n small{font-size:.9rem; color:var(--dim); font-weight:700; margin-left:2px}
  .num .l{color:var(--dim); font-size:.86rem; margin-top:6px; font-family:"Noto Sans TC",sans-serif}
  .timeline{position:relative; margin:0; padding:0 0 0 26px; list-style:none}
  .timeline::before{content:""; position:absolute; left:7px; top:6px; bottom:6px; width:2px; background:linear-gradient(180deg,var(--ember),var(--dust))}
  .tl{position:relative; padding:0 0 20px 6px}
  .tl::before{content:""; position:absolute; left:-23px; top:5px; width:12px; height:12px; border-radius:50%; background:var(--bg); border:2px solid var(--ember)}
  .tl .tt{font-weight:700; color:var(--ember2); font-size:.9rem; font-family:"Noto Sans TC",sans-serif} .tl .td{color:var(--dim); font-size:.98rem; margin-top:2px; font-family:"Noto Sans TC",sans-serif}
  .dcards{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px}
  .dcard{background:var(--panel); border:1px solid var(--brd); border-radius:14px; padding:16px 17px}
  .dcard .ci{font-size:1.5rem} .dcard .ct{font-weight:800; margin:.3em 0 .3em; font-size:1.04rem} .dcard .cb{color:var(--dim); font-size:.94rem; line-height:1.7; font-family:"Noto Sans TC",sans-serif}
  .dsrc{margin-top:26px; color:var(--faint); font-size:.84rem; font-family:"Noto Sans TC",sans-serif}
  .reveal{opacity:0; transform:translateY(18px); transition:opacity .7s var(--ease), transform .7s var(--ease)} .reveal.in{opacity:1; transform:none}

  footer{margin-top:40px; color:var(--faint); font-size:.82rem; text-align:center; font-family:"Noto Sans TC",sans-serif}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important; animation-iteration-count:1!important; transition-duration:.05s!important}#amb{display:none}.reveal{opacity:1; transform:none}}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
</style>
</head>
<body>
<div id="amb" aria-hidden="true"></div>
<div class="wrap">
  <a class="home rise" href="../../../index.html" style="--d:.02s">← 回每日小專案</a>
  <header class="top">
    <div class="kick rise" style="--d:.08s">互動歷史 · 西元 79 年</div>
    <h1 class="rise" style="--d:.14s">龐貝：最後一天</h1>
    <p class="sub rise" style="--d:.22s">維蘇威山頂騰起一朵傘松狀的雲。接下來的一天，你的每個選擇，都對得上考古學家後來真的挖出來的結局。八種命運，你會走到哪一種？玩完往下捲，看真實的故事。</p>
  </header>
  <section class="scene rise" id="scene" style="--d:.3s" aria-live="polite"></section>
  <section class="wallwrap rise" style="--d:.4s" aria-label="結局收集牆">
    <div class="wallhd"><span class="t">結局收集牆</span><span class="c">已發現 <b id="fcount">0</b> / <span id="ftotal">8</span> 種命運</span></div>
    <div class="wall" id="wall"></div>
  </section>
  <section class="detail" id="detail" aria-label="深入了解"></section>
  <footer>史實取材自小普林尼的信與考古發現。資料來源：Pliny the Younger、Wikipedia</footer>
</div>
<p class="sr" id="live" aria-live="assertive"></p>

<script>
/* === STORY_DATA_START === 分支故事（唯一資料來源；tools 測試會抽這段） === */
const STORY = {
  start: "start",
  nodes: {
    start: {
      text: "<p>正午，龐貝的廣場。這幾天地一直在震，人們早就習慣了。</p><p>可是此刻——維蘇威山頂騰起一根巨大的雲柱，頂端張開像一棵<span class='lead'>傘松</span>，白裡透黑，越爬越高。細灰開始從天上飄下來，落在你肩上，還溫溫的。</p>",
      choices: [
        { t: "往港口去，看看還有沒有船", to: "port" },
        { t: "先回家，家人還在", to: "home" },
        { t: "留在廣場，看那朵雲會怎樣", to: "street" }
      ]
    },
    port: {
      text: "<p>碼頭亂成一團。浮石像下雹一樣砸在海面上。一名船長正急著解纜：<span class='lead'>「要走趁現在，海風還推得動船！」</span></p>",
      choices: [
        { t: "立刻上船，離開這裡", to: "e_sea" },
        { t: "我得先回去帶家人再來", to: "homeLate" },
        { t: "聽說艦隊要來救人，再等一下", to: "fleet" }
      ]
    },
    home: {
      text: "<p>家裡，浮石已經在中庭積起一層，屋頂咯吱作響。孩子拉著你的衣角。天色暗得不像白天。</p>",
      choices: [
        { t: "趁還走得動，帶全家往南邊逃（背對火山）", to: "south" },
        { t: "關緊門窗，躲在屋裡等它過去", to: "indoors" },
        { t: "往海邊碰運氣，也許還有船", to: "port" },
        { t: "躲進地窖，那裡最堅固，避開落石", to: "e_cellar" }
      ]
    },
    street: {
      text: "<p>你留在廣場。幾個小時過去，灰越積越厚，白晝變成深夜。</p><p>入夜後，山上滾下熾紅的光——一波波<span class='lead'>灼熱的氣浪</span>正貼著地面撲下山來。</p>",
      choices: [
        { t: "現在就往南邊拚命跑", to: "south" },
        { t: "躲進石造的大會堂", to: "indoors" },
        { t: "巷子裡有人在喊救命，折回去", to: "e_garden" },
        { t: "留在廣場中央，和眾人擠在一起禱告", to: "e_forum" }
      ]
    },
    homeLate: {
      text: "<p>你趕回家，浮石已經堆到齊腰，門幾乎推不開。夜更深了，遠處傳來房屋崩塌的悶響。</p>",
      choices: [
        { t: "摸黑往南邊逃", to: "south" },
        { t: "一家人躲進內室，等天亮", to: "indoors" },
        { t: "往北邊的赫庫蘭尼姆去，那裡海邊或許有救援船", to: "e_herc" }
      ]
    },
    fleet: {
      text: "<p>有人說，米塞農的艦隊司令——那位什麼都要親眼看看的老先生——正率船渡海而來。你在岸邊，真的等到了他的船。</p>",
      choices: [
        { t: "不等了，趁還有風，自己往南逃", to: "south" },
        { t: "跟著艦隊，往斯塔比伊", to: "e_fleet" }
      ]
    },
    indoors: {
      text: "<p>你們擠在內室。浮石壓垮了一部分屋頂，空氣越來越難吸。</p><p>門外，一種滾燙的、帶著硫磺味的風，正貼著地面湧過來。</p>",
      choices: [
        { t: "摀住口鼻，撐到天亮", to: "e_indoors" },
        { t: "受不了了，衝出門往海邊跑", to: "e_herc" }
      ]
    },
    south: {
      text: "<p>你們背對著火山往南走。路上全是同樣逃命的人，牽著牲口、扛著孩子。灰在腳邊越積越深，但每一步，都離那座山更遠一點。</p>",
      choices: [
        { t: "咬牙一直走，別回頭", to: "e_south" },
        { t: "身後有熟識的人跌倒了，折回去扶", to: "e_garden" }
      ]
    },

    e_sea: { end:true, survive:true, icon:"⛵", title:"乘上最後的船",
      text: "<p>船離了岸。你回頭，龐貝在灰幕之後只剩一團輪廓。海上顛簸得厲害，但風把你們一寸寸推向對岸的安全。</p>",
      note: "<b>史實</b>：提早由海路或陸路離開的人，多半活了下來。龐貝原有上萬人口，真正罹難的，是那些留下來、想等風暴過去的人。" },
    e_south: { end:true, survive:true, icon:"🌤️", title:"走到看不見山的地方",
      text: "<p>天亮時，你們已經在很遠的南方。回望，維蘇威被自己吐出的黑雲整個蓋住。你們，活下來了。</p>",
      note: "<b>史實</b>：往遠離火山的方向、在浮石階段就出發的人得以生還。逃過一劫的關鍵，是「早」，以及不回頭。" },
    e_indoors: { end:true, survive:false, icon:"🕯️", title:"等一個等不到的天亮",
      text: "<p>屋頂終於撐不住，而門外那道灼熱的氣浪，比任何人想的都快。一切結束得很安靜。</p>",
      note: "<b>史實</b>：許多人躲在屋內等待，卻在隔天清晨約 300°C 的火山碎屑流中瞬間喪命。1800 年代 Fiorelli 用石膏灌入灰中的空腔，鑄出了他們最後的姿態。" },
    e_herc: { end:true, survive:false, icon:"🌊", title:"海邊的船屋",
      text: "<p>你奔向赫庫蘭尼姆的海邊，鑽進岸邊存放船隻的石棚，和幾百個同樣祈求救援的人擠在一起。凌晨，第一道氣浪從山上直撲而下。</p>",
      note: "<b>史實</b>：赫庫蘭尼姆海邊的船屋裡，發現了 300 多具遺骸——那是凌晨第一波、將近 300°C 的碎屑流，幾乎在一瞬間奪走了他們。" },
    e_fleet: { end:true, survive:false, icon:"📜", title:"跟著那位好奇的司令",
      text: "<p>艦隊靠了斯塔比伊。老司令鎮定地安撫眾人、甚至去洗了澡、用了餐，說這樣大家才不慌。但空氣裡的硫味越來越濃……</p>",
      note: "<b>史實</b>：艦隊司令老普林尼從米塞農渡海馳援，最後在斯塔比伊窒息而死。他 17 歲的外甥小普林尼在對岸目睹一切，寫下了這場災難唯一流傳的目擊紀錄。" },
    e_garden: { end:true, survive:false, icon:"🌿", title:"沒有獨自離開",
      text: "<p>你折回去，扶起跌倒的人，又去拉另一個。你們一起躲進一座花園的牆角，彼此靠著。然後，山把最後一口氣呼了出來。</p>",
      note: "<b>史實</b>：龐貝的「逃亡者花園」裡，發現了一群一起罹難者的鑄模——在最後時刻，有人選擇不獨自走。" },
    e_cellar: { end:true, survive:false, icon:"🏚️", title:"最堅固的地方，最出不去",
      text: "<p>地窖確實擋住了落石。可是浮石很快把出口封死，樓上的房子又壓了下來。堅固的牆，成了走不出的牆。</p>",
      note: "<b>史實</b>：不少人躲進地窖或密閉房間避難，卻被不斷堆積的浮石與倒塌的建築封死其中——龐貝與赫庫蘭尼姆都發現過這樣成群的遺骸。堅固，有時反而是陷阱。" },
    e_forum: { end:true, survive:false, icon:"🏛️", title:"廣場上，無處可躲",
      text: "<p>你和眾人擠在開闊的廣場中央禱告。可是當清晨的氣浪掃過全城，開闊，就意味著沒有任何遮蔽。</p>",
      note: "<b>史實</b>：火山碎屑流是貼著地面高速湧來的高溫氣體與火山灰，開闊處無險可守。留在城中等待、沒有及時離開的人，罹難比例最高。" }
  }
};
const ENDINGS = ["e_sea","e_south","e_indoors","e_herc","e_fleet","e_garden","e_cellar","e_forum"];
/* === STORY_DATA_END === */

/* === DETAIL_DATA_START === 一頁式詳解資料（tools 測試會抽這段） === */
const DETAIL = {
  title: "真實的最後兩天",
  lede: "西元 79 年維蘇威火山的爆發不是一瞬間，而是持續了大約一天的兩個階段：先是十幾個小時的浮石與火山灰墜落，然後是數波近 300°C 的火山碎屑流。逃過一劫的關鍵，是早，以及不回頭。",
  numbers: [
    { n:"~25", u:"小時", l:"爆發全程" },
    { n:"~300", u:"°C", l:"火山碎屑流溫度" },
    { n:"6", u:"波", l:"碎屑流（火山密度流）" },
    { n:"79", u:"AD", l:"傳統記載 8 月，近年證據指向 10 月" }
  ],
  timeline: [
    { t:"正午前後", d:"維蘇威山頂騰起傘松狀雲柱，浮石與火山灰開始墜落（小普林尼記載）。" },
    { t:"接下來約 18 小時", d:"浮石不斷堆積、壓垮屋頂；白晝變黑夜，許多人趁機逃離或躲藏。" },
    { t:"入夜到凌晨", d:"噴發柱崩塌，第一波火山碎屑流直撲比龐貝更近火山的赫庫蘭尼姆。" },
    { t:"隔天清晨", d:"碎屑流抵達並掩埋龐貝；留下來的人幾乎在一瞬間罹難。" },
    { t:"同時", d:"老普林尼渡海救援，殞於斯塔比伊；外甥小普林尼在對岸寫下唯一目擊紀錄。" },
    { t:"1700 多年後", d:"考古發掘與 Fiorelli 的石膏灌漿技法，讓罹難者最後的姿態重見天日。" }
  ],
  cards: [
    { icon:"🗿", title:"用石膏『複製』最後一刻", body:"遺體在火山灰中腐朽後留下空腔。1860 年代，Fiorelli 把石膏灌進這些空腔，鑄出罹難者臨終的姿態——連衣褶都保留了下來。" },
    { icon:"⛵", title:"其實多數人逃出去了", body:"龐貝約有上萬人口，罹難的多是留下等待的人。這場災難給了人們幾個小時——只是不是所有人都在第一時間動身。" },
    { icon:"🌊", title:"赫庫蘭尼姆的船屋", body:"比龐貝更靠近火山的赫庫蘭尼姆先被掩埋。岸邊船屋裡發現 300 多具遺骸，是凌晨第一波近 300°C 的高溫幾乎瞬間造成的。" },
    { icon:"📜", title:"日期之謎", body:"傳統記載爆發於 8 月 24 日，但近年出土的炭化銘文與果實證據，讓不少學者認為其實發生在 10 月中下旬。" }
  ],
  sources: "小普林尼書信、Wikipedia、Pompeii Archaeological Park"
};
/* === DETAIL_DATA_END === */

(function(){
  "use strict";
  var LS="pompeii.found";
  var RM=window.matchMedia("(prefers-reduced-motion: reduce)"); var reduce=RM.matches;
  RM.addEventListener("change",function(e){ reduce=e.matches; });
  var sceneEl=document.getElementById("scene"), wallEl=document.getElementById("wall"), fcount=document.getElementById("fcount"), live=document.getElementById("live");
  document.getElementById("ftotal").textContent=ENDINGS.length;
  var found=load();
  function load(){ var s=new Set(); try{ var r=JSON.parse(localStorage.getItem(LS)||"[]"); if(Array.isArray(r)) r.forEach(function(id){ if(STORY.nodes[id]) s.add(id); }); }catch(e){} return s; }
  function save(){ try{ localStorage.setItem(LS, JSON.stringify(Array.from(found))); }catch(e){} }
  function render(id){
    var node=STORY.nodes[id]; sceneEl.innerHTML=""; var box=document.createElement("div"); box.className="fadein";
    if(node.end){
      box.className="fadein ending "+(node.survive?"survive":"perish");
      box.innerHTML='<span class="etag">'+(node.survive?"生還":"罹難")+'</span><h2>'+node.icon+' '+node.title+'</h2><div class="story">'+node.text+'</div><div class="note">'+node.note+'</div><div class="again"></div>';
      sceneEl.appendChild(box);
      var isNew=!found.has(id); if(isNew){ found.add(id); save(); }
      renderWall(isNew?id:null);
      var again=box.querySelector(".again");
      var b1=document.createElement("button"); b1.className="btn primary"; b1.textContent="↻ 再走一次";
      b1.addEventListener("click",function(){ render("start"); sceneEl.scrollIntoView({block:"start",behavior:reduce?"auto":"smooth"}); });
      again.appendChild(b1);
      var b2=document.createElement("button"); b2.className="btn ghost"; b2.textContent="↓ 深入了解真實的故事";
      b2.addEventListener("click",function(){ document.getElementById("detail").scrollIntoView({behavior:reduce?"auto":"smooth"}); });
      again.appendChild(b2);
      if(found.size>=ENDINGS.length){ var s=document.createElement("span"); s.className="btn"; s.style.cursor="default"; s.textContent="🏛️ 八種命運全收集"; again.appendChild(s); if(isNew) celebrate(); }
      announce((node.survive?"生還結局：":"罹難結局：")+node.title+"。"+node.note.replace(/<[^>]+>/g,""));
      setTimeout(function(){ b1.focus(); },40);
    } else {
      box.innerHTML='<div class="story">'+node.text+'</div><div class="choices"></div>'; sceneEl.appendChild(box);
      var wrap=box.querySelector(".choices");
      node.choices.forEach(function(ch,i){ var b=document.createElement("button"); b.className="choice"; b.textContent=ch.t;
        if(!reduce){ b.style.opacity=0; b.style.animation="fadein .5s var(--ease) "+(0.12+i*0.08)+"s forwards"; }
        b.addEventListener("click",function(){ render(ch.to); }); wrap.appendChild(b); });
      announce(node.text.replace(/<[^>]+>/g," "));
      setTimeout(function(){ var f=wrap.querySelector(".choice"); if(f) f.focus(); },60);
    }
  }
  function renderWall(newId){
    var html="";
    ENDINGS.forEach(function(id){ var n=STORY.nodes[id]; var got=found.has(id);
      html+='<div class="slot '+(got?("got "+(n.survive?"survive":"perish")):"locked")+(id===newId?" new":"")+'"><span class="si">'+(got?n.icon:"❔")+'</span><span class="st">'+(got?n.title:"？？？")+'</span></div>'; });
    wallEl.innerHTML=html; fcount.textContent=found.size;
  }
  function announce(t){ live.textContent=""; setTimeout(function(){ live.textContent=t; },30); }
  function celebrate(){ if(reduce) return; var r=sceneEl.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+60, cols=["#eb8a3c","#f4b064","#8fc79a","#caa06a"];
    for(var k=0;k<20;k++) setTimeout(function(){ for(var i=0;i<8;i++){ var s=document.createElement("div"); s.className="spark"; var a=Math.random()*Math.PI*2, d=40+Math.random()*40; s.style.left=cx+"px"; s.style.top=cy+"px"; s.style.background=cols[i%cols.length]; s.style.setProperty("--dx",Math.cos(a)*d+"px"); s.style.setProperty("--dy",Math.sin(a)*d+"px"); document.body.appendChild(s); s.addEventListener("animationend",function(){ this.remove(); }); } }, Math.random()*600); }

  function renderDetail(){
    var el=document.getElementById("detail"); if(!el) return;
    var h='<div class="reveal"><div class="dsep">深入了解</div><div class="dtitle">'+DETAIL.title+'</div><p class="lede">'+DETAIL.lede+'</p></div>';
    h+='<div class="reveal"><div class="dh">關鍵數字</div><div class="numbers">';
    DETAIL.numbers.forEach(function(x){ h+='<div class="num"><div class="n">'+x.n+(x.u?'<small>'+x.u+'</small>':'')+'</div><div class="l">'+x.l+'</div></div>'; });
    h+='</div></div>';
    h+='<div class="reveal"><div class="dh">事件時間軸</div><ul class="timeline">';
    DETAIL.timeline.forEach(function(x){ h+='<li class="tl"><div class="tt">'+x.t+'</div><div class="td">'+x.d+'</div></li>'; });
    h+='</ul></div>';
    h+='<div class="reveal"><div class="dh">幾件你該知道的事</div><div class="dcards">';
    DETAIL.cards.forEach(function(x){ h+='<div class="dcard"><div class="ci">'+x.icon+'</div><div class="ct">'+x.title+'</div><div class="cb">'+x.body+'</div></div>'; });
    h+='</div></div>';
    h+='<div class="reveal dsrc">資料來源：'+DETAIL.sources+'</div>';
    el.innerHTML=h;
    var items=el.querySelectorAll(".reveal");
    if(reduce || !("IntersectionObserver" in window)){ items.forEach(function(n){ n.classList.add("in"); }); return; }
    var io=new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } }); },{threshold:.12});
    items.forEach(function(n){ io.observe(n); });
  }

  (function(){ var host=document.getElementById("amb"), n=reduce?0:26, html=""; for(var i=0;i<n;i++){ html+='<i style="left:'+(Math.random()*100).toFixed(2)+'%;--t:'+(8+Math.random()*8).toFixed(1)+'s;--td:'+(Math.random()*8).toFixed(1)+'s;--dx:'+((Math.random()*60-10)|0)+'px;transform:scale('+(0.5+Math.random()).toFixed(2)+')"></i>'; } host.innerHTML=html; })();
  renderWall(null); render("start"); renderDetail();
})();
</script>
</body>
</html>
