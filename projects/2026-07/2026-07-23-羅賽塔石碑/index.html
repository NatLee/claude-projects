<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羅賽塔：破解法老的文字 · 沉睡一千四百年的謎</title>
<style>
  :root{
    --bg:#0d0a06; --ink:#f3ead9; --dim:#c1b295; --faint:#877659;
    --gold:#e8b552; --teal:#5fc7bd; --sage:#8fd0a0; --peril:#dd8a5a;
    --line:#281f14; --panel:rgba(30,24,15,.66); --brd:rgba(232,181,82,.16);
    --ease:cubic-bezier(.22,.61,.36,1); --pop:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:radial-gradient(1200px 700px at 30% -14%,#241a0d 0%,transparent 56%),radial-gradient(760px 520px at 90% 106%,#1c1408 0%,transparent 55%),var(--bg);
    color:var(--ink); font-family:"Noto Serif TC","Songti TC","Noto Sans TC","PingFang TC",serif; line-height:1.75; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden}
  .wrap{max-width:820px; margin:0 auto; padding:24px 20px 72px; position:relative; z-index:1}
  #amb{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  #amb i{position:absolute; top:-12px; width:4px; height:4px; border-radius:50%; background:#d8c49a; opacity:.13; animation:fall var(--t,16s) linear var(--td,0s) infinite}
  @keyframes fall{to{transform:translateY(104vh) translateX(var(--dx,30px)); opacity:0}}
  .rise{opacity:0; transform:translateY(14px); animation:rise .7s var(--ease) forwards; animation-delay:var(--d,0s)} @keyframes rise{to{opacity:1; transform:none}}
  .home{display:inline-flex; align-items:center; gap:.4em; color:var(--faint); text-decoration:none; font-size:.82rem; letter-spacing:.04em; transition:color .25s,transform .25s; font-family:"Noto Sans TC",sans-serif}
  .home:hover,.home:focus-visible{color:var(--gold); transform:translateX(-3px)} .home:focus-visible{outline:2px solid var(--gold); outline-offset:3px; border-radius:6px}
  header.top{margin:18px 0 8px}
  .kick{font-size:.72rem; letter-spacing:.36em; color:var(--teal); text-transform:uppercase; font-weight:700; font-family:"Noto Sans TC",sans-serif}
  h1{margin:.1em 0; font-size:clamp(2.1rem,6.2vw,3.4rem); font-weight:800; line-height:1.08; background:linear-gradient(94deg,var(--gold),#ffe6ad 46%,var(--teal)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .sub{color:var(--dim); font-size:clamp(1rem,2.2vw,1.1rem); max-width:46ch; font-family:"Noto Sans TC",sans-serif}
  .scene{background:var(--panel); border:1px solid var(--brd); border-radius:16px; padding:24px 22px; margin-top:20px; backdrop-filter:blur(7px); box-shadow:0 26px 60px -34px rgba(0,0,0,.9); min-height:200px}
  .scene .story{font-size:1.14rem; line-height:1.95; color:#f2e9d9} .scene .story p{margin:0 0 .7em} .scene .story .lead{color:var(--gold); font-weight:600}
  .fadein{animation:fadein .6s var(--ease) both} @keyframes fadein{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}
  .choices{display:flex; flex-direction:column; gap:10px; margin-top:20px}
  .choice{appearance:none; text-align:left; font-family:inherit; font-size:1.02rem; color:var(--ink); background:linear-gradient(100deg,rgba(232,181,82,.08),rgba(255,255,255,.02));
    border:1px solid var(--brd); border-radius:12px; padding:.85em 1em .85em 2.4em; cursor:pointer; position:relative; line-height:1.5; transition:transform .16s var(--pop),background .22s,border-color .22s}
  .choice::before{content:"›"; position:absolute; left:1em; top:.72em; color:var(--gold); font-size:1.3rem; font-weight:800; transition:transform .22s}
  .choice:hover{background:linear-gradient(100deg,rgba(232,181,82,.18),rgba(232,181,82,.05)); border-color:rgba(232,181,82,.5); transform:translateX(3px)}
  .choice:hover::before{transform:translateX(3px)} .choice:active{transform:translateX(3px) scale(.99)} .choice:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
  .ending .etag{display:inline-block; font-size:.72rem; font-weight:800; letter-spacing:.12em; padding:.24em .7em; border-radius:999px; margin-bottom:12px; font-family:"Noto Sans TC",sans-serif}
  .ending.survive .etag{background:rgba(143,208,160,.16); color:var(--sage); border:1px solid rgba(143,208,160,.4)}
  .ending.perish .etag{background:rgba(221,138,90,.14); color:var(--peril); border:1px solid rgba(221,138,90,.4)}
  .ending h2{font-size:1.6rem; margin:.1em 0 .4em} .ending.survive h2{color:var(--sage)} .ending.perish h2{color:var(--gold)}
  .ending .note{margin-top:16px; padding:14px 16px; border-left:3px solid var(--teal); border-radius:0 10px 10px 0; background:rgba(95,199,189,.08); font-size:.94rem; color:var(--dim); line-height:1.7; font-family:"Noto Sans TC",sans-serif}
  .ending .note b{color:var(--teal); font-weight:700}
  .again{margin-top:20px; display:flex; gap:10px; flex-wrap:wrap}
  .btn{appearance:none; font-family:"Noto Sans TC",sans-serif; font-size:.94rem; font-weight:600; color:var(--ink); background:rgba(255,255,255,.05); border:1px solid var(--brd); border-radius:11px; padding:.66em 1.2em; cursor:pointer; transition:transform .16s var(--pop),background .22s,border-color .22s}
  .btn:hover{background:rgba(232,181,82,.16); border-color:rgba(232,181,82,.45)} .btn:active{transform:translateY(1px) scale(.98)} .btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
  .btn.primary{background:linear-gradient(160deg,var(--gold),#c2913a); color:#1c1405; border-color:transparent}
  .wallwrap{margin-top:22px; background:var(--panel); border:1px solid var(--brd); border-radius:16px; padding:16px 18px; backdrop-filter:blur(7px)}
  .wallhd{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:12px; font-family:"Noto Sans TC",sans-serif}
  .wallhd .t{font-size:.72rem; letter-spacing:.16em; color:var(--faint); text-transform:uppercase; font-weight:700}
  .wallhd .c{color:var(--dim); font-size:.9rem} .wallhd .c b{color:var(--gold); font-size:1.05rem; font-variant-numeric:tabular-nums}
  .wall{display:grid; grid-template-columns:repeat(auto-fill,minmax(128px,1fr)); gap:9px}
  .slot{border:1px solid var(--line); border-radius:11px; padding:10px 11px; min-height:58px; display:flex; flex-direction:column; gap:3px; background:rgba(255,255,255,.015); font-family:"Noto Sans TC",sans-serif; transition:border-color .3s,background .3s}
  .slot .si{font-size:1.1rem} .slot .st{font-size:.86rem; font-weight:600; color:var(--ink); line-height:1.3}
  .slot.locked{opacity:.55} .slot.locked .st{color:var(--faint)}
  .slot.got.survive{border-color:rgba(143,208,160,.4); background:rgba(143,208,160,.06)} .slot.got.perish{border-color:rgba(221,138,90,.3); background:rgba(221,138,90,.05)}
  .slot.new{animation:pop .6s var(--pop)} @keyframes pop{0%{transform:scale(.6); opacity:0}70%{transform:scale(1.08)}100%{transform:none}}
  footer{margin-top:30px; color:var(--faint); font-size:.82rem; text-align:center; font-family:"Noto Sans TC",sans-serif}
  .spark{position:fixed; z-index:40; width:7px; height:7px; border-radius:50%; pointer-events:none; animation:spark .8s var(--ease) forwards} @keyframes spark{to{transform:translate(var(--dx),var(--dy)) scale(.2); opacity:0}}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important; animation-iteration-count:1!important; transition-duration:.05s!important}#amb{display:none}}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
</style>
</head>
<body>
<div id="amb" aria-hidden="true"></div>
<div class="wrap">
  <a class="home rise" href="../../../index.html" style="--d:.02s">← 回每日小專案</a>
  <header class="top">
    <div class="kick rise" style="--d:.08s">互動歷史 · 1799–1822</div>
    <h1 class="rise" style="--d:.14s">羅賽塔：破解法老的文字</h1>
    <p class="sub rise" style="--d:.22s">古埃及的象形文字沉睡了一千四百年，沒有人讀得懂。一塊刻著三種文字的石碑出土了——同一篇公告，希臘文你看得懂。你會用什麼方法，撬開這道謎？</p>
  </header>
  <section class="scene rise" id="scene" style="--d:.3s" aria-live="polite"></section>
  <section class="wallwrap rise" style="--d:.4s" aria-label="結局收集牆">
    <div class="wallhd"><span class="t">結局收集牆</span><span class="c">已解鎖 <b id="fcount">0</b> / <span id="ftotal">5</span> 種結局</span></div>
    <div class="wall" id="wall"></div>
  </section>
  <footer>取材自破解象形文字的真實歷史。資料來源：Wikipedia、Smithsonian</footer>
</div>
<p class="sr" id="live" aria-live="assertive"></p>

<script>
/* === STORY_DATA_START === 分支故事（唯一資料來源；tools 測試會抽這段） ===
 * 每個 node 有 text 與 choices（第 0 個為「繼續／主線」路線）；結局節點 end:true。
 */
const STORY = {
  start: "start",
  nodes: {
    start: {
      text: "<p>1799 年，拿破崙的士兵在埃及羅賽塔（拉希德）挖出一塊黑石，上面刻著三種文字：最上面是象形文字，中間是俗體字，最下面是<span class='lead'>古希臘文</span>——而希臘文，學者讀得懂。三段是同一篇公告（西元前 196 年，托勒密五世的詔書）。</p><p>問題是：怎麼從讀得懂的希臘文，撬開讀不懂的象形文字？</p>",
      choices: [
        { t: "從希臘文找出國王的名字，鎖定象形文字裡被橢圓框圈起來的『王名圈』，試著把它當拼音", to: "cartouche" },
        { t: "先去學會科普特語——古埃及語留到今天的後裔，也許是把鑰匙", to: "coptic" },
        { t: "沿用一千多年來的看法：每個象形符號，就是一個完整的概念或圖像", to: "e_ideogram" }
      ]
    },
    cartouche: {
      text: "<p>希臘文裡有『托勒密』。你在象形文字中找到那個被橢圓框住的王名圈，試著讓框裡的符號，一個一個對上『P-T-O-L-M-Y』的音。<span class='lead'>它們對上了。</span></p><p>可是，這會不會只是因為托勒密是外來的希臘名字，才需要拼音？</p>",
      choices: [
        { t: "再找另一個外來王名『克麗奧佩脫拉』交叉驗證，看共用的字母對不對得上", to: "mixed" },
        { t: "先假設：只有外來名字才拼音，埃及本土的字仍然是純粹表意", to: "e_localname" }
      ]
    },
    coptic: {
      text: "<p>你花了好幾年精通科普特語，把它含在嘴裡、記在心裡。這是古埃及人自己的語言最後的迴聲。</p>",
      choices: [
        { t: "把科普特語的『發音』套進王名圈裡的符號，交叉比對", to: "mixed" },
        { t: "只把它當成一本古語字典查閱，沒有拿去對照那些符號", to: "e_giveup" }
      ]
    },
    mixed: {
      text: "<p>『托勒密』和『克麗奧佩脫拉』共用的符號，發音完全對得上。你手上開始有了一張象形文字的『字母表』。</p><p>然後你盯著一個本土的王名圈，用科普特語的音去讀它——你忽然意識到一件顛覆一切的事：<span class='lead'>同一個字裡，符號可以既表音、又表意。</span></p>",
      choices: [
        { t: "大膽承認這個混合系統，用科普特語音讀出本土法老『拉美西斯』的名字", to: "e_crack" },
        { t: "退縮了：怎麼可能同一個符號又是聲音又是圖像？還是只承認外來名字拼音吧", to: "e_stall" }
      ]
    },

    e_crack: { end:true, survive:true, icon:"🗝️", title:"我成功了！",
      text: "<p>那個本土王名，用科普特語一讀——是『拉美西斯』。象形文字不是死圖畫，而是一套活生生、能拼出語言的文字。據說你衝去找哥哥，喊了一句『我成功了！』，然後當場昏了過去，病了好幾天。一千四百年的沉默，就在這一刻被打破。</p>",
      note: "<b>史實</b>：1822 年 9 月，商博良破解了象形文字。他用托勒密與克麗奧佩脫拉的王名圈找出字母，領悟象形文字『同時表音又表意』，並借助科普特語讀出埃及本土名字。他確實喊出「Je tiens l'affaire!（我成功了）」後因過度激動昏厥。石碑 1799 年出土，刻的是西元前 196 年托勒密五世的詔書。" },
    e_stall: { end:true, survive:false, icon:"🧩", title:"差最後一步的人",
      text: "<p>你破解了外來王名的拼音，卻始終不敢跨出那一步——不肯相信同一個符號能又表音又表意。於是本土的文字，仍舊沉默。</p>",
      note: "<b>史實</b>：英國學者托馬斯・楊確實也解出了托勒密王名圈的部分讀音，卻認為象形文字大體上仍是象徵符號。真正的突破，是看穿它們也在為埃及語『拼音』——商博良跨出了這一步。" },
    e_localname: { end:true, survive:false, icon:"🔡", title:"只有外國名字會拼音？",
      text: "<p>你認定：拼音只是為了硬記那些外來的希臘名字，埃及自己的文字仍然是一幅幅圖。於是你在門口停下，沒有走進去。</p>",
      note: "<b>史實</b>：這正是破解卡關的關鍵誤解之一。象形文字其實一直在為埃及語本身拼音，只是也夾帶表意符號。承認『本土文字也拼音』，才是打開這道門的鑰匙。" },
    e_giveup: { end:true, survive:false, icon:"📜", title:"擺在手邊的鑰匙",
      text: "<p>科普特語就攤在你的桌上，你卻只把它當字典翻，從沒把它的『聲音』拿去對照石碑上的符號。鑰匙在手，門卻沒開。</p>",
      note: "<b>史實</b>：科普特語是古埃及語的直系後裔，保留了發音。商博良正是靠它，才把象形符號『讀出聲音』來——這是他勝過其他學者的關鍵準備。" },
    e_ideogram: { end:true, survive:false, icon:"🖼️", title:"一千四百年的誤會",
      text: "<p>你相信每個符號都是一個完整的概念，於是面對幾千個圖案，你想為每一個猜一個意思——猜到天荒地老，也拼不出一句話。象形文字，繼續沉睡。</p>",
      note: "<b>史實</b>：從古典時代起，學者多半（依循霍拉波羅的說法）假設象形文字純粹是象徵圖像，一個符號＝一個概念。正是這個延續了一千多年的假設，讓這套文字遲遲無法被讀懂。" }
  }
};
const ENDINGS = ["e_crack","e_stall","e_localname","e_giveup","e_ideogram"];
/* === STORY_DATA_END === */

(function(){
  "use strict";
  var LS="rosetta.found";
  var RM=window.matchMedia("(prefers-reduced-motion: reduce)"); var reduce=RM.matches;
  RM.addEventListener("change",function(e){ reduce=e.matches; });
  var sceneEl=document.getElementById("scene"), wallEl=document.getElementById("wall"), fcount=document.getElementById("fcount"), live=document.getElementById("live");
  document.getElementById("ftotal").textContent=ENDINGS.length;
  var found=load();
  function load(){ var s=new Set(); try{ var r=JSON.parse(localStorage.getItem(LS)||"[]"); if(Array.isArray(r)) r.forEach(function(id){ if(STORY.nodes[id]) s.add(id); }); }catch(e){} return s; }
  function save(){ try{ localStorage.setItem(LS, JSON.stringify(Array.from(found))); }catch(e){} }
  function render(id){
    var node=STORY.nodes[id]; sceneEl.innerHTML=""; var box=document.createElement("div"); box.className="fadein";
    if(node.end){
      box.className="fadein ending "+(node.survive?"survive":"perish");
      box.innerHTML='<span class="etag">'+(node.survive?"破解了":"止步於此")+'</span><h2>'+node.icon+' '+node.title+'</h2><div class="story">'+node.text+'</div><div class="note">'+node.note+'</div><div class="again"></div>';
      sceneEl.appendChild(box);
      var isNew=!found.has(id); if(isNew){ found.add(id); save(); }
      renderWall(isNew?id:null);
      var again=box.querySelector(".again");
      var b1=document.createElement("button"); b1.className="btn primary"; b1.textContent="↻ 換一條思路";
      b1.addEventListener("click",function(){ render("start"); sceneEl.scrollIntoView({block:"start",behavior:reduce?"auto":"smooth"}); });
      again.appendChild(b1);
      if(found.size>=ENDINGS.length){ var s=document.createElement("span"); s.className="btn"; s.style.cursor="default"; s.textContent="𓂀 五種結局全解鎖"; again.appendChild(s); if(isNew) celebrate(); }
      announce((node.survive?"成功結局：":"止步結局：")+node.title+"。"+node.note.replace(/<[^>]+>/g,""));
      setTimeout(function(){ b1.focus(); },40);
    } else {
      box.innerHTML='<div class="story">'+node.text+'</div><div class="choices"></div>'; sceneEl.appendChild(box);
      var wrap=box.querySelector(".choices");
      node.choices.forEach(function(ch,i){ var b=document.createElement("button"); b.className="choice"; b.textContent=ch.t;
        if(!reduce){ b.style.opacity=0; b.style.animation="fadein .5s var(--ease) "+(0.12+i*0.08)+"s forwards"; }
        b.addEventListener("click",function(){ render(ch.to); }); wrap.appendChild(b); });
      announce(node.text.replace(/<[^>]+>/g," "));
      setTimeout(function(){ var f=wrap.querySelector(".choice"); if(f) f.focus(); },60);
    }
  }
  function renderWall(newId){
    var html="";
    ENDINGS.forEach(function(id){ var n=STORY.nodes[id]; var got=found.has(id);
      html+='<div class="slot '+(got?("got "+(n.survive?"survive":"perish")):"locked")+(id===newId?" new":"")+'"><span class="si">'+(got?n.icon:"❔")+'</span><span class="st">'+(got?n.title:"？？？")+'</span></div>'; });
    wallEl.innerHTML=html; fcount.textContent=found.size;
  }
  function announce(t){ live.textContent=""; setTimeout(function(){ live.textContent=t; },30); }
  function celebrate(){ if(reduce) return; var r=sceneEl.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+60, cols=["#e8b552","#5fc7bd","#8fd0a0","#ffe6ad"];
    for(var k=0;k<20;k++) setTimeout(function(){ for(var i=0;i<8;i++){ var s=document.createElement("div"); s.className="spark"; var a=Math.random()*Math.PI*2, d=40+Math.random()*40; s.style.left=cx+"px"; s.style.top=cy+"px"; s.style.background=cols[i%cols.length]; s.style.setProperty("--dx",Math.cos(a)*d+"px"); s.style.setProperty("--dy",Math.sin(a)*d+"px"); document.body.appendChild(s); s.addEventListener("animationend",function(){ this.remove(); }); } }, Math.random()*600); }
  (function(){ var host=document.getElementById("amb"), n=reduce?0:24, html=""; for(var i=0;i<n;i++){ html+='<i style="left:'+(Math.random()*100).toFixed(2)+'%;--t:'+(12+Math.random()*10).toFixed(1)+'s;--td:'+(Math.random()*10).toFixed(1)+'s;--dx:'+((Math.random()*80-20)|0)+'px;transform:scale('+(0.6+Math.random()).toFixed(2)+')"></i>'; } host.innerHTML=html; })();
  renderWall(null); render("start");
})();
</script>
</body>
</html>
