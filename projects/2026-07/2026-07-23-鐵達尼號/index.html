<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鐵達尼號：最後四小時 · 那一夜，你會怎麼選？</title>
<style>
  :root{
    --bg:#060a10; --ink:#e9f0f7; --dim:#a3b4c8; --faint:#5d6f88;
    --brass:#e8c274; --ice:#8fd0e6; --sage:#83d8a4; --peril:#e07a72;
    --line:#182230; --panel:rgba(14,22,33,.68); --brd:rgba(232,194,116,.16);
    --ease:cubic-bezier(.22,.61,.36,1); --pop:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:radial-gradient(1200px 700px at 50% -14%,#0c1a2b 0%,transparent 58%),radial-gradient(760px 520px at 90% 106%,#0a1420 0%,transparent 55%),var(--bg);
    color:var(--ink); font-family:"Noto Serif TC","Songti TC","Noto Sans TC","PingFang TC",serif; line-height:1.75; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden}
  .wrap{max-width:820px; margin:0 auto; padding:24px 20px 72px; position:relative; z-index:1}
  #amb{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  #amb i{position:absolute; top:-12px; width:4px; height:4px; border-radius:50%; background:#dbe8f2; opacity:.14; animation:fall var(--t,14s) linear var(--td,0s) infinite}
  @keyframes fall{to{transform:translateY(104vh) translateX(var(--dx,24px)); opacity:0}}
  .rise{opacity:0; transform:translateY(14px); animation:rise .7s var(--ease) forwards; animation-delay:var(--d,0s)} @keyframes rise{to{opacity:1; transform:none}}
  .home{display:inline-flex; align-items:center; gap:.4em; color:var(--faint); text-decoration:none; font-size:.82rem; letter-spacing:.04em; transition:color .25s,transform .25s; font-family:"Noto Sans TC",sans-serif}
  .home:hover,.home:focus-visible{color:var(--brass); transform:translateX(-3px)} .home:focus-visible{outline:2px solid var(--brass); outline-offset:3px; border-radius:6px}
  header.top{margin:18px 0 8px}
  .kick{font-size:.72rem; letter-spacing:.36em; color:var(--ice); text-transform:uppercase; font-weight:700; font-family:"Noto Sans TC",sans-serif}
  h1{margin:.1em 0; font-size:clamp(2.1rem,6.2vw,3.4rem); font-weight:800; line-height:1.08; background:linear-gradient(94deg,var(--brass),#fff0cf 46%,var(--ice)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .sub{color:var(--dim); font-size:clamp(1rem,2.2vw,1.1rem); max-width:46ch; font-family:"Noto Sans TC",sans-serif}
  .scene{background:var(--panel); border:1px solid var(--brd); border-radius:16px; padding:24px 22px; margin-top:20px; backdrop-filter:blur(7px); box-shadow:0 26px 60px -34px rgba(0,0,0,.9); min-height:200px}
  .scene .story{font-size:1.14rem; line-height:1.95; color:#eaf1f8} .scene .story p{margin:0 0 .7em} .scene .story .lead{color:var(--brass); font-weight:600}
  .fadein{animation:fadein .6s var(--ease) both} @keyframes fadein{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}
  .choices{display:flex; flex-direction:column; gap:10px; margin-top:20px}
  .choice{appearance:none; text-align:left; font-family:inherit; font-size:1.02rem; color:var(--ink); background:linear-gradient(100deg,rgba(232,194,116,.08),rgba(255,255,255,.02));
    border:1px solid var(--brd); border-radius:12px; padding:.85em 1em .85em 2.4em; cursor:pointer; position:relative; line-height:1.5; transition:transform .16s var(--pop),background .22s,border-color .22s}
  .choice::before{content:"›"; position:absolute; left:1em; top:.72em; color:var(--brass); font-size:1.3rem; font-weight:800; transition:transform .22s}
  .choice:hover{background:linear-gradient(100deg,rgba(232,194,116,.18),rgba(232,194,116,.05)); border-color:rgba(232,194,116,.5); transform:translateX(3px)}
  .choice:hover::before{transform:translateX(3px)} .choice:active{transform:translateX(3px) scale(.99)} .choice:focus-visible{outline:2px solid var(--brass); outline-offset:2px}
  .ending .etag{display:inline-block; font-size:.72rem; font-weight:800; letter-spacing:.12em; padding:.24em .7em; border-radius:999px; margin-bottom:12px; font-family:"Noto Sans TC",sans-serif}
  .ending.survive .etag{background:rgba(131,216,164,.16); color:var(--sage); border:1px solid rgba(131,216,164,.4)}
  .ending.perish .etag{background:rgba(224,122,114,.13); color:var(--peril); border:1px solid rgba(224,122,114,.4)}
  .ending h2{font-size:1.6rem; margin:.1em 0 .4em} .ending.survive h2{color:var(--sage)} .ending.perish h2{color:var(--brass)}
  .ending .note{margin-top:16px; padding:14px 16px; border-left:3px solid var(--ice); border-radius:0 10px 10px 0; background:rgba(143,208,230,.08); font-size:.94rem; color:var(--dim); line-height:1.7; font-family:"Noto Sans TC",sans-serif}
  .ending .note b{color:var(--ice); font-weight:700}
  .again{margin-top:20px; display:flex; gap:10px; flex-wrap:wrap}
  .btn{appearance:none; font-family:"Noto Sans TC",sans-serif; font-size:.94rem; font-weight:600; color:var(--ink); background:rgba(255,255,255,.05); border:1px solid var(--brd); border-radius:11px; padding:.66em 1.2em; cursor:pointer; transition:transform .16s var(--pop),background .22s,border-color .22s}
  .btn:hover{background:rgba(232,194,116,.16); border-color:rgba(232,194,116,.45)} .btn:active{transform:translateY(1px) scale(.98)} .btn:focus-visible{outline:2px solid var(--brass); outline-offset:2px}
  .btn.primary{background:linear-gradient(160deg,var(--brass),#c49a45); color:#1c1405; border-color:transparent}
  .wallwrap{margin-top:22px; background:var(--panel); border:1px solid var(--brd); border-radius:16px; padding:16px 18px; backdrop-filter:blur(7px)}
  .wallhd{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:12px; font-family:"Noto Sans TC",sans-serif}
  .wallhd .t{font-size:.72rem; letter-spacing:.16em; color:var(--faint); text-transform:uppercase; font-weight:700}
  .wallhd .c{color:var(--dim); font-size:.9rem} .wallhd .c b{color:var(--brass); font-size:1.05rem; font-variant-numeric:tabular-nums}
  .wall{display:grid; grid-template-columns:repeat(auto-fill,minmax(128px,1fr)); gap:9px}
  .slot{border:1px solid var(--line); border-radius:11px; padding:10px 11px; min-height:58px; display:flex; flex-direction:column; gap:3px; background:rgba(255,255,255,.015); font-family:"Noto Sans TC",sans-serif; transition:border-color .3s,background .3s}
  .slot .si{font-size:1.1rem} .slot .st{font-size:.86rem; font-weight:600; color:var(--ink); line-height:1.3}
  .slot.locked{opacity:.55} .slot.locked .st{color:var(--faint)}
  .slot.got.survive{border-color:rgba(131,216,164,.4); background:rgba(131,216,164,.06)} .slot.got.perish{border-color:rgba(224,122,114,.3); background:rgba(224,122,114,.05)}
  .slot.new{animation:pop .6s var(--pop)} @keyframes pop{0%{transform:scale(.6); opacity:0}70%{transform:scale(1.08)}100%{transform:none}}
  footer{margin-top:30px; color:var(--faint); font-size:.82rem; text-align:center; font-family:"Noto Sans TC",sans-serif}
  .spark{position:fixed; z-index:40; width:7px; height:7px; border-radius:50%; pointer-events:none; animation:spark .8s var(--ease) forwards} @keyframes spark{to{transform:translate(var(--dx),var(--dy)) scale(.2); opacity:0}}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important; animation-iteration-count:1!important; transition-duration:.05s!important}#amb{display:none}}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
</style>
</head>
<body>
<div id="amb" aria-hidden="true"></div>
<div class="wrap">
  <a class="home rise" href="../../../index.html" style="--d:.02s">← 回每日小專案</a>
  <header class="top">
    <div class="kick rise" style="--d:.08s">互動歷史 · 1912 年 4 月</div>
    <h1 class="rise" style="--d:.14s">鐵達尼號：最後四小時</h1>
    <p class="sub rise" style="--d:.22s">午夜，一陣悶悶的震動。這艘號稱『永不沉沒』的巨輪擦上了冰山，而救生艇只夠一半的人。你在船上的哪裡、怎麼選——結局，都對得上真實的生還數字。</p>
  </header>
  <section class="scene rise" id="scene" style="--d:.3s" aria-live="polite"></section>
  <section class="wallwrap rise" style="--d:.4s" aria-label="結局收集牆">
    <div class="wallhd"><span class="t">結局收集牆</span><span class="c">已解鎖 <b id="fcount">0</b> / <span id="ftotal">6</span> 種命運</span></div>
    <div class="wall" id="wall"></div>
  </section>
  <footer>取材自鐵達尼號史料與生還統計。資料來源：Encyclopedia Titanica、Wikipedia</footer>
</div>
<p class="sr" id="live" aria-live="assertive"></p>

<script>
/* === STORY_DATA_START === 分支故事（唯一資料來源；tools 測試會抽這段） ===
 * 每個 node 有 text 與 choices（第 0 個為「繼續／主線」路線）；結局節點 end:true。
 */
const STORY = {
  start: "start",
  nodes: {
    start: {
      text: "<p>1912 年 4 月 14 日，晚上 11 點 40 分。一陣悶悶的刮擦，然後船慢慢停了下來。起初沒人當回事——直到冰冷的海水，開始從船艙底部漫上來。</p><p>你只有大約兩個半小時。<span class='lead'>此刻，你在哪裡？</span></p>",
      choices: [
        { t: "頭等艙，就在救生艇甲板旁邊", to: "first" },
        { t: "三等艙，在船艙深處，隔著一道道柵門與樓梯", to: "third" },
        { t: "你決定不急著逃，留下來幫忙安撫慌亂的人群", to: "stay" }
      ]
    },
    first: {
      text: "<p>你就在救生艇甲板上。船員一邊放下救生艇，一邊喊著『婦女與孩童優先』。奇怪的是，最早放下的幾艘，都還空著一大半座位。</p>",
      choices: [
        { t: "（你是女性或孩童）在船員招呼下，登上救生艇", to: "e_first" },
        { t: "（你是男性）把座位讓給婦孺，自己留在船上", to: "e_gentleman" }
      ]
    },
    third: {
      text: "<p>你在船的深處。往甲板的路彎彎繞繞，好幾道柵門把統艙和上層隔開，有的鎖著、有的沒人來開。海水的聲音，越來越近。</p>",
      choices: [
        { t: "不等了，自己想辦法穿過迷宮、往上層甲板硬擠", to: "e_third_up" },
        { t: "守規矩，待在原地，等船員來帶路", to: "e_third_wait" }
      ]
    },
    stay: {
      text: "<p>你選擇留下。甲板上有人尖叫、有人禱告、有人不肯相信這是真的。你想，也許自己能做點什麼，讓最後的時刻不那麼慌亂。</p>",
      choices: [
        { t: "和船上的樂隊站在一起，演奏音樂，安定人心", to: "e_band" },
        { t: "撐到最後一刻，縱身跳進冰海，盼著救生艇會回頭", to: "e_water" }
      ]
    },

    e_first: { end:true, survive:true, icon:"🛟", title:"半空的救生艇",
      text: "<p>你在眾人的攙扶下坐進救生艇，被緩緩放向漆黑的海面。艇上還有空位，卻已經開始下降。你回望那艘燈火通明的大船，心裡明白：不是每個人，都能上得來。</p>",
      note: "<b>史實</b>：頭等艙女性的生還率高達約 97%。最早放下的幾艘救生艇常未坐滿——全船 20 艘救生艇合計只夠約 1178 人，而船上有約 2224 人。" },
    e_gentleman: { end:true, survive:false, icon:"🎩", title:"讓出去的座位",
      text: "<p>你把手一鬆，讓身邊的女士和孩子先上。艇放下去了，你退回欄杆邊，點起一根菸，靜靜看著海面。你知道自己大概回不去了。</p>",
      note: "<b>史實</b>：在『婦孺優先』下，頭等艙男性的生還率僅約 33%。許多男士——包括不少知名人物——選擇把生機讓給婦孺，留在正在下沉的船上。" },
    e_third_up: { end:true, survive:true, icon:"🪜", title:"從船底拚上來的路",
      text: "<p>你連滾帶爬，穿過走廊、翻過欄杆，總算擠上了甲板。眼前還有一艘正要放下的救生艇——你抓住了那最後的機會。很多和你一起出發的人，卻沒能走到這裡。</p>",
      note: "<b>史實</b>：三等艙（統艙）在船艙深處，柵門與漫長的距離讓逃生困難得多。三等艙女性生還率約 46%、男性僅約 16%，遠低於頭等艙。" },
    e_third_wait: { end:true, survive:false, icon:"🚪", title:"沒等到的那聲通知",
      text: "<p>你聽話地待在原地，相信會有人來帶你們上去。可是等到海水淹上腳踝，走廊裡依然只有慌亂的人聲，沒有指引。</p>",
      note: "<b>史實</b>：統艙受創最重，許多人根本沒能抵達救生艇甲板。全船約 2224 人中，約 1500 人罹難——其中三等艙的比例最高。" },
    e_band: { end:true, survive:false, icon:"🎻", title:"演奏到最後一刻",
      text: "<p>你和樂手們站在傾斜的甲板上，拉起了熟悉的旋律。周圍的混亂，彷彿因為這幾把琴，稍稍安靜了一點。你們一直演奏，直到再也站不住。</p>",
      note: "<b>史實</b>：鐵達尼號的 8 名樂手演奏到最後，試圖安定人心，最終全數罹難。多位倖存者回憶，最後一曲可能是《更近我主》。他們的堅持，成了這場海難最動人的傳說之一。" },
    e_water: { end:true, survive:false, icon:"🧊", title:"冰海裡的等待",
      text: "<p>你跳進海裡，盼著哪一艘救生艇會划回來。但海水冷得像刀，力氣一分一秒被抽走，遠處的燈光始終沒有靠近。</p>",
      note: "<b>史實</b>：當晚海水約 -2°C，落水者多在數分鐘內失溫。多數救生艇因怕被拖翻而沒有回頭；卡柏菲亞號趕到時只救起約 705 人。而僅約 5 海里外的加州人號，把船上發射的求救信號當成了普通煙火。" }
  }
};
const ENDINGS = ["e_first","e_gentleman","e_third_up","e_third_wait","e_band","e_water"];
/* === STORY_DATA_END === */

(function(){
  "use strict";
  var LS="titanic.found";
  var RM=window.matchMedia("(prefers-reduced-motion: reduce)"); var reduce=RM.matches;
  RM.addEventListener("change",function(e){ reduce=e.matches; });
  var sceneEl=document.getElementById("scene"), wallEl=document.getElementById("wall"), fcount=document.getElementById("fcount"), live=document.getElementById("live");
  document.getElementById("ftotal").textContent=ENDINGS.length;
  var found=load();
  function load(){ var s=new Set(); try{ var r=JSON.parse(localStorage.getItem(LS)||"[]"); if(Array.isArray(r)) r.forEach(function(id){ if(STORY.nodes[id]) s.add(id); }); }catch(e){} return s; }
  function save(){ try{ localStorage.setItem(LS, JSON.stringify(Array.from(found))); }catch(e){} }
  function render(id){
    var node=STORY.nodes[id]; sceneEl.innerHTML=""; var box=document.createElement("div"); box.className="fadein";
    if(node.end){
      box.className="fadein ending "+(node.survive?"survive":"perish");
      box.innerHTML='<span class="etag">'+(node.survive?"生還":"罹難")+'</span><h2>'+node.icon+' '+node.title+'</h2><div class="story">'+node.text+'</div><div class="note">'+node.note+'</div><div class="again"></div>';
      sceneEl.appendChild(box);
      var isNew=!found.has(id); if(isNew){ found.add(id); save(); }
      renderWall(isNew?id:null);
      var again=box.querySelector(".again");
      var b1=document.createElement("button"); b1.className="btn primary"; b1.textContent="↻ 再選一次";
      b1.addEventListener("click",function(){ render("start"); sceneEl.scrollIntoView({block:"start",behavior:reduce?"auto":"smooth"}); });
      again.appendChild(b1);
      if(found.size>=ENDINGS.length){ var s=document.createElement("span"); s.className="btn"; s.style.cursor="default"; s.textContent="🕯️ 六種命運全解鎖"; again.appendChild(s); if(isNew) celebrate(); }
      announce((node.survive?"生還結局：":"罹難結局：")+node.title+"。"+node.note.replace(/<[^>]+>/g,""));
      setTimeout(function(){ b1.focus(); },40);
    } else {
      box.innerHTML='<div class="story">'+node.text+'</div><div class="choices"></div>'; sceneEl.appendChild(box);
      var wrap=box.querySelector(".choices");
      node.choices.forEach(function(ch,i){ var b=document.createElement("button"); b.className="choice"; b.textContent=ch.t;
        if(!reduce){ b.style.opacity=0; b.style.animation="fadein .5s var(--ease) "+(0.12+i*0.08)+"s forwards"; }
        b.addEventListener("click",function(){ render(ch.to); }); wrap.appendChild(b); });
      announce(node.text.replace(/<[^>]+>/g," "));
      setTimeout(function(){ var f=wrap.querySelector(".choice"); if(f) f.focus(); },60);
    }
  }
  function renderWall(newId){
    var html="";
    ENDINGS.forEach(function(id){ var n=STORY.nodes[id]; var got=found.has(id);
      html+='<div class="slot '+(got?("got "+(n.survive?"survive":"perish")):"locked")+(id===newId?" new":"")+'"><span class="si">'+(got?n.icon:"❔")+'</span><span class="st">'+(got?n.title:"？？？")+'</span></div>'; });
    wallEl.innerHTML=html; fcount.textContent=found.size;
  }
  function announce(t){ live.textContent=""; setTimeout(function(){ live.textContent=t; },30); }
  function celebrate(){ if(reduce) return; var r=sceneEl.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+60, cols=["#e8c274","#8fd0e6","#83d8a4","#fff0cf"];
    for(var k=0;k<20;k++) setTimeout(function(){ for(var i=0;i<8;i++){ var s=document.createElement("div"); s.className="spark"; var a=Math.random()*Math.PI*2, d=40+Math.random()*40; s.style.left=cx+"px"; s.style.top=cy+"px"; s.style.background=cols[i%cols.length]; s.style.setProperty("--dx",Math.cos(a)*d+"px"); s.style.setProperty("--dy",Math.sin(a)*d+"px"); document.body.appendChild(s); s.addEventListener("animationend",function(){ this.remove(); }); } }, Math.random()*600); }
  (function(){ var host=document.getElementById("amb"), n=reduce?0:26, html=""; for(var i=0;i<n;i++){ html+='<i style="left:'+(Math.random()*100).toFixed(2)+'%;--t:'+(11+Math.random()*8).toFixed(1)+'s;--td:'+(Math.random()*8).toFixed(1)+'s;--dx:'+((Math.random()*50-15)|0)+'px;transform:scale('+(0.6+Math.random()).toFixed(2)+')"></i>'; } host.innerHTML=html; })();
  renderWall(null); render("start");
})();
</script>
</body>
</html>
