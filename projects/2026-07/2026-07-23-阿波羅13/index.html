<style>

  .btn:hover{background:rgba(111,214,255,.16); border-color:rgba(111,214,255,.45)} .btn:active{transform:translateY(1px) scale(.98)} .btn:focus-visible{outline:2px solid var(--hi); outline-offset:2px}

<body>
<div id="amb" aria-hidden="true"></div>
<div class="wrap">
  <a class="home rise" href="../../../index.html" style="--d:.02s">← 回每日小專案</a>
  <header class="top">
    <div class="kick rise" style="--d:.08s">互動歷史 · 1970 年 4 月</div>
    <h1 class="rise" style="--d:.14s">阿波羅 13：把他們帶回家</h1>
    <p class="sub rise" style="--d:.22s">距離地球 32 萬公里，一聲悶響，氧氣槽炸了。接下來要連闖七道生死關——每一關只有一個正確答案，全部答對，才能像史實一樣把三個人活著帶回來。想知道真實的故事，玩完往下捲。</p>
  </header>
  <section class="scene rise" id="scene" style="--d:.3s" aria-live="polite"></section>
  <section class="wallwrap rise" style="--d:.4s" aria-label="結局收集牆">
    <div class="wallhd"><span class="t">結局收集牆</span><span class="c">已解鎖 <b id="fcount">0</b> / <span id="ftotal">9</span> 種結局</span></div>
    <div class="wall" id="wall"></div>
  </section>

  <section class="detail" id="detail" aria-label="深入了解"></section>

  <footer>取材自 NASA 任務紀錄。資料來源：NASA、Wikipedia</footer>
</div>
<p class="sr" id="live" aria-live="assertive"></p>

<script>
/* === STORY_DATA_START === 分支故事（唯一資料來源；tools 測試會抽這段） ===
 * 七道生死關，每關第 0 個選項為「正確」；答錯即為一種失敗結局。
 */
const STORY = {
  start: "start",
  nodes: {
    start: {
      text: "<p>任務第 56 小時，你剛做完電視轉播，控制中心要你例行攪拌氧氣槽。開關按下的瞬間——<span class='lead'>『砰。』</span></p><p>船身一震，2 號氧氣槽讀數瞬間歸零，另一個正在下掉，指揮艙的電力在流失。斯威格特對麥克風說：『休士頓，我們這裡出了點問題。』</p><p><b>第一關：先保命。</b></p>",
      choices: [
        { t: "立刻關掉指揮艙、退進登月艙，把它當『救生艇』", to: "traj" },
        { t: "留在指揮艙，設法把漏氣和電力搶救回來", to: "e_cm" }
      ]
    },
    traj: {
      text: "<p>三人擠進只為兩人、只設計撐兩天的登月艙。但航線瞄準的是登月，不會自己繞回地球。<b>第二關：航道。</b></p>",
      choices: [
        { t: "點燃登月艙下降引擎，轉進『自由返回軌道』，靠月球重力甩回家", to: "co2" },
        { t: "掉頭燒指揮艙那具大主引擎，抄近路直接折返", to: "e_traj" },
        { t: "先關機省電，等地面算清楚，晚一點再修正軌道", to: "e_drift" }
      ]
    },
    co2: {
      text: "<p>繞過月背，你看見沒人看過的月面。但艙內二氧化碳穩穩爬升——濾罐是為兩人設計的，現在有三個人在呼吸。指揮艙有方形濾罐，登月艙卻是圓孔。<b>第三關：呼吸。</b></p>",
      choices: [
        { t: "照地面唸的步驟，用塑膠袋、膠帶、手冊封面把方罐土砲接上圓孔", to: "power" },
        { t: "接口不合就是不合，先撐著、少講話省氣", to: "e_co2" }
      ]
    },
    power: {
      text: "<p>二氧化碳降回安全值。但還有三天航程，登月艙的電力在倒數。地面算出：得關到幾乎只剩維生，艙內會冷到接近結冰。<b>第四關：電力。</b></p>",
      choices: [
        { t: "全部關到最低，忍受寒冷與黑暗", to: "water" },
        { t: "系統多開一點，比較安全也比較暖", to: "e_power" }
      ]
    },
    water: {
      text: "<p>艙裡冷得像冰庫，水的問題更急——飲水快見底，海斯已經開始發燒。<b>第五關：飲水。</b></p>",
      choices: [
        { t: "嚴格配給，忍受脫水，把水優先留給冷卻系統", to: "nav" },
        { t: "身體要緊，該喝就喝，別把人渴壞了", to: "e_water" }
      ]
    },
    nav: {
      text: "<p>回家前得做一次中途修正，偏一點就會錯過整顆星球。但為了省電，導航電腦是關著的。<b>第六關：校正。</b></p>",
      choices: [
        { t: "用地球明暗交界線當準星，一人看、一人報時、一人手動點火", to: "reentry" },
        { t: "沒有電腦太危險了，這次校正先跳過", to: "e_nav" }
      ]
    },
    reentry: {
      text: "<p>最後一關。喚醒只剩微弱電力的指揮艙，拋掉救了你們一命的登月艙，對準只有幾度寬的『再入走廊』——太陡會燒毀，太淺會被大氣彈開、飛向深空。<b>第七關：回家。</b></p>",
      choices: [
        { t: "按正確順序供電，精準對好再入角度，重返大氣層", to: "e_home" },
        { t: "時間不等人，角度差不多就好", to: "e_angle" }
      ]
    },

    e_home: { end:true, survive:true, icon:"🌊", title:"濺落太平洋",
      text: "<p>通訊黑障比預期多熬了幾秒——然後，三頂紅白降落傘在南太平洋上空綻開。奧德賽號穩穩落在海面。三個人，都回來了。</p>",
      note: "<b>史實</b>：1970 年 4 月 17 日，阿波羅 13 號在爆炸後約 87 小時安全濺落。工程師用計算尺算出解法、唸給太空人聽。這場『成功的失敗』，成了 NASA 最著名的一次救援。" },
    e_cm: { end:true, survive:false, icon:"🔌", title:"指揮艙裡的最後幾分鐘",
      text: "<p>你試著搶救，但氧氣與電力流失得比想像更快。指揮艙不是不能修——是根本來不及。</p>",
      note: "<b>史實</b>：爆炸後指揮艙的電力與氧氣只夠再撐很短的時間。真正救命的第一步，是把還有電、有氧、有引擎的登月艙當成『救生艇』。" },
    e_traj: { end:true, survive:false, icon:"🛰️", title:"不敢賭的那具引擎",
      text: "<p>你點燃指揮艙的主引擎想抄近路。但沒人知道爆炸有沒有傷到它——這一賭，賭輸了。</p>",
      note: "<b>史實</b>：服務艙主引擎（SPS）可能已受損，NASA 不敢冒險使用，改用登月艙下降引擎把太空船推上自由返回軌道，這是最保險的路。" },
    e_drift: { end:true, survive:false, icon:"⏳", title:"錯過的時間窗",
      text: "<p>你想先省電、晚點再修軌道。可是修正軌道有時間窗，等你準備好，太空船已經偏到再也拉不回來。</p>",
      note: "<b>史實</b>：軌道修正越晚做，所需的燃料與精度越苛刻。阿波羅 13 號在繞月前後及時完成幾次關鍵點火，才鎖定回家的航道——時機，和方向一樣重要。" },
    e_co2: { end:true, survive:false, icon:"😮‍💨", title:"看不見的敵人",
      text: "<p>二氧化碳沒有顏色也沒有味道。讀數越爬越高，三個人越來越昏沉，卻什麼都聞不到。</p>",
      note: "<b>史實</b>：地面用指揮艙的方形濾罐、塑膠袋、膠帶和手冊封面，拼出一個接到登月艙圓孔的轉接頭（暱稱『信箱』）。裝上後，二氧化碳幾分鐘內就降了回來。" },
    e_power: { end:true, survive:false, icon:"🔋", title:"電，先用完了",
      text: "<p>艙裡沒那麼冷、也沒那麼難熬。代價是——電池在回家之前先見了底。</p>",
      note: "<b>史實</b>：他們把登月艙關到僅約正常用電的五分之一，忍受近 3°C 的低溫。省下來的每一度電，都是為了重返大氣層那一刻的指揮艙。" },
    e_water: { end:true, survive:false, icon:"💧", title:"渴，也是一種危機",
      text: "<p>你讓大家好好補水，卻忘了水也要留給冷卻系統。水一旦不夠，機器和人，會一起撐不住。</p>",
      note: "<b>史實</b>：返程時飲水嚴格配給，太空人明顯脫水，海斯還因此發燒、得了泌尿道感染。省水不只為了喝——登月艙的許多系統也靠水冷卻。" },
    e_nav: { end:true, survive:false, icon:"🧭", title:"少了那一次點火",
      text: "<p>你怕沒有電腦太危險，跳過了中途校正。於是太空船帶著微小的偏差滑向地球，那個偏差，最後變成了幾百公里。</p>",
      note: "<b>史實</b>：電腦關著時，機組員以地球明暗交界線為準星、手動完成中途修正點火。少了這一次校正，就會偏離狹窄的再入走廊。" },
    e_angle: { end:true, survive:false, icon:"📐", title:"只有幾度寬的門",
      text: "<p>再入角度沒對準。太空船不是被大氣燒穿，就是像打水漂一樣被彈回太空——兩種結局，都回不了家。</p>",
      note: "<b>史實</b>：地球的『再入走廊』只有幾度寬。太陡會在高溫中解體，太淺會被大氣層彈開飛向深空。阿波羅 13 號在關鍵時刻精準穿過了這道窄門。" }
  }
};
const ENDINGS = ["e_home","e_cm","e_traj","e_drift","e_co2","e_power","e_water","e_nav","e_angle"];
/* === STORY_DATA_END === */

/* === DETAIL_DATA_START === 一頁式詳解資料（tools 測試會抽這段） === */
const DETAIL = {
  title: "真實的六天",
  lede: "1970 年 4 月，一次原本要登月的任務，在氧氣槽爆炸後，變成人類史上最著名的一場太空救援。三個人、沒有登月艙以外的引擎、只剩四天不到的補給——他們是這樣回家的。",
  numbers: [
    { n:"321,000", u:"公里", l:"爆炸時距離地球，比月球還遠" },
    { n:"~87", u:"小時", l:"從爆炸到濺落" },
    { n:"~3", u:"°C", l:"返程時登月艙內低溫" },
    { n:"3 / 3", u:"", l:"全員生還" }
  ],
  timeline: [
    { t:"4 月 11 日", d:"土星五號升空，阿波羅 13 號展開第三次登月任務。" },
    { t:"4 月 13 日", d:"例行攪拌氧氣槽時，2 號氧氣槽爆炸，指揮艙電力與氧氣急速流失。" },
    { t:"爆炸後約 3 小時", d:"改用登月艙下降引擎點火，把太空船推上自由返回軌道。" },
    { t:"繞過月球背面", d:"創下載人航行離地球最遠的紀錄（約 40 萬公里），至今未破。" },
    { t:"返程途中", d:"地面趕製 CO₂『信箱』轉接頭；登月艙關到最低省電，艙內接近結冰。" },
    { t:"4 月 17 日", d:"指揮艙奧德賽號濺落南太平洋，三名太空人安全獲救。" }
  ],
  cards: [
    { icon:"📦", title:"方罐插進圓孔的『信箱』", body:"指揮艙的方形濾罐接不上登月艙的圓孔。工程師只用塑膠袋、膠帶與手冊封面，拼出一個轉接頭，把步驟唸給太空人照做——二氧化碳幾分鐘內就降回安全值。" },
    { icon:"🌙", title:"人類離地球最遠的一刻", body:"為了走自由返回軌道，太空船繞過月球背面，途中創下載人航行距地球最遠的紀錄。這個『最遠』，是被逼出來的。" },
    { icon:"📏", title:"用計算尺算出的回家路", body:"為了省電，導航電腦大半時間關著。關鍵的中途修正靠人工：以地球明暗交界線為準星、手動點火；地面用計算尺算出參數再唸上去。" },
    { icon:"🏅", title:"『一次成功的失敗』", body:"任務沒有登月，卻把三個人從絕境帶了回來。阿波羅 13 號被稱為 NASA『最成功的失敗』，也徹底改寫了太空任務的應變準則。" }
  ],
  sources: "NASA、Wikipedia"
};
/* === DETAIL_DATA_END === */

(function(){
  "use strict";
  var LS="apollo.found";
  var RM=window.matchMedia("(prefers-reduced-motion: reduce)"); var reduce=RM.matches;
  RM.addEventListener("change",function(e){ reduce=e.matches; });
  var sceneEl=document.getElementById("scene"), wallEl=document.getElementById("wall"), fcount=document.getElementById("fcount"), live=document.getElementById("live");
  document.getElementById("ftotal").textContent=ENDINGS.length;
  var found=load(), depth=0;
  function load(){ var s=new Set(); try{ var r=JSON.parse(localStorage.getItem(LS)||"[]"); if(Array.isArray(r)) r.forEach(function(id){ if(STORY.nodes[id]) s.add(id); }); }catch(e){} return s; }
  function save(){ try{ localStorage.setItem(LS, JSON.stringify(Array.from(found))); }catch(e){} }
  function mainLen(){ var n=STORY.start,g=0; while(g<50){ var nd=STORY.nodes[n]; if(nd.end) break; n=nd.choices[0].to; g++; } return g; }
  var MAIN=mainLen();
  function render(id, d){
    depth = d||0;
    var node=STORY.nodes[id]; sceneEl.innerHTML=""; var box=document.createElement("div"); box.className="fadein";
    if(node.end){
      box.className="fadein ending "+(node.survive?"survive":"perish");
      box.innerHTML='<span class="etag">'+(node.survive?"帶回家了":"失敗")+'</span><h2>'+node.icon+' '+node.title+'</h2><div class="story">'+node.text+'</div><div class="note">'+node.note+'</div><div class="again"></div>';
      sceneEl.appendChild(box);
      var isNew=!found.has(id); if(isNew){ found.add(id); save(); }
      renderWall(isNew?id:null);
      var again=box.querySelector(".again");
      var b1=document.createElement("button"); b1.className="btn primary"; b1.textContent="↻ 再試一次";
      b1.addEventListener("click",function(){ render("start",0); sceneEl.scrollIntoView({block:"start",behavior:reduce?"auto":"smooth"}); });
      again.appendChild(b1);
      var b2=document.createElement("button"); b2.className="btn ghost"; b2.textContent="↓ 深入了解真實的故事";
      b2.addEventListener("click",function(){ document.getElementById("detail").scrollIntoView({behavior:reduce?"auto":"smooth"}); });
      again.appendChild(b2);
      if(found.size>=ENDINGS.length){ var s=document.createElement("span"); s.className="btn"; s.style.cursor="default"; s.textContent="🚀 全部結局解鎖"; again.appendChild(s); if(isNew) celebrate(); }
      announce((node.survive?"成功結局：":"失敗結局：")+node.title+"。"+node.note.replace(/<[^>]+>/g,""));
      setTimeout(function(){ b1.focus(); },40);
    } else {
      var pdots=""; for(var k=0;k<MAIN;k++) pdots+='<span class="dot'+(k<depth?" on":"")+'"></span>';
      box.innerHTML='<div class="story">'+node.text+'</div><div class="prog" aria-label="進度">'+pdots+'<span>第 '+(depth+1)+' / '+MAIN+' 關</span></div><div class="choices"></div>';
      sceneEl.appendChild(box);
      var wrap=box.querySelector(".choices");
      node.choices.forEach(function(ch,i){ var b=document.createElement("button"); b.className="choice"; b.textContent=ch.t;
        if(!reduce){ b.style.opacity=0; b.style.animation="fadein .5s var(--ease) "+(0.12+i*0.08)+"s forwards"; }
        b.addEventListener("click",function(){ render(ch.to, depth+1); }); wrap.appendChild(b); });
      announce(node.text.replace(/<[^>]+>/g," "));
      setTimeout(function(){ var f=wrap.querySelector(".choice"); if(f) f.focus(); },60);
    }
  }
  function renderWall(newId){
    var html="";
    ENDINGS.forEach(function(id){ var n=STORY.nodes[id]; var got=found.has(id);
      html+='<div class="slot '+(got?("got "+(n.survive?"survive":"perish")):"locked")+(id===newId?" new":"")+'"><span class="si">'+(got?n.icon:"❔")+'</span><span class="st">'+(got?n.title:"？？？")+'</span></div>'; });
    wallEl.innerHTML=html; fcount.textContent=found.size;
  }
  function announce(t){ live.textContent=""; setTimeout(function(){ live.textContent=t; },30); }
  function celebrate(){ if(reduce) return; var r=sceneEl.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+60, cols=["#6fd6ff","#ffc061","#7fe0a0","#dff2ff"];
    for(var k=0;k<20;k++) setTimeout(function(){ for(var i=0;i<8;i++){ var s=document.createElement("div"); s.className="spark"; var a=Math.random()*Math.PI*2, d=40+Math.random()*40; s.style.left=cx+"px"; s.style.top=cy+"px"; s.style.background=cols[i%cols.length]; s.style.setProperty("--dx",Math.cos(a)*d+"px"); s.style.setProperty("--dy",Math.sin(a)*d+"px"); document.body.appendChild(s); s.addEventListener("animationend",function(){ this.remove(); }); } }, Math.random()*600); }

  // ---------- 一頁式詳解 ----------
  function renderDetail(){
    var el=document.getElementById("detail"); if(!el) return;
    var h='<div class="reveal"><div class="dsep">深入了解</div><div class="dtitle">'+DETAIL.title+'</div><p class="lede">'+DETAIL.lede+'</p></div>';
    h+='<div class="reveal"><div class="dh">關鍵數字</div><div class="numbers">';
    DETAIL.numbers.forEach(function(x){ h+='<div class="num"><div class="n">'+x.n+(x.u?'<small>'+x.u+'</small>':'')+'</div><div class="l">'+x.l+'</div></div>'; });
    h+='</div></div>';
    h+='<div class="reveal"><div class="dh">事件時間軸</div><ul class="timeline">';
    DETAIL.timeline.forEach(function(x){ h+='<li class="tl"><div class="tt">'+x.t+'</div><div class="td">'+x.d+'</div></li>'; });
    h+='</ul></div>';
    h+='<div class="reveal"><div class="dh">幾件你該知道的事</div><div class="dcards">';
    DETAIL.cards.forEach(function(x){ h+='<div class="dcard"><div class="ci">'+x.icon+'</div><div class="ct">'+x.title+'</div><div class="cb">'+x.body+'</div></div>'; });
    h+='</div></div>';
    h+='<div class="reveal dsrc">資料來源：'+DETAIL.sources+'</div>';
    el.innerHTML=h;
    var items=el.querySelectorAll(".reveal");
    if(reduce || !("IntersectionObserver" in window)){ items.forEach(function(n){ n.classList.add("in"); }); return; }
    var io=new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } }); },{threshold:.12});
    items.forEach(function(n){ io.observe(n); });
  }

  (function(){ var host=document.getElementById("amb"), n=reduce?26:56, html=""; for(var i=0;i<n;i++){ html+='<i style="left:'+(Math.random()*100).toFixed(2)+'%;top:'+(Math.random()*100).toFixed(2)+'%;--t:'+(2.5+Math.random()*4).toFixed(1)+'s;--td:'+(Math.random()*4).toFixed(1)+'s;transform:scale('+(0.5+Math.random()*1.4).toFixed(2)+')"></i>'; } host.innerHTML=html; })();
  renderWall(null); render("start",0); renderDetail();
})();
</script>
