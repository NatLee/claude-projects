<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿波羅 13：把他們帶回家 · 你的每個決定，都是真實的工程判斷</title>
<style>
  :root{
    --bg:#05070e; --ink:#e9f0ff; --dim:#a6b6d6; --faint:#5f6f92;
    --hi:#6fd6ff; --amber:#ffc061; --sage:#7fe0a0; --peril:#ff7f6b;
    --line:#1a2440; --panel:rgba(14,20,38,.66); --brd:rgba(111,214,255,.16);
    --ease:cubic-bezier(.22,.61,.36,1); --pop:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:radial-gradient(1200px 700px at 50% -14%,#0d1730 0%,transparent 58%),radial-gradient(760px 520px at 88% 106%,#0a1428 0%,transparent 55%),var(--bg);
    color:var(--ink); font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    line-height:1.7; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden}
  .wrap{max-width:820px; margin:0 auto; padding:24px 20px 72px; position:relative; z-index:1}
  #amb{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  #amb i{position:absolute; width:2px; height:2px; border-radius:50%; background:#fff; opacity:.5; animation:tw var(--t,4s) ease-in-out var(--td,0s) infinite}
  @keyframes tw{0%,100%{opacity:.16; transform:scale(.7)}50%{opacity:.9; transform:scale(1.25)}}
  .rise{opacity:0; transform:translateY(14px); animation:rise .7s var(--ease) forwards; animation-delay:var(--d,0s)}
  @keyframes rise{to{opacity:1; transform:none}}
  .home{display:inline-flex; align-items:center; gap:.4em; color:var(--faint); text-decoration:none; font-size:.82rem; letter-spacing:.04em; transition:color .25s,transform .25s}
  .home:hover,.home:focus-visible{color:var(--hi); transform:translateX(-3px)}
  .home:focus-visible{outline:2px solid var(--hi); outline-offset:3px; border-radius:6px}
  header.top{margin:18px 0 8px}
  .kick{font-size:.72rem; letter-spacing:.36em; color:var(--amber); text-transform:uppercase; font-weight:700}
  h1{margin:.1em 0; font-size:clamp(2.1rem,6.4vw,3.4rem); font-weight:800; letter-spacing:.01em; line-height:1.08;
    background:linear-gradient(94deg,var(--hi),#dff2ff 46%,var(--amber)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .sub{color:var(--dim); font-size:clamp(1rem,2.2vw,1.1rem); max-width:46ch}
  .scene{background:var(--panel); border:1px solid var(--brd); border-radius:16px; padding:24px 22px; margin-top:20px; backdrop-filter:blur(7px); box-shadow:0 26px 60px -34px rgba(0,0,0,.9); min-height:200px}
  .scene .story{font-size:1.14rem; line-height:1.95; color:#eef3ff} .scene .story p{margin:0 0 .7em} .scene .story .lead{color:var(--amber); font-weight:600}
  .fadein{animation:fadein .6s var(--ease) both} @keyframes fadein{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}
  .choices{display:flex; flex-direction:column; gap:10px; margin-top:20px}
  .choice{appearance:none; text-align:left; font-family:inherit; font-size:1.02rem; color:var(--ink); background:linear-gradient(100deg,rgba(111,214,255,.08),rgba(255,255,255,.02));
    border:1px solid var(--brd); border-radius:12px; padding:.85em 1em .85em 2.4em; cursor:pointer; position:relative; line-height:1.5; transition:transform .16s var(--pop),background .22s,border-color .22s}
  .choice::before{content:"›"; position:absolute; left:1em; top:.72em; color:var(--hi); font-size:1.3rem; font-weight:800; transition:transform .22s}
  .choice:hover{background:linear-gradient(100deg,rgba(111,214,255,.18),rgba(111,214,255,.05)); border-color:rgba(111,214,255,.5); transform:translateX(3px)}
  .choice:hover::before{transform:translateX(3px)} .choice:active{transform:translateX(3px) scale(.99)} .choice:focus-visible{outline:2px solid var(--hi); outline-offset:2px}
  .ending .etag{display:inline-block; font-size:.72rem; font-weight:800; letter-spacing:.12em; padding:.24em .7em; border-radius:999px; margin-bottom:12px}
  .ending.survive .etag{background:rgba(127,224,160,.16); color:var(--sage); border:1px solid rgba(127,224,160,.4)}
  .ending.perish .etag{background:rgba(255,127,107,.13); color:var(--peril); border:1px solid rgba(255,127,107,.4)}
  .ending h2{font-size:1.6rem; margin:.1em 0 .4em} .ending.survive h2{color:var(--sage)} .ending.perish h2{color:var(--amber)}
  .ending .note{margin-top:16px; padding:14px 16px; border-left:3px solid var(--amber); border-radius:0 10px 10px 0; background:rgba(255,192,97,.08); font-size:.94rem; color:var(--dim); line-height:1.7}
  .ending .note b{color:var(--amber); font-weight:700}
  .again{margin-top:20px; display:flex; gap:10px; flex-wrap:wrap}
  .btn{appearance:none; font-family:inherit; font-size:.94rem; font-weight:600; color:var(--ink); background:rgba(255,255,255,.05); border:1px solid var(--brd); border-radius:11px; padding:.66em 1.2em; cursor:pointer; transition:transform .16s var(--pop),background .22s,border-color .22s}
  .btn:hover{background:rgba(111,214,255,.16); border-color:rgba(111,214,255,.45)} .btn:active{transform:translateY(1px) scale(.98)} .btn:focus-visible{outline:2px solid var(--hi); outline-offset:2px}
  .btn.primary{background:linear-gradient(160deg,var(--hi),#2f9fd0); color:#041420; border-color:transparent}
  .wallwrap{margin-top:22px; background:var(--panel); border:1px solid var(--brd); border-radius:16px; padding:16px 18px; backdrop-filter:blur(7px)}
  .wallhd{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:12px}
  .wallhd .t{font-size:.72rem; letter-spacing:.16em; color:var(--faint); text-transform:uppercase; font-weight:700}
  .wallhd .c{color:var(--dim); font-size:.9rem} .wallhd .c b{color:var(--hi); font-size:1.05rem; font-variant-numeric:tabular-nums}
  .wall{display:grid; grid-template-columns:repeat(auto-fill,minmax(128px,1fr)); gap:9px}
  .slot{border:1px solid var(--line); border-radius:11px; padding:10px 11px; min-height:58px; display:flex; flex-direction:column; gap:3px; background:rgba(255,255,255,.015); transition:border-color .3s,background .3s}
  .slot .si{font-size:1.1rem} .slot .st{font-size:.86rem; font-weight:600; color:var(--ink); line-height:1.3}
  .slot.locked{opacity:.55} .slot.locked .st{color:var(--faint)}
  .slot.got.survive{border-color:rgba(127,224,160,.4); background:rgba(127,224,160,.06)} .slot.got.perish{border-color:rgba(255,127,107,.3); background:rgba(255,127,107,.05)}
  .slot.new{animation:pop .6s var(--pop)} @keyframes pop{0%{transform:scale(.6); opacity:0}70%{transform:scale(1.08)}100%{transform:none}}
  footer{margin-top:30px; color:var(--faint); font-size:.82rem; text-align:center}
  .spark{position:fixed; z-index:40; width:7px; height:7px; border-radius:50%; pointer-events:none; animation:spark .8s var(--ease) forwards} @keyframes spark{to{transform:translate(var(--dx),var(--dy)) scale(.2); opacity:0}}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important; animation-iteration-count:1!important; transition-duration:.05s!important}#amb{display:none}}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
</style>
</head>
<body>
<div id="amb" aria-hidden="true"></div>
<div class="wrap">
  <a class="home rise" href="../../../index.html" style="--d:.02s">← 回每日小專案</a>
  <header class="top">
    <div class="kick rise" style="--d:.08s">互動歷史 · 1970 年 4 月</div>
    <h1 class="rise" style="--d:.14s">阿波羅 13：把他們帶回家</h1>
    <p class="sub rise" style="--d:.22s">距離地球 32 萬公里，一聲悶響，氧氣槽炸了。接下來 4 天，你在任務控制與艙內做的每個決定，都是當年工程師真的做過的判斷。你，能把三個人活著帶回來嗎？</p>
  </header>
  <section class="scene rise" id="scene" style="--d:.3s" aria-live="polite"></section>
  <section class="wallwrap rise" style="--d:.4s" aria-label="結局收集牆">
    <div class="wallhd"><span class="t">結局收集牆</span><span class="c">已解鎖 <b id="fcount">0</b> / <span id="ftotal">6</span> 種結局</span></div>
    <div class="wall" id="wall"></div>
  </section>
  <footer>取材自 NASA 任務紀錄。資料來源：NASA、Wikipedia</footer>
</div>
<p class="sr" id="live" aria-live="assertive"></p>

<script>
/* === STORY_DATA_START === 分支故事（唯一資料來源；tools 測試會抽這段） ===
 * 每個 node 有 text 與 choices（第 0 個為「正確／繼續」路線）；結局節點 end:true。
 */
const STORY = {
  start: "start",
  nodes: {
    start: {
      text: "<p>任務第 56 小時。你剛做完一段電視轉播，控制中心要你們例行攪拌一下氧氣槽。開關按下去的那一刻——<span class='lead'>『砰。』</span></p><p>整艘太空船晃了一下。警示燈亮起，一個氧氣槽的讀數瞬間歸零，另一個正在往下掉。指揮艙的電力在流失。斯威格特對著麥克風說：<span class='lead'>『休士頓，我們這裡出了點問題。』</span></p>",
      choices: [
        { t: "立刻把指揮艙關機保命，退進登月艙、把它當『救生艇』", to: "traj" },
        { t: "留在指揮艙，想辦法把漏氣和電力搶救回來", to: "e_cm" }
      ]
    },
    traj: {
      text: "<p>三個人擠進只為兩人、只設計撐兩天的登月艙。它成了你們唯一的電力、氧氣與引擎。</p><p>但航線不對——你們原本瞄準登月，不會自己繞回地球。得盡快修正。</p>",
      choices: [
        { t: "點燃登月艙的下降發動機，轉進『自由返回軌道』：讓月球引力把你們甩回家", to: "co2" },
        { t: "直接燒指揮艙那具大主發動機，掉頭原路折返", to: "e_traj" }
      ]
    },
    co2: {
      text: "<p>繞過月球背面，你們看見了沒有人看過的月面。但艙裡二氧化碳的讀數正穩穩爬升——登月艙的濾罐是為兩個人設計的，現在有三個人在呼吸。</p><p>指揮艙有大量方形濾罐，登月艙的接口卻是圓的。<span class='lead'>方的，插不進圓的。</span></p>",
      choices: [
        { t: "照地面唸的步驟，用塑膠袋、膠帶和封面硬紙，把方罐土砲接上圓孔", to: "power" },
        { t: "接口不合就是不合，先撐著、少講話省氣", to: "e_co2" }
      ]
    },
    power: {
      text: "<p>二氧化碳降回安全值。但還有三天航程，而登月艙的電力和水都在倒數。</p><p>地面算出：得把登月艙關到幾乎只剩維生，才撐得到回家。那意味著艙內會冷到接近結冰、水要嚴格配給。</p>",
      choices: [
        { t: "全部關到最低，忍受寒冷、缺水與黑暗", to: "reentry" },
        { t: "系統多開一點比較安全、也比較好過", to: "e_power" }
      ]
    },
    reentry: {
      text: "<p>回到地球前，得做一次中途修正，偏一點就會錯過整顆星球。但為了省電，導航電腦是關著的。三個人只能用<span class='lead'>地球明暗交界線</span>當準星，一個看、一個報時、一個手動點火。</p><p>最後一關：喚醒只剩微弱電力的指揮艙，拋掉救了你們一命的登月艙，對準那條只有幾度寬的『再入走廊』。太陡會燒毀，太淺會被大氣彈開、永遠飛走。</p>",
      choices: [
        { t: "屏住呼吸，精準對好再入角度，重返大氣層", to: "e_home" },
        { t: "角度差不多就好，時間不等人", to: "e_angle" }
      ]
    },

    e_home: { end:true, survive:true, icon:"🌊", title:"濺落太平洋",
      text: "<p>通訊黑障比預期多熬了幾秒——然後，三頂紅白降落傘在南太平洋上空綻開。奧德賽號穩穩落在海面。三個人，都回來了。</p>",
      note: "<b>史實</b>：1970 年 4 月 17 日，阿波羅 13 號在爆炸後約 87 小時安全濺落。工程師用計算尺算出解法、再唸給太空人聽。這場『成功的失敗』，成了 NASA 最著名的一次救援。" },
    e_cm: { end:true, survive:false, icon:"🔌", title:"指揮艙裡的最後幾分鐘",
      text: "<p>你試著搶救，但氧氣與電力流失得比想像更快。指揮艙不是不能修——是根本來不及。</p>",
      note: "<b>史實</b>：爆炸後指揮艙的電力與氧氣只夠再撐很短的時間。真正救命的那一步，是把還有電、有氧、有引擎的登月艙當成『救生艇』——這正是當年任務控制的第一個決定。" },
    e_traj: { end:true, survive:false, icon:"🛰️", title:"不敢賭的那具引擎",
      text: "<p>你點燃了指揮艙的主發動機想抄近路。但沒人知道爆炸有沒有傷到它——這一賭，賭輸了。</p>",
      note: "<b>史實</b>：服務艙的主發動機（SPS）可能已受損，NASA 不敢冒險使用，改用登月艙的下降發動機把太空船推上『自由返回軌道』，靠月球重力甩回地球，這是最保險的路。" },
    e_co2: { end:true, survive:false, icon:"😮‍💨", title:"看不見的敵人",
      text: "<p>二氧化碳沒有顏色也沒有味道。讀數越爬越高，三個人越來越昏沉，卻什麼都聞不到。</p>",
      note: "<b>史實</b>：地面工程師用指揮艙的方形濾罐、塑膠袋、膠帶和手冊封面，拼出一個接到登月艙圓孔的轉接頭（暱稱『信箱』）。裝上後，二氧化碳在幾分鐘內就降了回來。" },
    e_power: { end:true, survive:false, icon:"🔋", title:"電，先用完了",
      text: "<p>艙裡沒那麼冷、也沒那麼難熬。代價是——電池和水在回家之前，先見了底。</p>",
      note: "<b>史實</b>：他們把登月艙關到僅約正常用電的五分之一，忍受近 3°C 的低溫、嚴格配給飲水。省下來的每一度電，都是為了重返大氣層那一刻的指揮艙。" },
    e_angle: { end:true, survive:false, icon:"📐", title:"只有幾度寬的門",
      text: "<p>再入角度沒對準。太空船不是被大氣燒穿，就是像打水漂一樣被彈回太空——兩種結局，都回不了家。</p>",
      note: "<b>史實</b>：地球的『再入走廊』只有幾度寬。太陡，太空船會在高溫中解體；太淺，會被大氣層彈開飛向深空。阿波羅 13 號在關鍵時刻手動校正，才精準穿過了這道窄門。" }
  }
};
const ENDINGS = ["e_home","e_cm","e_traj","e_co2","e_power","e_angle"];
/* === STORY_DATA_END === */

(function(){
  "use strict";
  var LS="apollo.found";
  var RM=window.matchMedia("(prefers-reduced-motion: reduce)"); var reduce=RM.matches;
  RM.addEventListener("change",function(e){ reduce=e.matches; });
  var sceneEl=document.getElementById("scene"), wallEl=document.getElementById("wall"), fcount=document.getElementById("fcount"), live=document.getElementById("live");
  document.getElementById("ftotal").textContent=ENDINGS.length;
  var found=load();
  function load(){ var s=new Set(); try{ var r=JSON.parse(localStorage.getItem(LS)||"[]"); if(Array.isArray(r)) r.forEach(function(id){ if(STORY.nodes[id]) s.add(id); }); }catch(e){} return s; }
  function save(){ try{ localStorage.setItem(LS, JSON.stringify(Array.from(found))); }catch(e){} }
  function render(id){
    var node=STORY.nodes[id]; sceneEl.innerHTML=""; var box=document.createElement("div"); box.className="fadein";
    if(node.end){
      box.className="fadein ending "+(node.survive?"survive":"perish");
      box.innerHTML='<span class="etag">'+(node.survive?"帶回家了":"失敗")+'</span><h2>'+node.icon+' '+node.title+'</h2><div class="story">'+node.text+'</div><div class="note">'+node.note+'</div><div class="again"></div>';
      sceneEl.appendChild(box);
      var isNew=!found.has(id); if(isNew){ found.add(id); save(); }
      renderWall(isNew?id:null);
      var again=box.querySelector(".again");
      var b1=document.createElement("button"); b1.className="btn primary"; b1.textContent="↻ 再試一次";
      b1.addEventListener("click",function(){ render("start"); sceneEl.scrollIntoView({block:"start",behavior:reduce?"auto":"smooth"}); });
      again.appendChild(b1);
      if(found.size>=ENDINGS.length){ var s=document.createElement("span"); s.className="btn"; s.style.cursor="default"; s.textContent="🚀 六種結局全解鎖"; again.appendChild(s); if(isNew) celebrate(); }
      announce((node.survive?"成功結局：":"失敗結局：")+node.title+"。"+node.note.replace(/<[^>]+>/g,""));
      setTimeout(function(){ b1.focus(); },40);
    } else {
      box.innerHTML='<div class="story">'+node.text+'</div><div class="choices"></div>'; sceneEl.appendChild(box);
      var wrap=box.querySelector(".choices");
      node.choices.forEach(function(ch,i){ var b=document.createElement("button"); b.className="choice"; b.textContent=ch.t;
        if(!reduce){ b.style.opacity=0; b.style.animation="fadein .5s var(--ease) "+(0.12+i*0.08)+"s forwards"; }
        b.addEventListener("click",function(){ render(ch.to); }); wrap.appendChild(b); });
      announce(node.text.replace(/<[^>]+>/g," "));
      setTimeout(function(){ var f=wrap.querySelector(".choice"); if(f) f.focus(); },60);
    }
  }
  function renderWall(newId){
    var html="";
    ENDINGS.forEach(function(id){ var n=STORY.nodes[id]; var got=found.has(id);
      html+='<div class="slot '+(got?("got "+(n.survive?"survive":"perish")):"locked")+(id===newId?" new":"")+'"><span class="si">'+(got?n.icon:"❔")+'</span><span class="st">'+(got?n.title:"？？？")+'</span></div>'; });
    wallEl.innerHTML=html; fcount.textContent=found.size;
  }
  function announce(t){ live.textContent=""; setTimeout(function(){ live.textContent=t; },30); }
  function celebrate(){ if(reduce) return; var r=sceneEl.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+60, cols=["#6fd6ff","#ffc061","#7fe0a0","#dff2ff"];
    for(var k=0;k<20;k++) setTimeout(function(){ for(var i=0;i<8;i++){ var s=document.createElement("div"); s.className="spark"; var a=Math.random()*Math.PI*2, d=40+Math.random()*40; s.style.left=cx+"px"; s.style.top=cy+"px"; s.style.background=cols[i%cols.length]; s.style.setProperty("--dx",Math.cos(a)*d+"px"); s.style.setProperty("--dy",Math.sin(a)*d+"px"); document.body.appendChild(s); s.addEventListener("animationend",function(){ this.remove(); }); } }, Math.random()*600); }
  (function(){ var host=document.getElementById("amb"), n=reduce?26:56, html=""; for(var i=0;i<n;i++){ html+='<i style="left:'+(Math.random()*100).toFixed(2)+'%;top:'+(Math.random()*100).toFixed(2)+'%;--t:'+(2.5+Math.random()*4).toFixed(1)+'s;--td:'+(Math.random()*4).toFixed(1)+'s;transform:scale('+(0.5+Math.random()*1.4).toFixed(2)+')"></i>'; } host.innerHTML=html; })();
  renderWall(null); render("start");
})();
</script>
</body>
</html>
